body:
  text: 宋天竺三藏求那跋陀羅初譯魏天竺三藏菩提留支再譯唐于闐國三藏實叉難陀後譯明臨濟正宗中都沙門員珂會譯一切佛語心品第三之上爾時世尊告大慧菩薩摩訶薩言意生身分別通相我今當說諦聽諦聽善思念之大慧白佛言善哉世尊唯然受教佛告大慧有三種意生身云何為三所謂三昧樂正受意生身覺法自性性意生身種類俱生無行作意生身修行者了知初地上上增進相得三種身魏譯爾時佛告聖者大慧菩薩言大慧我今為汝說意生身修行差別大慧諦聽諦聽當為汝說大慧白佛言善哉世尊唯然受教佛告大慧有三種意生身何等為三一者得三昧樂三摩跋提意生身二者如實覺知諸法相意生身三者種類生無作行意生身菩薩從於初地如實修行得上上地證智之相唐譯爾時佛告大慧菩薩摩訶薩言今當為汝說意成身差別相諦聽諦聽善思念之大慧言唯佛言大慧意成身有三種何者為三謂入三昧樂意成身覺法自性意成身種類俱生無作行意成身諸修行者入初地已漸次證得大慧云何三昧樂正受意生身謂第三第四第五地三昧樂正受故種種自心寂靜安住心海起浪識相不生知自心現境界性非性是名三昧樂正受意生身魏譯大慧何者菩薩摩訶薩得三昧樂三摩跋提意生身謂第三第四第五地中自心寂靜行種種行大海心波轉識之相三摩跋提樂名意識生以見自心境界故如實知有無相大慧是名意生身相唐譯大慧云何入三昧樂意成身謂三四五地入於三昧離種種心寂然不動心海不起轉識波浪了境心現皆無所有是名入三昧樂意成身大慧云何覺法自性性意生身謂第八地觀察覺了如幻等法悉無所有身心轉變得如幻三昧及餘三昧門無量相力自在明如妙華莊嚴迅疾如意猶如幻夢水月鏡像非造非所造如造所造一切色種種支分具足莊嚴隨入一切佛剎大衆通達自性法故是名覺法自性性意生身魏譯大慧何者如實覺知諸法相意生身謂菩薩摩訶薩於八地中觀察覺了得諸法無相如幻等法悉無所有身心轉變得如幻三昧及餘無量三摩跋提樂門無量相力自在神通妙華莊嚴迅疾如意猶如幻夢水中月鏡中像非四大生似四大相具足身分一切修行得如意自在隨入諸佛國土大衆大慧是名如實覺知諸法相意生身唐譯云何覺法自性意成身謂八地中了法如幻皆無有相心轉所依住如幻定及餘三昧能現無量自在神通如華開敷速疾如意如幻如夢如影如像非造所造與造相似一切色相具足莊嚴普入佛剎了諸法性是名覺法自性意成身大慧云何種類俱生無行作意生身所謂覺一切佛法緣自得樂相是名種類俱生無行作意生身大慧於彼三種身相觀察覺了應當修學魏譯大慧何者種類生無作行意生身謂自身內證一切諸法如實樂相法相樂故大慧是名種類生無作行意生身大慧汝當於彼三種身相觀察了知唐譯云何種類俱生無作行意成身謂了達諸佛自證法相是名種類俱生無作行意成身大慧三種身相當勤觀察爾時世尊欲重宣此義而說偈言非我乘大乘非說亦非字非諦非解脫非無有境界然乘摩訶衍三摩提自在種種意生身自在華莊嚴魏譯爾時世尊重說偈言我乘非大乘非說亦非字非諦非解脫非無有境界然乘摩訶衍三摩提自在種種意生身自在華莊嚴唐譯爾時世尊重說頌言我大乘非乘非聲亦非字非諦非解脫亦非無相境然乘摩訶衍三摩提自在種種意成身自在華莊嚴爾時大慧菩薩摩訶薩白佛言世尊如世尊說若男子女人行五無間業不入無擇地獄世尊云何男子女人行五無間業不入無擇地獄佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧云何五無間業所謂殺父母及害羅漢破壞衆僧惡心出佛身血魏譯爾時聖者大慧菩薩復白佛言世尊如世尊說善男子善女人行五無間業世尊何等是五無間業而善男子善女人行五無間入於無間佛告聖者大慧菩薩言善哉善哉善哉大慧諦聽諦聽當為汝說大慧白佛言善哉世尊唯然受教佛告大慧五無間者一者殺母二者殺父三者殺阿羅漢四者破和合僧五者惡心出佛身血唐譯爾時大慧菩薩摩訶薩復白佛言世尊如世尊說五無間業何者為五若人作已墮阿鼻獄佛言諦聽當為汝說大慧言唯佛告大慧五無間者所謂殺母殺父殺阿羅漢破和合僧懷惡逆心出佛身血大慧云何衆生母謂愛更受生貪喜俱如緣母立無明為父生入處聚落斷二根本名害父母魏譯大慧何者衆生母謂更受後生貪喜俱生如緣母立大慧何者為父謂無明為父生六入聚落大慧斷彼二種能生根本名害父母唐譯大慧何者為衆生母謂引生愛與貪喜俱如母養育何者為父所謂無明令生六處聚落中故斷二根本名殺父母彼諸使不現如鼠毒發諸法究竟斷彼名害羅漢魏譯大慧何者殺阿羅漢謂諸使如鼠毒發拔諸使怨根本不生大慧是名殺阿羅漢唐譯云何殺阿羅漢謂隨眠為怨如鼠毒發究竟斷彼是故說名殺阿羅漢云何破僧謂異相諸陰和合積聚究竟斷彼名為破僧魏譯大慧何者破和合僧謂五陰異相和合積聚究竟斷彼名為破僧唐譯云何破和合僧謂諸蘊異相和合積聚究竟斷彼名為破僧大慧不覺外自共相自心現量七識身以三解脫無漏惡想究竟斷彼七種識佛名為惡心出佛身血若男子女人行此無間事者名五無間亦名無間等魏譯大慧何者惡心出佛身血謂自相同相見外自心相八種識身依無漏三解脫門究竟斷八種識佛名為惡心出佛身血大慧是名內身五種無間若善男子善女人行此無間得名無間者無間者名證如實法故唐譯云何惡心出佛身血謂八識身妄生思覺見自心外自相共相以三解脫無漏惡心究竟斷彼八識身佛名為惡心出佛身血大慧是為內五無間若有作者無間即得現證實法復次大慧有外無間今當演說汝及餘菩薩摩訶薩聞是義已於未來世不墮愚癡云何五無間謂先所說無間若行此者於三解脫一一不得無間等法除此已餘化神力現無間等謂聲聞化神力菩薩化神力如來化神力為餘作無間罪者除疑悔過為勸發故神力變化現無間等無有一向作無間事不得無間等除覺自心現量離身財妄想離我我所攝受或時遇善知識解脫餘趣相續妄想魏譯復次大慧我為汝等說外五種無間之相諸菩薩聞是義已於未來世不生疑心大慧何者是外五種無間謂殺父母羅漢破和合僧出佛身血行此無間者於彼三種解脫門中不能得證一一解脫除依如來力住持應化聲聞菩薩如來神力為五種罪人懺悔疑心斷此疑心令生善根為彼罪人作應化說大慧若犯五種無間罪者畢竟不得證入道分除見自心唯是虗妄離身資生所依住處分別見我我所相於無量無邊劫中遇善知識於異道身離於自心虗妄見過唐譯復次大慧今為汝說外五無間令汝及餘菩薩聞是義已於未來世不生疑惑云何外五無間謂餘教中所說無間若有作者於三解脫不能現證唯除如來諸大菩薩及大聲聞見其有造無間業者為欲勸發令其改過以神通力示同其事尋即悔除證於解脫此皆化現非是實造若有實造無間業者終無現身而得解脫唯除覺了自心所現身資所住離我我所分別執見或於來世餘處受生遇善知識離分別過方證解脫爾時世尊欲重宣此義而說偈言貪愛名為母無明則為父覺境識為佛諸使為羅漢陰集名為僧無間次第斷謂是五無間不入無擇獄魏譯爾時世尊重說偈言貪愛名為母無明則為父了境識為佛諸使為羅漢陰聚名為僧無間斷相續更無有業間得真如無間唐譯爾時世尊重說頌言貪愛名為母無明則是父識了於境界此則名為佛隨眠阿羅漢蘊聚和合僧斷彼無餘間是名無間業爾時大慧菩薩復白佛言世尊惟願為說佛之知覺世尊何等是佛之知覺佛告大慧覺人法無我了知二障離二種死斷二煩惱是名佛之知覺聲聞緣覺得此法者亦名為佛以是因緣故我說一乘爾時世尊欲重宣此義而說偈言善知二無我二障煩惱斷永離二種死是名佛知覺魏譯爾時聖者大慧菩薩復白佛言世尊唯願為我說諸如來知覺之相佛告聖者大慧菩薩摩訶薩言大慧如實知人無我法無我如實能知二種障故遠離二種煩惱大慧是名如來如實知覺大慧聲聞辟支佛得此法者亦名為佛大慧是因緣故我說一乘爾時世尊重說偈言善知二無我二障二煩惱得不思議變是名佛知覺唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我說諸佛體性佛言大慧覺二無我除二種障離二種死斷二煩惱是佛體性大慧聲聞緣覺得此法已亦名為佛我以是義但說一乘爾時世尊重說頌言善知二無我除二障二惱及不思議死是故名如來爾時大慧菩薩白佛言世尊何故世尊於大衆中唱如是言我是過去一切佛及種種受生我爾時作曼陀轉輪聖王六牙大象及鸚鵡鳥釋提桓因善眼仙人如是等百千生經說魏譯爾時聖者大慧菩薩復白佛言世尊世尊何故於大衆中說如是言我是過去一切佛及說種種本生經我於爾時作頂生王六牙大象鸚鵡毗耶娑仙人帝釋王善眼菩薩如是等百千經皆說本生唐譯爾時大慧菩薩摩訶薩復白佛言世尊如來以何密意於大衆中唱如是言我是過去一切諸佛及說百千本生之事我於爾時作頂生王大象鸚鵡月光妙眼如是等佛告大慧以四等故如來應供等正覺於大衆中唱如是言我爾時作拘留孫拘那含牟尼迦葉佛云何四等謂字等語等法等身等是名四等以四種等故如來應供等正覺於大衆中唱如是言魏譯佛告聖者大慧菩薩摩訶薩言大慧依四種平等如來應正遍知於大衆中唱如是言我於爾時作拘留孫佛拘那含牟尼佛迦葉佛何等為四一者字平等二者語平等三者法平等四者身平等大慧依此四種平等法故諸佛如來在於衆中說如是言唐譯佛言大慧如來應正等覺依四平等祕密意故於大衆中作如是言我於昔時作拘留孫佛拘那含牟尼佛迦葉佛云何為四所謂字平等語平等身平等法平等云何字等若字稱我為佛彼字亦稱一切諸佛彼字自性無有差別是名字等云何語等謂我六十四種梵音言語相生彼諸如來應供等正覺亦如六十四種梵音言語相生無增無減無有差別迦陵頻伽梵音聲性云何身等謂我與諸佛法身及色身相好無有差別除為調伏彼彼諸趣差別衆生故示現種種差別色身是名身等云何法等謂我及彼佛得三十七菩提分法略說佛法無障礙智是名四等是故如來應供等正覺於大衆中唱如是言爾時世尊欲重宣此義而說偈言迦葉拘留孫拘那含是我以此四種等我為佛子說魏譯大慧何者字平等謂何等字過去佛名佛我同彼字亦名為佛不過彼字與彼字等無異無別大慧是名字平等大慧何者諸佛語平等謂過去佛有六十四種美妙梵聲言語說法我亦六十四種微妙梵聲言語說法大慧未來諸佛亦以六十四種微妙梵聲言語說法不增不減不異無差別迦陵頻伽梵聲美妙大慧是名諸佛語平等大慧何者諸佛身平等大慧我及諸佛法身色身相好莊嚴無異無差別除依可度衆生彼彼衆生種種生處諸佛如來現種種身大慧是名諸佛身平等大慧云何諸佛法平等謂彼佛及我得三十七菩提分法十力四無畏等大慧是名諸佛法平等大慧依此四種平等法故如來於大衆中作如是說我是過去頂生王等爾時世尊重說偈言迦葉拘留孫拘那含是我說諸佛子等依四平等故唐譯云何字平等謂我名佛一切如來亦名為佛佛名無別是為字等云何語平等謂我作六十四種梵音聲語一切如來亦作此語迦陵頻伽梵音聲性不增不減無有差別是名語等云何身平等謂我與諸佛法身色相及隨形好等無差別除為調伏種種衆生現隨類身是謂身等云何法平等謂我與諸佛皆同證得三十七種菩提分法是名法等是故如來應正等覺於大衆中作如是說爾時世尊重說頌言迦葉拘留孫拘那含是我依四平等故為諸佛子說大慧復白佛言如世尊所說我從某夜得最正覺乃至某夜入般涅槃於其中間乃至不說一字亦不已說當說不說是佛說世尊如來應供等正覺何因說言不說是佛說佛告大慧我因二法故作如是說云何二法謂緣自得法及本住法是名二法因此二法故我如是說魏譯大慧菩薩復白佛言世尊如來說言我何等夜證大菩提何等夜入般涅槃我於中間不說一字佛言非言世尊依何義說如是語佛語非語佛告大慧言大慧如來依二種法說如是言何者為二我說如是一者依自身內證法二者依本住法我依此二法作如是言唐譯爾時大慧菩薩摩訶薩復白佛言世尊如世尊說我於某夜成最正覺乃至某夜當入涅槃於其中間不說一字亦不已說亦不當說不說是佛說世尊依何密意作如是語佛言大慧依二密法故作如是說云何二法謂自證法及本住法云何緣自得法若彼如來所得我亦得之無增無減緣自得法究竟境界離言說妄想離字二趣魏譯大慧云何依自身內證法謂彼過去諸佛如來所證得法我亦如是證得不增不減自身內證諸境界行離言語分別相離二種字故唐譯云何自證法謂諸佛所證我亦同證不增不減證智所行離言說相離分別相離名字相云何本住法謂古先聖道如金銀等性法界常住若如來出世若不出世法界常住如趣彼城道譬如士夫行曠野中見向古城平坦正道即隨入城受如意樂大慧於意云何彼作是道及城中種種樂耶答言不也佛告大慧我及過去一切諸佛法界常住亦復如是是故說言我從某夜得最正覺乃至某夜入般涅槃於其中間不說一字亦不已說當說爾時世尊欲重宣此義而說偈言我某夜成道至某夜涅槃於此二中間我都無所說緣自得法住故我作是說彼佛及與我悉無有差別魏譯大慧何者本法住大慧謂本行路平坦譬如金銀珍珠等寶在於彼處大慧是名法性本住處大慧諸佛如來出世不出世法性法界法住法相法證常住如城本道大慧譬如有人行曠野中見向本城平坦正道即隨入城入彼城已受種種樂作種種業大慧於意云何彼人始作是道隨入城耶始作種種諸莊嚴耶大慧白佛不也世尊大慧我及過去一切諸佛法性法界法住法相法證常住亦復如是大慧我依此義於大衆中作如是說我何等夜得大菩提何等夜入般涅槃此二中間不說一字亦不已說當說現說爾時世尊重說偈言我何夜成道何等夜涅槃於此二中間我都無所說內身證法性我依如是說十方佛及我諸法無差別唐譯云何本住法謂法本性如金等在礦若佛出世若不出世法住法位法界法性皆悉常住大慧譬如有人行曠野中見向古城平坦舊道即便隨入止息遊戲大慧於汝意云何彼作是道及以城中種種物耶白言不也佛言大慧我及諸佛所證真如常住法性亦復如是是故說言始從成佛乃至涅槃於其中間不說一字亦不已說亦不當說爾時世尊重說頌言某夜成正覺某夜般涅槃於此二中間我都無所說自證本住法故作是密語我及諸如來無有少差別爾時大慧菩薩復請世尊惟願為說一切法有無有相令我及餘菩薩摩訶薩離有無有相疾得阿耨多羅三藐三菩提佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧此世間依有二種謂依有及無墮性非性欲見不離離相魏譯爾時聖者大慧菩薩復請佛言唯願世尊說一切法有無相令我及餘菩薩大衆得聞是已離有無相疾得阿耨多羅三藐三菩提佛告聖者大慧菩薩言善哉善哉善哉大慧諦聽諦聽當為汝說大慧白佛言善哉世尊唯然受教佛告大慧世間人多墮於二見何等二見一者見有二者見無以見有諸法見無諸法故非究竟法生究竟想唐譯爾時大慧菩薩摩訶薩復白佛言世尊願說一切法有無相令我及諸菩薩摩訶薩離此相疾得阿耨多羅三藐三菩提佛言諦聽當為汝說大慧言唯佛言大慧世間衆生多墮二見謂有見無見墮二見故非出出想大慧云何世間依有謂有世間因緣生非不有從有生非無有生大慧彼如是說者是說世間無因大慧云何世間依無謂受貪恚癡性已然後妄想計著貪恚癡性非性大慧若不取有性者性相寂靜故謂諸如來聲聞緣覺不取貪恚癡性為有為無魏譯大慧云何世間墮於有見謂實有因緣而生諸法非不實有實有法生非無法生大慧世間人如是說者是名為說無因無緣及謗世間無因無緣而生諸法大慧世間人云何墮於無見謂說言貪嗔癡實有貪嗔癡而復說言無貪瞋癡分別有無大慧若復有人作如是言無有諸法以不見諸物相故大慧若復有人作如是言聲聞辟支佛無貪無瞋無癡復言先有唐譯云何有見謂實有因緣而生諸法非不實有實有諸法從因緣生非無法生大慧如是說者則說無因云何無見謂知受貪瞋癡已而妄計言無大慧及彼分別有相而不受諸法有復有知諸如來聲聞緣覺無貪瞋癡性而計為非有大慧此中何等為壞者大慧白佛言世尊若彼取貪恚癡性後不復取佛告大慧善哉善哉汝如是解大慧非但貪恚癡性非性為壞者於聲聞緣覺及佛亦是壞者所以者何謂內外不可得故煩惱性異不異故魏譯此二人者何等人勝何等人不如大慧菩薩言若人言先有貪嗔癡後時無此人不如佛告大慧善哉善哉善哉大慧汝解我問大慧非但言先實有貪瞋癡後時言無同衛世師等是故不如大慧非但不如滅一切聲聞辟支佛法何以故大慧以實無內外諸法故以非一非異故以諸煩惱非一非異故唐譯此中誰為壞者大慧白言謂有貪瞋癡性後取於無名為壞者佛言善哉汝解我問此人非止無貪瞋癡名為壞者亦壞如來聲聞緣覺何以故煩惱內外不可得故體性非異非不異故大慧貪恚癡若內若外不可得貪恚癡性無身故無取故非佛聲聞緣覺是壞者佛聲聞緣覺自性解脫故縛與縛因非性故大慧若有縛者應有縛是縛因故大慧如是說壞者是名無有相魏譯大慧貪嗔癡法內身不可得外法中亦不可得無實體故故我不許大慧我不許者不許有貪瞋癡是故彼人滅聲聞辟支佛法何以故諸佛如來知寂靜法聲聞緣覺不見法故以無能縛所縛因故大慧若有能縛必有所縛若有所縛必有能縛因大慧如是說者名滅諸法大慧是名無法相唐譯大慧貪瞋癡性若內若外皆不可得無體性故無可取故聲聞緣覺及以如來本性解脫無有能縛及縛因故大慧若有能縛及以縛因則有所縛作如是說名為壞者是為無有相大慧因是故我說寧取人見如須彌山不起無所有增上慢空見大慧無所有增上慢者是名為壞墮自共相見希望不知自心現量見外性無常剎那展轉壞陰界入相續流注變滅離文字相妄想是名為壞者魏譯大慧我依此義餘經中說寧起我見如須彌山而起憍慢不言諸法是空無也大慧增上慢人言諸法無者是滅諸法墮自相同相見故以見自心見法故以見外物無常故諸相展轉彼彼差別故以見陰界入相續體彼彼因展轉而生以自心虗妄分別是故大慧如此人者滅諸佛法唐譯我依此義密意而說寧起我見如須彌山不起空見懷增上慢若起此見名為壞者墮自共見樂欲之中不了諸法唯心所現以不了故見有外法剎那無常展轉差別蘊界處相相續流轉起已還滅虗妄分別離文字相亦成壞者爾時世尊欲重宣此義而說偈言有無是二邊乃至心境界淨除彼境界平等心寂滅無取境界性滅非無所有有事悉如如如賢聖境界無種而有生生已而復滅因緣有非有不住我教法非外道非佛非我亦非餘因緣所集起云何而得無誰集因緣有而復說言無邪見論生法妄想計有無若知無所生亦復無所滅觀此悉空寂有無二俱離魏譯爾時世尊重說偈言有無是二邊以為心境界離諸境界法平等心寂靜無取境界法滅非有非無如真如本有彼是聖境界本無而有生生已還復滅非有非無生彼不住我教非外道非佛非我亦非餘從因緣不成云何得言有若因緣不生云何而言無邪見論生法妄想計有無若知無所生亦知無所滅觀世悉空寂彼不墮有無唐譯爾時世尊重說頌言有無是二邊乃至心所行淨除彼所行平等心寂滅不取於境界非滅無所有有真如妙物如諸聖所行本無而有生生已而復滅因緣有及無彼非住我法非外道非佛非我非餘衆能以緣成有云何而得無誰以緣成有而復得言無惡見說為生妄想計有無若知無所生亦復無所滅觀世悉空寂有無二俱離爾時大慧菩薩復白佛言世尊惟願為我及諸菩薩說宗通相若善分別宗通相者我及諸菩薩通達是相通達是相已速成阿耨多羅三藐三菩提不隨覺想及衆魔外道佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧一切聲聞緣覺菩薩有二種通相謂宗通及說通魏譯爾時聖者大慧菩薩復白佛言世尊唯願如來應正遍知天人師為我及諸一切菩薩建立修行正法之相我及一切菩薩摩訶薩善知修行正法相已速得成就阿耨多羅三藐三菩提不墮一切虗妄覺觀魔事故佛告大慧菩薩言善哉善哉善哉大慧諦聽諦聽我為汝說大慧言善哉世尊唯然受教佛告大慧言大慧有二種法諸佛如來菩薩聲聞辟支佛建立修行正法之相何等為二一者建立正法相二者說建立正法相唐譯爾時大慧菩薩摩訶薩復請佛言世尊唯願為說宗趣之相令我及諸菩薩摩訶薩善達此義不隨一切衆邪妄解疾得阿耨多羅三藐三菩提佛言諦聽當為汝說大慧言唯佛言大慧一切二乘及諸菩薩有二種宗法相何等為二謂宗趣法相言說法相大慧宗通者謂緣自得勝進相遠離言說文字妄想趣無漏界自覺地自相遠離一切虗妄覺想降伏一切外道衆魔緣自覺趣光明輝發是名宗通相魏譯大慧何者建立正法相謂自身內證諸勝法相離文字語言章句能取無漏正戒證諸地修行相法離諸外道虗妄覺觀諸魔境界降伏一切外道諸魔顯示自身內證之法如實修行大慧是名建立正法之相唐譯宗趣法相者謂自所證殊勝之相離於文字語言分別入無漏界成自地行超過一切不正思覺伏魔外道生智慧光是名宗趣法相云何說通相謂說九部種種教法離異不異有無等相以巧方便隨順衆生如應說法令得度脫是名說通相大慧汝及餘菩薩應當修學魏譯大慧何者建立說法之相謂說九部種種教法離於一異有無取相先說善巧方便為令衆生入所樂處謂隨衆生信彼彼法說彼彼法大慧是名建立說法相大慧汝及諸菩薩應當修學如是正法唐譯言說法相者謂說九部種種教法離於一異有無等相以巧方便隨衆生心令入此法是名言說法相汝及諸菩薩當勤修學爾時世尊欲重宣此義而說偈言宗及說通相緣自與教法善見善分別不隨諸覺想魏譯爾時世尊重說偈言建立內證法及說法相名若能善分別不隨他教相唐譯爾時世尊重說頌言宗趣與言說自證及教法若能善知見不隨他妄解非有真實性如愚夫妄想云何起妄想非性為解脫魏譯實無外諸法如凡夫分別若諸法虗妄何故取解脫唐譯如愚所分別非是真實相彼豈不求度無法而可得觀察諸有為生滅等相續增長於二見顛倒無所知一是為真諦無罪為涅槃觀察世妄想如幻夢芭蕉魏譯觀察諸有為生滅等相縛增長於二見不能知因緣涅槃離於識唯此一法實觀世間虗妄如幻夢芭蕉唐譯觀察諸有為生滅等相續增長於二見顛倒無所知涅槃離心意唯此一法實觀世悉虗妄如幻夢芭蕉雖有貪恚癡而實無有人從愛生諸陰有皆如幻夢魏譯雖有貪瞋癡而無有作者從愛生諸陰有皆如幻夢唐譯無有貪恚癡亦復無有人從愛生諸蘊如夢之所見爾時大慧菩薩白佛言世尊惟願為說不實妄想相不實妄想云何而生說何等法名不實妄想於何等法中不實妄想佛告大慧善哉善哉能問如來如是之義多所饒益多所安樂哀愍世間一切天人諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧種種義種種不實妄想計著妄想生大慧攝所攝計著不知自心現量及墮有無見增長外道見妄想習氣計著外種種義心心數妄想計著我我所生魏譯爾時聖者大慧菩薩復請佛言世尊唯願如來應正遍知為諸菩薩說不實妄想何等法中不實妄想佛告大慧菩薩言善哉善哉善哉大慧汝為安隱一切衆生饒益一切衆生安樂一切衆生哀愍一切世間天人請我此事大慧諦聽諦聽當為汝說大慧言善哉世尊唯然受教佛告大慧一切衆生執著不實虗妄想者從見種種虗妄法生以著虗妄能取可取諸境界故入自心見生虗妄想故墮於有無二見朋黨非法聚中增長成就外道虗妄異見熏習故大慧以取外諸戲論義故起於虗妄心心數法猶如草束分別我我所法大慧以是義故生不實妄想唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我說虗妄分別相此虗妄分別云何而生是何而生因何而生誰之所生何故名為虗妄分別佛言大慧善哉善哉汝為哀愍世間天人而問此義多所利益多所安樂諦聽諦聽善思念之當為汝說大慧言唯佛言大慧一切衆生於種種境不能了達自心所現計能所取虗妄執著起諸分別墮有無見增長外道妄見習氣心心所法相應起時執有外義種種可得計著於我及以我所是故名為虗妄分別大慧白佛言世尊若種種義種種不實妄想計著妄想生攝所攝計著不知自心現量及墮有無見增長外道見妄想習氣計著外種種義心心數妄想我我所計著生世尊若如是外種種義相墮有無相離性非性離見相世尊第一義亦如是離量根分譬因相世尊何故一處妄想不實義種種性計著妄想生非計著第一義處相妄想生將無世尊說邪因論耶說一生一不生魏譯大慧白佛言世尊若諸衆生執著不實虗妄想者從見種種虗妄法生執著虗妄能取可取一切境界入自心見生虗妄想墮於有無二見朋黨分別聚中增長成就外道虗妄異見熏習以取外諸戲論之義不實妄想起於虗妄心心數法猶如草束取我我所者世尊如彼依外種種境界種種相墮有墮無朋黨相中離有無見相世尊第一義諦亦應如是遠離阿含聖所說法遠離諸根遠離建立三種之法譬喻因相世尊云何一處種種分別執著種種虗妄想生何故不著第一義諦虗妄分別而生分別世尊世尊如是說法非平等說無因而說何以故一處生一處不生故若世尊如是說者墮二朋黨以見執著虗妄分別而生分別以世尊說如世幻師依種種因緣生種種色像以世尊自心虗妄分別以世尊言種種虗妄若有若無不可言說為離分別如是如來墮世間論入邪見心朋黨聚中唐譯大慧白言若如是者外種種義性離有無起諸見相世尊第一義諦亦復如是離諸根量宗因譬喻世尊何故於種種義言起分別第一義中不言起耶將無世尊所言乖理一處言起一不言故世尊又說虗妄分別墮有無見譬如幻事種種非實分別亦爾有無相離云何而說墮二見耶此說豈不墮於世見佛告大慧非妄想一生一不生所以者何謂有無妄想不生故外現性非性覺自心現量妄想不生大慧我說餘愚夫自心種種妄想相故事業在前種種妄想性相計著生云何愚夫得離我我所計著見離作所作因緣過覺自妄想心量身心轉變究竟明解一切地如來自覺境界離五法自性事見妄想以是因緣故我說妄想從種種不實義計著生知如實義得解脫自心種種妄想魏譯佛告大慧我分別虗妄不生不滅何以故不生有無分別相故不見一切外有無故大慧以見自心如實見故虗妄分別不生不滅大慧我此所說唯為愚癡凡夫而說自心分別分別種種隨先心生分別種種有相執著何以故若不說者愚癡凡夫不離自心虗妄覺知不離執著我我所見不離因果諸因緣過如實覺知二種心故善知一切諸地行相善知諸佛自身所行內證境界轉五法體見分別相入如來地大慧因是事故我說一切諸衆生等執著不實虗妄生心自心分別種種諸義以是義故一切衆生知如實義而得解脫唐譯佛言大慧分別不生不滅何以故不起有無分別相故所見外法皆無有故了唯自心之所現故但以愚夫分別自心種種諸法著種種相而作是說令知所見皆是自心斷我我所一切見著離作所作諸惡因緣覺唯心故轉其意樂善明諸地入佛境界捨五法自性諸分別見是故我說虗妄分別執著種種自心所現諸境界生如實了知則得解脫爾時世尊欲重宣此義而說偈言諸因及與緣從此生世間妄想著四句不知我所通世間非有生亦復非無生不從有無生亦非非有無諸因及與緣云何愚妄想非有亦非無亦復非有無如是觀世間心轉得無我一切性不生以從緣生故一切緣所作所作非自有事不自生事有二事過故無二事過故非有性可得魏譯爾時世尊重說偈言諸因及與緣從此生世間妄想著四句彼不知我說世有無不生離有無不生云何愚分別依因緣生法若能見世間有無非有無轉於虗妄心得真無我法諸法本不生故依因緣生諸緣即是果從果不生有從果不生果若爾有二果若有二果者果中果難得唐譯爾時世尊重說頌言諸因及與緣從此生世間與四句相應不知於我法世非有無生亦非俱不俱云何諸愚夫分別因緣起非有亦非無亦復非有無如是觀世間心轉證無我一切法不生以從緣生故諸緣之所作所作法非生果不自生果有二果失故無有二果故非有性可得觀諸有為法離攀緣所緣無心之心量我說為心量量者自性處緣性二俱離性究竟妙淨我說名心量魏譯觀諸有為法離念及所念見諸唯心法故我說唯心量體及形相離緣及諸法究竟有真淨我說如是量唐譯觀諸有為法離能緣所緣決定唯是心故我說心量量之自性處緣法二俱離究竟妙淨事我說名心量施設世諦我彼則無實事諸陰陰施設無事亦復然有四種平等相及因性生第三無我等第四修修者魏譯假名世諦我彼則無實事諸陰陰假名假名非實法有四種平等相因生無我如是四平等是修行者法唐譯施設假名我而實不可得諸蘊蘊假名亦皆無實事有四種平等相因及所生無我為第四修行者觀察妄想習氣轉有種種心生境界於外現是世俗心量外現而非有心見彼種種建立於身財我說為心量魏譯分別依熏縛心依諸境生衆生見外境故我說唯心可見外法無心盡見如是身資生住處故我說唯心唐譯妄想習氣縛種種從心生衆生見為外我說是心量外所見非有而心種種現身資及所住我說是心量離一切諸見及離想所想無得亦無生我說為心量非性非非性性非性悉離謂彼心解脫我說為心量如如與空際涅槃及法界種種意生身我說為心量魏譯轉一切諸見離分別分別不見及不生故我說唯心非有非無法離有無諸法如是離心法故我說唯心真如空實際涅槃及法界意身身心等故我說唯心唐譯離一切諸見及能所分別無得亦無生我說是心量非有亦非無有無二俱離如是心亦離我說是心量真如空實際涅槃及法界種種意成身我說是心量爾時大慧菩薩白佛言世尊如世尊所說菩薩摩訶薩當善語義云何為菩薩善語義云何為語云何為義佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧云何為語謂言字妄想和合依咽喉脣舌齒齗頰輔因彼我言說妄想習氣計著生是名為語魏譯爾時聖者大慧菩薩復白佛言世尊如來說言如我所說汝及諸菩薩莫著音聲言語之義世尊云何菩薩不著言語之義世尊何者為言語何者為義佛告聖者大慧菩薩言善哉善哉善哉大慧當為汝說大慧言善哉世尊唯然受教佛告大慧何者為聲謂依無始熏習言語名字和合分別因於喉鼻齒頰脣舌和合動轉出彼言語分別諸法是名為聲唐譯爾時大慧菩薩摩訶薩復白佛言世尊如來說言如我所說汝及諸菩薩不應依語而取其義世尊何故不應依語取義云何為語云何為義佛言諦聽當為汝說大慧言唯佛言大慧語者所謂分別習氣而為其因依於喉舌脣齶齒輔而出種種音聲文字相對談說是名為語大慧云何為義謂離一切妄想相言說相是名為義大慧菩薩摩訶薩於如是義獨一靜處聞思修慧緣自覺了向涅槃城習氣身轉變已自覺境界觀地地中間勝進義相是名菩薩摩訶薩善義魏譯大慧何者為義菩薩摩訶薩依聞思修聖智慧力於空間處獨坐思惟云何涅槃趣涅槃道觀察內身修行境界地地處處修行勝相轉彼無始熏習之因大慧是名菩薩善解義相唐譯云何為義菩薩摩訶薩住獨一靜處以聞思修慧思惟觀察向涅槃道自智境界轉諸習氣行於諸地種種行相是名為義復次大慧善語義菩薩摩訶薩觀語與義非異非不異觀義與語亦復如是若語異義者則不因語辨義而以語入義如燈照色魏譯復次大慧云何菩薩摩訶薩善解言語義大慧菩薩見言語聲義不一不異見義言語聲不一不異大慧若言言語離於義者不應因彼言語聲故而有於義而義依彼言語了別大慧如依於燈了別衆色大慧譬如有人然燈觀察種種珍寶此處如是如是彼處如是如是大慧菩薩依言語聲燈離言語入自內身修行義故唐譯復次大慧菩薩摩訶薩善於語義知語與義不一不異義之與語亦復如是若義異語則不應因語而顯於義而因語見義如燈照色大慧譬如有人持燈照物知此物如是在如是處菩薩摩訶薩亦復如是因言語燈入離言說自證境界復次大慧不生不滅自性涅槃三乘一乘心自性等如緣言說義計著墮建立及誹謗見異建立異妄想如幻種種妄想現譬如種種幻凡愚衆生作異妄想非聖賢也魏譯復次大慧一切諸法不生不滅自性本來入於涅槃三乘一乘五法心諸法體等同言語聲義依衆緣取相墮有無見謗於諸法見諸法體各住異相分別異相如是分別已見種種法相如幻見種種分別大慧譬如幻種種異異分別非謂聖人是凡夫見唐譯復次大慧若有於不生不滅自性涅槃三乘一乘五法諸心自性等中如言取義則墮建立及誹謗見以異於彼起分別故如見幻事計以為實是愚夫見非賢聖也爾時世尊欲重宣此義而說偈言彼言說妄想建立於諸法以彼建立故死墮泥犁中陰中無有我陰非即是我不如彼妄想亦復非無我一切悉有性如凡愚妄想若如彼所見一切應見諦一切法無性淨穢悉無有不實如彼見亦非無所有魏譯爾時世尊重說偈言分別言語聲建立於諸法以彼建立故故墮於惡道五陰中無我我中無五陰不如彼妄想亦復非是無凡夫妄分別見諸法實有若如彼所見一切應見真一切法若無染淨亦應無彼見無如是亦非無所有唐譯爾時世尊重說頌言若隨言取義建立於諸法以彼建立故死墮地獄中蘊中無有我非蘊即是我不如彼分別亦復非無有如愚所分別一切皆有性若如彼所見皆應見真實一切染淨法悉皆無體性不如彼所見亦非無所有復次大慧智識相今當說若善分別智識相者汝及諸菩薩則能通達智識之相疾得阿耨多羅三藐三菩提大慧彼智有三種謂世間出世間出世間上上云何世間智謂一切外道凡夫計著有無云何出世間智謂一切聲聞緣覺墮自共相希望計著云何出世間上上智謂諸佛菩薩觀無所有法見不生不滅離有無品入如來地人法無我緣自得魏譯復次大慧我今為汝說智識相汝及諸菩薩摩訶薩應善知彼智識之相如實修行智識相故疾得阿耨多羅三藐三菩提大慧有三種智何等為三一者世間智二者出世間智三者出世間上上智大慧何者世間智謂外道凡夫人等執著一切諸法有無是名世間智相大慧何者出世間智謂諸一切聲聞緣覺虗妄分別自相同相是名出世間智大慧何者出世間上上智謂佛如來菩薩摩訶薩觀察一切諸法寂靜不生不滅得如來地無我證法離彼有無朋黨二見唐譯復次大慧我當為汝說智識相汝及諸菩薩摩訶薩若善了知智識之相則能疾得阿耨多羅三藐三菩提大慧智有三種謂世間智出世間智出世間上上智云何世間智謂一切外道凡愚計有無法云何出世間智謂一切二乘著自共相云何出世間上上智謂諸佛菩薩觀一切法皆無有相不生不滅非有非無證法無我入如來地大慧彼生滅者是識不生不滅者是智復次墮相無相及墮有無種種相因是識超有無相是智復次長養相是識非長養相是智魏譯大慧識者生滅相智者不生滅相復次大慧識者墮於有相無相墮彼有無種種相因大慧智相者遠離有相無相有無因相名為智相復次大慧集諸法者名為識相不集諸法名為智相唐譯復次大慧生滅是識不生滅是智墮相無相及以有無種種相因是識離相無相及有無因是智有積集相是識無積集相是智復次有三種智謂知生滅知自共相知不生不滅復次無礙相是智境界種種礙相是識復次三事和合生方便相是識無事方便自性相是智復次得相是識不得相是智自得聖智境界不出不入故如水中月魏譯大慧智有三種何等為三一者觀察自相同相二者觀察生相滅相三者觀察不生不滅相復次大慧所言智者無障礙相識者識彼諸境界相復次大慧識者和合起作所作名為識相無礙法相應名為智相復次大慧無所得相名之為智以自內身證得聖智修行故出入諸法如水中月是名智相唐譯大慧復有三種智謂知自相共相智知生滅智知不生不滅智著境界相是識不著境界相是智三和合相應生是識無礙相應自性相是智有得相是識無得相是智證自聖智所得境界如水中月不入不出故爾時世尊欲重宣此義而說偈言採集業為識不採集為智觀察一切法通達無所有逮得自在力是則名為慧縛境界為心覺想生為智無所有及勝慧則從是生魏譯爾時世尊重說偈言識能集諸業智能了分別慧能得無相及妙莊嚴境識為境界縛智能了諸境無相及勝境是慧所住處唐譯爾時世尊重說頌言採集業為心觀察法為智慧能證無相逮自在威光境界縛為心覺相生為智無相及增勝智慧於中起心意及與識遠離思惟想得無思想法佛子非聲聞寂靜勝進忍如來清淨智生於善勝義所行悉遠離魏譯心意及與識遠離於諸想聲聞分別法非是諸弟子寂靜勝進忍如來清淨智生於善勝智遠離諸所行唐譯心意及與識離諸分別相得無分別法佛子非聲聞寂滅殊勝忍如來清淨智生於善勝義遠離諸所行我有三種智聖開發真實於彼想思惟悉攝受諸性二乘不相應智離諸所有計著於自性從諸聲聞生超度諸心量如來智清淨魏譯我有三種慧依彼得聖名於彼相分別能聞於有無離於二乘行慧離於境界取於有無相從諸聲聞生唯入如是心智慧無垢相唐譯我有三種智聖者能明照分別於諸相開示一切法我智離諸相超過於二乘以諸聲聞等執著諸法有如來智無垢了達唯心故復次大慧外道有九種轉變論外道轉變見生所謂形處轉變相轉變因轉變成轉變見轉變性轉變緣分明轉變所作分明轉變事轉變大慧是名九種轉變見一切外道因是起有無生轉變論云何形處轉變謂形處異見譬如金變作諸器物則有種種形處顯現非金性變一切性變亦復如是或有外道作如是妄想乃至事變妄想彼非如非異妄想故魏譯復次大慧諸外道有九種轉變見何等為九一者形相轉變二者相轉變三者因轉變四者相應轉變五者見轉變六者物轉變七者緣了別轉變八者作法了別轉變九者生轉變大慧是名九種轉變見依九種轉變見故一切外道說於轉變從有無生大慧何者外道形相轉變大慧譬如以金作莊嚴具鐶釧瓔珞種種各異形相雖殊金體不變一切外道分別諸法形相轉變亦復如是大慧復有外道分別諸法依因轉變大慧而彼諸法亦非如是非不如是以依分別故唐譯復次大慧諸外道有九種轉變見所謂形轉變相轉變因轉變相應轉變見轉變物轉變緣明了轉變所作明了轉變生轉變是為九一切外道因是見故起有無轉變論此中形轉變者謂形別異見譬如以金作莊嚴具鐶釧瓔珞種種不同形狀有殊金體無易一切法變亦復如是諸餘外道種種計著皆非如是亦非別異但分別故如是一切性轉變當知如乳酪酒果等熟外道轉變妄想彼亦無有轉變若有若無自心現外性非性大慧如是凡愚衆生自妄想修習生大慧無有法若生若滅如見夢幻色生魏譯大慧如是一切轉變亦爾應知譬如乳酪酒果等熟一一轉變一切外道分別轉變亦復如是而無實法可以轉變以自心見有無可取分別有無故大慧一切凡夫亦復如是以依自心分別而生一切諸法大慧無有法生無有法轉如幻夢中見諸色事大慧譬如夢中見一切事石女兒生死唐譯一切轉變如是應知譬如乳酪酒果等熟外道言此皆有轉變而實無有若有若無自心所見無外物故如此皆是愚迷凡夫從自分別習氣而起實無一法若生若滅如因幻夢所見諸色如石女兒說有生死爾時世尊欲重宣此義而說偈言形處時轉變四大種諸根中陰漸次生妄想非明智最勝於緣起非如彼妄想然世間緣起如犍闥婆城魏譯爾時世尊重說偈言轉變時形相四大種諸根中陰及諸取如是取非智因緣生世間佛不如是說因緣即世間如犍闥婆城唐譯爾時世尊重說頌言形處時轉變大種及諸根中有漸次生妄想非明智妄想不分別緣起及世間但諸緣世間如乾闥婆城
