body:
  text: 明臨濟正宗中都沙門員珂會譯一切佛語心品第四之下爾時大慧菩薩復白佛言世尊惟願世尊更為我說陰界入生滅彼無有我誰生誰滅愚夫者依於生滅不覺苦盡不識涅槃佛言善哉諦聽當為汝說大慧白佛言唯然受教魏譯爾時聖者大慧菩薩摩訶薩復請佛言世尊惟願如來應正徧知為我說善逝為我說陰界入生滅之相世尊若無我者誰生誰滅世尊一切凡夫依生滅住不見苦盡是故不知涅槃之相佛告聖者大慧菩薩言善哉善哉善哉大慧汝今諦聽當為汝說大慧白佛言善哉世尊唯然受教唐譯爾時大慧菩薩摩訶薩白佛言世尊唯願為我說蘊界處生滅之相若無有我誰生誰滅而諸凡夫依於生滅不求苦盡不證涅槃佛言大慧諦聽諦聽當為汝說佛告大慧如來之藏是善不善因能徧興造一切趣生譬如伎兒變現諸趣離我我所不覺彼故三緣和合方便而生外道不覺計着作者為無始虗偽惡習所熏名為識藏生無明住地與七識俱如海浪身常生不斷離無常過離於我論自性無垢畢竟清淨魏譯佛告大慧如來之藏是善不善因故不與六道作生死因緣譬如技兒出種種技眾生依於如來藏故五道生死大慧而如來藏離我我所諸外道等不知不覺是故三界生死因緣不斷大慧諸外道等妄計我故不能如實見如來藏以諸外道無始世來虗妄執著種種戲論諸熏習故大慧阿黎耶識者名如來藏而與無明七識共俱如大海波常不斷絕身俱生故離無常過離於我過自性清淨唐譯大慧如來藏是善不善因能遍興造一切趣生譬如伎兒變現諸趣離我我所以不覺故三緣和合而有果生外道不知執為作者無始虗偽惡習所熏名為藏識生於七識無明住地譬如大海而有波浪其體相續恒住不斷本性清淨離無常過離於我論其餘諸識有生有滅意意識等念念有七因不實妄想取諸境界種種形處計著名相不覺自心所現色相不覺苦樂不至解脫名相諸纏貪生生貪若因若攀緣彼諸受根滅次第不生餘自心妄想不知苦樂入滅受想正受第四禪魏譯餘七識者心意意識等念念不住是生滅法七識由彼虗妄因生不能如實分別諸法觀於高下長短形相故執著名相故能令自心見色相故能得苦樂故能離解脫因故因名相生墮煩惱貪故依彼念因諸根滅盡故不次第生故餘自意分別不生苦樂受故是故入少想定滅盡定入三摩䟦提四禪唐譯其餘七識意意識等念念生滅妄想為因境相為緣和合而生不了色等自心所現計著名相起苦樂受名相纏縛既從貪生復生於貪若因及所緣諸取根滅不相續生自慧分別苦樂受者或得滅定或得四禪善真諦解脫脩行者作解脫想不離不轉名如來藏識藏七識流轉不滅所以者何彼因攀緣諸識生故非聲聞緣覺脩行境界不覺無我自共相攝受生陰界入見如來藏五法自性人法無我則滅魏譯實諦解脫若脩行者生解脫相以不轉滅虗妄相故大慧如來藏識不在阿黎耶識中是故七種識有生有滅如來藏識不生不滅何以故彼七種識依諸境界念觀而生此七識境界一切聲聞辟支佛外道脩行者不能覺知不如實知人無我故以取同相別相法故以見陰界入法等故大慧如來藏如實見五法體相法無我故不生如實知唐譯或復善入諸諦解脫便妄生於得解脫想而實未捨未轉如來藏中藏識之名若無藏識七識則滅何以故因彼及所緣而得生故然非一切外道二乘諸脩行者所知境界以彼唯了人無我性於蘊界處取於自相及共相故若見如來藏五法自性諸法無我地次第相續轉進餘外道見不能傾動是名住菩薩不動地得十三昧道門樂三昧覺所持觀察不思議佛法自願不受三昧門樂及實際向自覺聖趣不共一切聲聞緣覺及諸外道所修行道得十賢聖種性道及身智意生離三昧行是故大慧菩薩摩訶薩欲求勝進者當淨如來藏及識藏名魏譯諸地次第展轉和合故餘外道不正見不能觀察大慧菩薩住不動地爾時得十種三昧門等為上首得無量無邊三昧依三昧佛住持觀察不可思議諸佛法及自本願力故遮護三昧門實際境界遮已入自內身聖智證法真實境界不同聲聞辟支佛外道脩行所觀境界爾時過彼十種聖道入於如來意生身智身離諸功用三昧心故是故大慧諸菩薩摩訶薩欲證勝法如來藏阿黎耶識者應當脩行令清淨故唐譯隨地次第而漸轉滅不為外道惡見所動住不動地得於十種三昧樂門為三昧力諸佛所持觀察不思議佛法及本願力不住實際及三昧樂獲自證智不與二乘諸外道共得十聖種性道及意成智身離於諸行是故大慧菩薩摩訶薩欲得勝法應淨如來藏藏識之名大慧若無識藏名如來藏者則無生滅大慧然諸凡聖悉有生滅脩行者自覺聖智現法樂住不捨方便大慧此如來藏識藏一切聲聞緣覺心想所見雖自性清淨客塵所覆故猶見不淨非諸如來大慧如來者現前境界猶如掌中視阿摩勒果魏譯大慧若如來藏阿黎耶識名為無者離阿黎耶識無生無滅一切凡夫及諸聖人依彼阿黎耶識故有生有滅以依阿黎耶識故諸脩行者入自內身聖行所證現法樂行而不休息大慧此如來心阿黎耶識如來藏識境界一切聲聞辟支佛諸外道等不能分別何以故以如來藏是清淨相客塵煩惱垢染不淨唐譯大慧若無如來藏名藏識者則無生滅然諸凡夫及以聖人悉有生滅是故一切諸脩行者雖見內境住現法樂而不捨於勇猛精進大慧此如來藏藏識本性清淨客塵所染而為不淨一切二乘及諸外道憶度起見不能現證如來於此分明現見如觀掌中菴摩勒果大慧我於此義以神力建立令勝鬘夫人及利智滿足諸菩薩等宣揚演說如來藏及識藏名七識俱生聲聞計著見人法無我故勝鬘夫人承佛威神說如來境界非聲聞緣覺及外道境界如來藏識藏唯佛及餘利智依義菩薩智慧境界是故汝及餘菩薩摩訶薩於如來藏識藏當勤脩學莫但聞覺作知足想魏譯大慧我依此義依勝鬘夫人依於菩薩摩訶薩深智慧者說如來藏阿黎耶識共七種識生名轉滅相為諸聲聞辟支佛等示法無我對勝鬘說言如來藏是如來境界大慧如來藏識阿黎耶識境界我今與汝及諸菩薩甚深智者能了分別此二種法諸餘聲聞辟支佛及外道等執著名字者不能了知如此二法大慧是故汝及諸菩薩摩訶薩當學此法唐譯大慧我為勝鬘夫人及餘深妙淨智菩薩說如來藏名藏識與七識俱起令諸聲聞見法無我大慧為勝鬘夫人說佛境界非是外道二乘境界大慧此如來藏藏識是佛境界與汝等比淨智菩薩隨順義者所行之處非是一切執著文字外道二乘之所行處是故汝及諸菩薩摩訶薩於如來藏藏識當勤觀察莫但聞已便生足想爾時世尊欲重宣此義而說偈言甚深如來藏而與七識俱二種攝受生智者則遠離如鏡像現心無始習所熏如實觀察者諸事悉無事如愚見指月觀指不觀月計著名字者不見我真實心為工伎兒意如和伎者五識為伴侶妄想觀伎眾魏譯爾時世尊重說偈言甚深如來藏與七識俱生取二法則生如實知不生如鏡像現心無始習所熏如實觀察者諸境悉空無如癡見指月觀指不觀月計著名字者不見我真實心如巧技兒意如狡猾者意識及五識虗妄取境界如技兒和合誑惑於凡夫唐譯爾時世尊重說頌言甚深如來藏而與七識俱執著二種生了知則遠離無始習所熏如像現於心若能如實觀境相悉無有如愚見指月觀指不觀月計著文字者不見我真實心如工伎兒意如和伎者五識為伴侶妄想觀伎眾爾時大慧菩薩白佛言世尊惟願為說五法自性識二種無我究竟分別相我及餘菩薩摩訶薩於一切地次第相續分別此法入一切佛法入一切佛法者乃至如來自覺地佛告大慧諦聽諦聽善思念之大慧白佛言唯然受教佛告大慧五法自性識二種無我分別趣相者謂名相妄想正智如如若脩行者脩行入如來自覺聖趣離於斷常有無等見現法樂正受住現在前大慧不覺彼五法自性識二無我自心現外性凡夫妄想非諸聖賢魏譯爾時聖者大慧菩薩摩訶薩復請佛言世尊惟願如來應正徧知為我說善逝為我說五法體相及二無我差別行相我及一切諸菩薩等若得善知五法體相二種無我差別相者脩行是法次第入於一切諸地脩行是法能入一切諸佛法中入諸佛法者乃至能入如來自身內證智地佛告聖者大慧菩薩言善哉善哉善哉大慧汝今諦聽當為汝說大慧菩薩言善哉世尊唯然受教佛告大慧我為汝說五法體相二種無我差別行相大慧何等五法一者名二者相三者分別四者正智五者真如內身脩行證聖人智離斷常見現如實脩行者入三昧樂三摩䟦提行門故大慧一切凡夫不覺不知五法體相二種無我唯以自心見於外物是故生於分別之心非謂聖人唐譯爾時大慧菩薩摩訶薩白佛言世尊願為我說五法自性諸識無我差別之相我及諸菩薩摩訶薩善知此已漸脩諸地具諸佛法至於如來自證之位佛言諦聽當為汝說大慧五法自性諸識無我所謂名相分別正智如如若脩行者觀察此法入於如來自證境界遠離常斷有無等見得現法樂甚深三昧大慧凡愚不了五法自性諸識無我於心所現見有外物而起分別非諸聖人大慧白佛言世尊云何愚夫妄想生非諸聖賢佛告大慧愚夫計著俗數名相隨心流散流散已種種相像貌墮我我所見希望計著妙色計著已無知覆障故生染著染著已貪恚癡所生業積集積集已妄想自纏如蠶作繭墮生死海諸趣曠野如汲井輪以愚癡故不能知如幻野馬水月自性離我我所起於一切不實妄想離相所相及生住滅從自心妄想生非自在時節微塵勝妙生愚癡凡夫隨名相流魏譯大慧白佛言世尊云何凡夫生分別心非聖人也佛告大慧一切凡夫執著名相隨順生法隨順生法已見種種相墮我我所邪見心中執著具足一切法相執著已入於無明黑闇障處入障處已起於貪心起貪心已而能造作貪瞋癡業造業行已不能自止如蠶作繭以分別心而自纏身墮於六道大海險難如轆轤迴輪不自覺知以無智故不知一切諸法如幻不知無我我所諸法非實從於妄想分別而生而不知離可見能見而不知離生住滅相不知自心虗妄而生謂隨順自在天時微塵我生唐譯大慧白言云何不了而起分別佛言大慧凡愚不知名是假立心隨流動見種種相計我我所染著於色覆障聖智起貪瞋癡造作諸業如蠶作繭妄想自纏墮於諸趣生死大海如汲井輪循環不絕不知諸法如幻如焰如水中月自心所見妄分別起離能所取及生住滅謂從自在時節微塵勝性而生隨名相流大慧彼相者眼識所照名為色耳鼻舌身意意識所照名為聲香味觸法是名為相大慧彼妄想者施設眾名顯示諸相如此不異象馬車步男女等名是名妄想大慧正智者彼名相不可得猶如過客諸識不生不斷不常不墮一切外道聲聞緣覺之地魏譯大慧何者為名謂眼識見前色等法相如聲相耳相鼻相舌相身相大慧如是等相我說名為名相大慧何者分別以依何等法說名取相了別此法如是如是畢竟不異謂象馬車步人民等分別種種相是名分別大慧何者正智以觀察名相觀察已不見實法以彼迭共因生故見迭共生者諸識不復起分別識相不斷不常是故不墮一切外道聲聞辟支佛地大慧是名正智唐譯大慧此中相者謂眼識所見名之為色耳鼻舌身意識得者名之為聲香味觸法如是等我說為相分別者施設眾名顯示諸相謂以象馬車步男女等名而顯其相此事如是決定不異是名分別正智者謂觀名相互為其客識心不起不斷不常不墮外道二乘之地是名正智復次大慧菩薩摩訶薩以此正智不立名相非不立名相捨離二見建立及誹謗知名相不生是名如如大慧菩薩摩訶薩住如如者得無所有境界故得菩薩歡喜地得菩薩歡喜地已永離一切外道惡趣正住出世間趣法相成熟分別幻等一切法自覺法趣相離諸妄想見性異相次第乃至法雲地於其中間三昧力自在神通開敷得如來地已種種變化圓照示現成熟眾生如水中月善究竟滿足十無盡句為種種意解眾生分別說法法身離意所作是名菩薩入如如所得魏譯復次大慧菩薩摩訶薩依正智不取名相法以為有不取不見相以為無何以故以離有無邪見故以不見名相是正智義是故我說名為真如大慧菩薩住真如法者得入無相寂靜境界入已得入菩薩摩訶薩初歡喜地菩薩得初歡喜地時證百金剛三昧明門捨離二十五有一切果業過諸聲聞辟支佛地住如來家真如境界如實脩行知五法相如幻如夢如實觀察一切諸法起自內身證聖智脩行如是展轉遠離虗妄世間覺觀所樂之地次第乃至法雲地入法雲地已次入三昧力自在神通諸華莊嚴如來之地入如來地已為教化眾生現種種光明應莊嚴身如水中月依無盡句善縛所縛隨眾生信者而為說法離心意意識身故大慧菩薩入真如已得佛地中如是如是無量無邊法唐譯大慧菩薩摩訶薩以其正智觀察名相非有非無遠離損益二邊惡見名相及識本來不起我說此法名為如如大慧菩薩摩訶薩住如如已得無照現境昇歡喜地離外道惡趣入出世法法相淳熟知一切法猶如幻等證自聖智所行之法離憶度見如是次第乃至法雲至法雲已三昧諸力自在神通開敷滿足成於如來成如來已為眾生故如水中月普現其身隨其欲樂而為說法其身清淨離心意識被弘誓甲具足成滿十無盡願是名菩薩摩訶薩入於如如之所獲得爾時大慧菩薩白佛言世尊云何世尊為三種自性入於五法為各有自相宗佛告大慧三種自性及八識二種無我悉入五法大慧彼名及相是妄想自性大慧若依彼妄想生心心法名俱時生如日光俱種種相各別分別持是名緣起自性大慧正智如如者不可壞故名成自性魏譯大慧復白佛言世尊世尊為五法入三法為三法入五法中為自體相各各差別佛告大慧三法入五法中大慧非但三法入五法中八種識二種無我亦入五法大慧云何三法入五法中大慧名相為分別法相大慧依彼二法分別生心心數法一時非前後如日共光明一時而有分別種種相大慧是名三相依因緣力生故大慧正智真如名第一義諦相以不滅法故唐譯爾時大慧菩薩摩訶薩復白佛言世尊為三法入五法中為各有自相佛言大慧三性八識及二無我悉入五法其中名及相是妄計性以依彼分別心心所法俱時而起如日與光是緣起性正智如如不可壞故是圓成性復次大慧自心現妄想八種分別謂識藏意意識及五識身相者不實相妄想故我我所二攝受滅二無我生是故大慧此五法者聲聞緣覺菩薩如來自覺聖智諸地相續次第一切佛法悉入其中魏譯復次大慧著於自心見分別法差別有八種以分別諸相以為實故離我我所生滅之法爾時得證二無我法大慧五法門入諸佛地諸地法相亦入五法門中一切聲聞辟支佛法亦入五法門中如來內身證聖智法亦入五法門中唐譯大慧於自心所現生執著時有八種分別起此差別相皆是不實唯妄計性若能捨離二種我執二無我智即得生長大慧聲聞緣覺菩薩如來自證聖智諸地位次一切佛法悉皆攝入此五法中復次大慧五法者相名妄想如如正智大慧相者若處所形相色像等現是名為相若彼有如是相名為瓶等即此非餘是說為名施設眾名顯示諸相瓶等心心法是名妄想彼名彼相畢竟不可得始終無覺於諸法無展轉離不實妄想是名如如真實決定究竟自性不可得彼是如相我及諸佛隨順入處普為眾生如實演說施設顯示於彼隨入正覺不斷不常妄想不起隨順自覺聖趣一切外道聲聞緣覺所不得相是名正智大慧是名五法三種自性八識二種無我一切佛法悉入其中是故大慧當自方便學亦教他人勿隨於他魏譯復次大慧五法相名分別真如正智大慧何者名為相相者見色形相狀貌勝不如是名為相大慧依彼法相起分別相此是瓶此是牛羊馬等此法如是如是不異大慧是名為名大慧依於彼法立名了別示現彼相是故立彼種種名字牛羊馬等是名分別心心數法大慧觀察名相乃至微塵常不見一法相諸法不實以虗妄心生分別故大慧言真如者名為不虗決定畢竟盡自性自體正見真如相我及諸菩薩及諸佛如來應正徧知說名異義一大慧如是等隨順正智不斷不常無分別分別不行處隨順自身內證聖智離諸一切外道聲聞辟支佛等惡見朋黨不正智中大慧於五法三法相八種識二種無我一切佛法皆入五法門中大慧汝及諸菩薩摩訶薩為求勝智應當脩學大慧汝知五法不隨他教故唐譯復次大慧五法者所謂相名分別如如正智此中相者謂所見色等形狀各別是名為相依彼諸相立瓶等名此如是此不異是名為名施設眾名顯示諸相心心所法是名分別彼名彼相畢竟無有但是妄心展轉分別如是觀察乃至覺滅是名如如大慧真實決定究竟根本自性可得是如如相我及諸佛隨順證入如其實相開示演說若能於此隨順悟解離斷離常不生分別入自證處出於外道二乘境界是名正智大慧此五種法三性八識及二無我一切佛法普皆攝盡大慧於此法中汝應以自智善巧通達亦勸他人令其通達通達此已心則決定不隨他轉爾時世尊欲重宣此義而說偈言五法三自性及與八種識二種無有我悉攝摩訶衍名相虗妄想自性二種相正智及如如是則為成相魏譯爾時世尊重說偈言五法自體相及與八種識二種無我法攝取諸大乘名相及分別三法自體相正智及真如是第一義相唐譯爾時世尊重說頌言五法三自性及與八種識二種無我法普攝於大乘名相及分別二種自性攝正智與如如是則圓成相爾時大慧菩薩復白佛言世尊如世尊所說句過去諸佛如恒河沙未來現在亦復如是云何世尊為如說而受為更有餘義惟願如來哀憫解說魏譯爾時聖者大慧菩薩摩訶薩白佛言世尊如世尊依名字說過去未來現在諸佛如恒河河沙世尊佛說如是為依如來口中所說我隨順取為更有義願為我說唐譯爾時大慧菩薩摩訶薩復白佛言世尊如經中說過去未來現在諸佛如恒河沙此當云何為如言而受為別有義佛告大慧莫如說受三世諸佛量非如恒河沙所以者何過世間望非譬所譬以凡愚計常外道妄想長養惡見生死無窮欲令厭離生死趣輪精勤勝進故為彼說言諸佛易見非如優曇鉢華難得見故息方便求有時復觀諸受化者作是說言佛難值遇如優曇鉢華優曇鉢華無已見今見當見如來者世間悉見不以建立自通故說言如來出世如優曇華大慧自建立自通者過世間望彼諸凡愚所不能信自覺聖智境界無以為譬真實如來過心意意識所見之相不可為譬大慧然我說譬佛如恒河沙無有過咎魏譯佛告聖者大慧菩薩言大慧如我所說名字章句莫如是取大慧三世諸佛非恒河河沙等何以故所說譬喻過世間者非如譬喻何以故以有相似不相似故大慧諸佛如來應正徧知不定說過世間相似不相似譬喻何以故大慧我說譬喻但是少分故大慧我及諸佛如來應正徧知所說譬喻但說少義何以故愚癡凡夫諸外道等著諸法常增長邪見隨順世間輪迴生死為彼生厭聞生驚怖又聞諸佛如恒河沙便於如來無上聖道生易得想求出世法大慧是故我說諸佛如來如恒河河沙何以故我餘經中說佛出世如優曇華眾生聞已言佛道難得不脩精進是故我說諸佛如來如恒河河沙大慧我說諸佛出世如優曇華者依可化眾生義故我說諸佛如優曇華大慧而優曇華於世間中無人曾見當亦不見大慧諸佛如來世間曾見現見當見大慧我說如是非依自身所得法說是故說言如優曇華諸佛如來亦復如是大慧我依內身證法說法是故說過世間譬喻以諸凡夫無信眾生不能信我所說譬喻何以故說自內身聖智境界無譬喻可說遠離心意意識過諸見地諸佛如來真如之法不可說故是故我說種種譬喻大慧我說諸佛如恒河河沙者是少分譬喻大慧諸佛如來平等非不平等以非分別分別故唐譯佛告大慧勿如言受大慧三世諸佛非如恒沙何以故如來最勝超諸世間無與等者非喻所及唯以少分為其喻耳我以凡愚諸外道等心恒執著常與無常惡見增長生死輪迴令其厭離發勝希望言佛易成易可逢值若言難遇如優曇華彼便退怯不勤精進是故我說如恒河沙我復有時觀受化者說佛難值如優曇華大慧優曇鉢華無有曾見現見當見如來則有已見當見大慧如是譬喻非說自法自法者內證聖智所行境界世間無等過諸譬喻一切凡愚不能信受大慧真實如來超心意意識所見之相不可於中而立譬喻然亦有時而為建立言恒沙等無有相違大慧譬如恒沙一切魚鱉輸收摩羅獅子象馬人獸踐踏沙不念言彼惱亂我而生妄想自性清淨無諸垢汙如來應供等正覺自覺聖智恒河大力神通自在等沙一切外道諸人獸等一切惱亂如來不念而生妄想如來寂然無有念想如來本願以三昧樂安眾生故無有惱亂猶如恒沙等無有異又斷貪恚故魏譯大慧譬如恒河河中所有之沙魚鱉龜龍牛羊象馬諸獸踐踏而彼河沙不生分別不瞋不恚亦不生心彼惱亂我無分別故淨離諸垢大慧諸佛如來應正徧知亦復如是內身證得聖智滿足諸力神通自在功德如恒河沙一切外道邪論諸師愚癡魚鱉以瞋恚心毀罵如來如來不動不生分別本願力故為與眾生三昧三摩䟦提一切諸樂令滿足故不分別分別大慧是故我說諸佛如來如恒河河沙等等者平等無有異相已離愛身故唐譯大慧譬如恒沙龜魚象馬之所踐踏不生分別恒淨無垢如來聖智如彼恒河力通自在以其為沙外道龜魚競來擾亂而佛不起一念分別何以故如來本願以三昧樂普安眾生如恒河沙無有愛憎無分別故譬如恒沙是地自性劫盡燒時燒一切地而彼地大不捨自性與火大俱生故其餘愚夫作地燒想而地不燒以火因故如是大慧如來法身如恒沙不壞魏譯大慧譬如恒河河沙不離地相大慧大地火燒火不異地故火不燒地地大有火相續體故大慧愚癡凡夫墮顛倒智自心分別言地被燒而地不燒以不離地而得更有四大火身故大慧諸佛如來亦復如是諸佛如來法身之體如恒河河沙等不滅不失故唐譯大慧譬如恒沙是地自性劫盡燒時燒一切地而彼地大不捨本性恒與火大俱時生故諸凡愚人謂地被燒而實不燒火所因故如來法身亦復如是如恒河沙終不壞滅大慧譬如恒沙無有限量如來光明亦復如是無有限量為成熟眾生故普照一切諸佛大眾大慧譬如恒沙別求異沙永不可得如是大慧如來應供等正覺無生死生滅有因緣斷故魏譯大慧譬如恒河河沙無量無邊大慧諸佛如來亦復如是出於世間放無量光遍於一切諸佛大會為化眾生令覺知故大慧如恒河河沙更不生相如彼微塵微塵體相如是而住大慧諸佛如來亦復如是於世間中不生不滅諸佛如來斷有因故唐譯大慧譬如恒沙無有限量如來光明亦復如是為欲成就無量眾生普照一切諸佛大會大慧譬如恒沙住沙自性不更改變而作餘物如來亦爾於世間中不生不滅諸有生因悉已斷故大慧譬如恒沙增減不可得知如是大慧如來智慧成熟眾生不增不減非身法故身法者有壞如來法身非是身法魏譯大慧如恒河河沙若出於河亦不可見入於河中亦不可見亦不起心我出入河大慧諸佛如來智慧之力亦復如是度諸眾生亦不盡減亦不增長何以故諸法無身故大慧一切有身皆是無常磨滅之法非無身法諸佛如來唯法身故唐譯大慧譬如恒沙取不知減投不見增諸佛亦爾以方便智成熟眾生無減無增何以故如來法身無有身故大慧以有身故而有滅壞法身無身故無滅壞如壓恒沙油不可得如是一切極苦眾生逼迫如來乃至眾生未得涅槃不捨法界自三昧願樂以大悲故魏譯大慧譬如有人欲得蘇油壓恒河沙終不可得無蘇油故大慧諸佛如來為諸眾生苦惱所壓瞋不可得不捨自法界相不捨自法味相不捨本願與眾生樂以得具足大慈大悲我若不令一切眾生入涅槃者我身亦不入於涅槃唐譯大慧譬如恒沙雖油壓治欲求蘇油終不可得如來亦爾雖為眾生眾苦所壓乃至蠢動未盡涅槃欲令捨離於法界中深心願樂亦不可得何以故具足成就大悲心故大慧譬如恒沙隨水而流非無水也如是大慧如來所說一切諸法隨涅槃流是故說言如恒河沙如來不隨諸去流轉去是壞義故大慧生死本際不可知不知故云何說去大慧去者斷義而愚夫不知魏譯大慧如恒河河沙隨水而流終不逆流大慧諸佛如來為諸眾生說法亦爾隨順涅槃而非逆流大慧是故我說諸佛如來如恒河河沙大慧言恒河河沙隨順流者非是去義若佛如來有去義者諸佛如來應無常滅大慧世間本際尚不可知不可知者我云何依而說去義是故如來非為去義大慧去義者名為斷義愚癡凡夫不覺不知唐譯大慧譬如恒沙隨水而流非無水也如來亦爾所有說法莫不隨順涅槃之流以是說言諸佛如來如恒河沙大慧如來說法不隨於趣趣是壞義生死本際不可得知既不可知云何說趣大慧趣義是斷凡愚莫知大慧白佛言世尊若眾生生死本際不可知者云何解脫可知佛告大慧無始虗偽過惡妄想習氣因滅自心現知外義妄想身轉解脫不滅是故無邊非都無所有為彼妄想作無邊等異名觀察內外離於妄想無異眾生智及爾焰一切諸法悉皆寂靜不識自心現妄想故妄想生若識則滅魏譯大慧白佛言世尊世尊若眾生在於世間輪迴去來本際不可知者云何如來而得解脫復令眾生得於解脫佛告大慧言大慧言解脫者離於一切戲論煩惱無始熏習分別心故如實能知唯自心見外所分別心迴轉故是故我說名為解脫大慧言解脫者非是滅法是故汝問我若不知本際云何得解脫者此問不成大慧言本際者是分別心一體異名大慧離分別心更無眾生即此分別名為眾生大慧真實智慧觀內外法無法可知能知故大慧以一切法本來寂靜大慧不如實知唯自心見虗妄分別是故生於分別之心如實知者不生分別唐譯大慧菩薩復白佛言若生死本際不可知者云何眾生在生死中而得解脫佛言大慧無始虗偽過習因滅了知外境自心所現分別轉依名為解脫非滅壞也是故不得言無邊際大慧無邊際者但是分別異名大慧離分別心無別眾生以智觀察內外諸法知與所知悉皆寂滅大慧一切諸法唯是自心分別所見不了知故分別心起了心則滅爾時世尊欲重宣此義而說偈言觀察諸導師猶如恒河沙不壞亦不去亦復不究竟是則為平等觀察諸如來猶如恒沙等悉離一切過隨流而性常是則佛正覺魏譯爾時世尊重說偈言觀察於諸佛譬如恒河沙不滅亦不生彼人能見佛遠離諸塵垢如恒河河沙隨順流不變法身亦如是唐譯爾時世尊重說頌言觀察諸導師譬如恒河沙非壞亦非趣是人能見佛譬如恒河沙悉離一切過而恒隨順流佛體亦如是爾時大慧菩薩復白佛言世尊惟願為說一切諸法剎那壞相世尊云何一切法剎那佛告大慧諦聽諦聽善思念之當為汝說佛告大慧一切法者謂善不善無記有為無為世間出世間有罪無罪有漏無漏受不受魏譯爾時聖者大慧菩薩摩訶薩復白佛言世尊唯願如來應正徧知為我說善逝為我說一切法生滅之相云何如來說一切法念念不住佛告大慧菩薩言善哉善哉善哉大慧汝今諦聽當為汝說大慧言善哉世尊唯然受教佛告大慧一切法一切法者所謂善法不善法有為法無為法世間法出世間法有漏法無漏法內法外法唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我說一切諸法剎那壞相何等諸法名為剎那佛言諦聽當為汝說大慧一切法者所謂善法不善法有為法無為法世間法出世間法有漏法無漏法有受法無受法大慧略說心意意識及習氣是五受陰因是心意意識習氣長養凡愚善不善妄想魏譯大慧略說五陰法因心意意識熏習增長諸凡夫人依心意意識熏習故分別善不善法唐譯大慧舉要言之五取蘊法以心意意識習氣為因而得增長凡愚於此而生分別謂善不善大慧脩三昧樂三昧正受現法樂住名為賢聖善無漏魏譯大慧聖人現證三昧三摩䟦提無漏善法樂行大慧是名善法唐譯聖人現證三昧樂住是則名為善無漏法大慧善不善者謂八識何等為八謂如來藏名識藏心意意識及五識身非外道所說大慧五識身者心意意識俱善不善相展轉變壞相續流注不壞身生亦生亦滅不覺自心現次第滅餘識生形相差別攝受意識五識俱相應生剎那時不住名為剎那魏譯復次大慧言善不善法者所謂八識何等為八一者阿黎耶識二者意三者意識四者眼識五者耳識六者鼻識七者舌識八者身識大慧五識身共意識身善不善法展轉差別相續體無差別身隨順生法生已還滅不知自心見虗妄境界即滅時能取境界形相大小勝妙之狀大慧意識共五識身相應生一念時不住是故我說彼法念時不住唐譯復次大慧善不善者所謂八識何等為八謂如來藏名藏識意及意識并五識身大慧彼五識身與意識俱善不善相展轉差別相續不斷無異體生生已即滅不了於境自心所現次第滅時別識生起意識與彼五識共俱取於種種差別形相剎那不住我說此等名剎那法大慧剎那者名識藏如來藏意俱生識習氣剎那無漏習氣非剎那非凡愚所覺計著剎那論故不覺一切法剎那非剎那以斷見壞無為法魏譯大慧言剎尼迦者名之為空阿黎耶識名如來藏無共意轉識熏習故名之為空具足無漏熏習法故名為不空大慧愚癡凡夫不覺不知執著諸法剎那不住墮在邪見而作是言無漏之法亦剎那不住破彼真如如來藏故唐譯大慧如來藏名藏識所與意等諸習氣俱是剎那法無漏習氣非剎那法此非凡愚剎那論者之所能知彼不能知一切諸法有是剎那非剎那故彼計無為同諸法壞墮於斷見大慧七識不流轉不受苦樂非涅槃因大慧如來藏者受苦樂與因俱若生若滅四住地無明住地所醉凡愚不覺剎那見妄想熏心魏譯大慧五識身者不生六道不受苦樂不作涅槃因大慧如來藏不受苦樂非生死因餘法者共生共滅依於四種熏習醉故而諸凡夫不覺不知邪見熏習言一切法剎那不住唐譯大慧五識身非流轉不受苦樂非涅槃因如來藏受苦樂與因俱有生滅四種習氣之所迷覆而諸凡愚分別熏心不能了知起剎那見復次大慧如金金剛佛舍利得奇特性終不損壞大慧若得無間有剎那者聖應非聖而聖未曾不聖如金金剛雖經劫數稱量不減云何凡愚不善於我隱覆之說於內外一切法作剎那想魏譯復次大慧金剛如來藏如來證法非剎那不住大慧如來證法若剎那不住者一切聖人不成聖人大慧非非聖人以聖人故大慧金金剛住於一劫稱量等住不增不減大慧云何愚癡凡夫分別諸法言剎那不住而諸凡夫不得我意不覺不知內外諸法念念不住唐譯大慧如金金剛佛之舍利是奇特性終不損壞若得證法有剎那者聖應非聖而彼聖人未曾非聖如金金剛雖經劫住稱量不減云何凡愚不解於我祕密之說於一切法作剎那想大慧菩薩復白佛言世尊如世尊說六波羅蜜滿足得成正覺何等為六魏譯大慧復白佛言世尊如來常說滿足六波羅蜜法得阿耨多羅三藐三菩提世尊何等為六波羅蜜云何滿足唐譯大慧菩薩復白佛言世尊常說六波羅蜜若得滿足便成正覺何等為六云何滿足佛告大慧波羅蜜有三種分別謂世間出世間出世間上上大慧世間波羅蜜者我我所攝受計著攝受二邊為種種受生處樂色聲香味觸故滿足檀波羅蜜戒忍精進禪定智慧亦如是凡夫神通及生梵天魏譯佛告大慧菩薩言大慧波羅蜜差別有三種謂世間波羅蜜出世間波羅蜜出世間上上波羅蜜大慧言世間波羅蜜者愚癡凡夫執著我我所法墮於二邊為於種種勝妙境界行波羅蜜求於色等境界果報大慧愚癡凡夫行尸波羅蜜羼提波羅蜜毗黎耶波羅蜜禪波羅蜜般若波羅蜜乃至生於梵天求五神通世間之法大慧是名世間諸波羅蜜唐譯佛言大慧波羅蜜者差別有三所謂世間出世間出世間上上大慧世間波羅蜜者謂諸凡愚著我我所執取二邊求諸有身貪色等境如是脩行檀波羅蜜持戒忍辱精進禪定成就神通生於梵世大慧出世間波羅蜜者聲聞緣覺墮攝受涅槃故行六波羅蜜樂自己涅槃樂魏譯大慧言出世間波羅蜜者謂聲聞辟支佛取聲聞辟支佛涅槃心脩行波羅蜜大慧如彼世間愚癡凡夫為於自身求涅槃樂而行世間波羅蜜行聲聞緣覺亦復如是為自身故求涅槃樂行出世間波羅蜜行而乃求彼非究竟樂唐譯大慧出世間波羅蜜者謂聲聞緣覺執著涅槃希求自樂如是脩習諸波羅蜜出世間上上波羅蜜者覺自心現妄想量攝受及自心二故不生妄想於諸趣攝受非分自心色相不計著為安樂一切眾生故生檀波羅蜜起上上方便即於彼緣妄想不生戒是尸波羅蜜即彼妄想不生忍知攝所攝是羼提波羅蜜初中後夜精勤方便隨順脩行方便妄想不生是毗黎耶波羅蜜妄想悉滅不墮聲聞涅槃攝受是禪波羅蜜自心妄想非性智慧觀察不墮二邊先身轉勝而不可壞得自覺聖趣是般若波羅蜜魏譯大慧出世間上上波羅蜜者如實能知但是自心虗妄分別見外境界爾時實知唯是自心見內外法不分別虗妄分別不取內外自心色相故菩薩摩訶薩如實能知一切法故行檀波羅蜜為令一切眾生得無怖畏安樂故是名檀波羅蜜大慧菩薩觀彼一切諸法不生分別隨順清涼是尸波羅蜜大慧菩薩離分別心忍彼脩行如實而知能取可取境界非實是名菩薩羼提波羅蜜大慧菩薩云何脩精進行初中後夜常勤脩行隨順如實法斷諸分別是名毗黎耶波羅蜜大慧菩薩離於分別心不墮外道能取可取境界之相是名禪波羅蜜大慧何者菩薩般若波羅蜜菩薩如實觀察自心分別之相不見分別不墮二邊依如實脩行轉身不見一法生不見一法滅自身內證聖行脩行是名菩薩般若波羅蜜大慧波羅蜜義如是滿足者得阿耨多羅三藐三菩提唐譯大慧出世間上上波羅蜜者謂菩薩摩訶薩於自心二法了知唯是分別所現不起妄想不生執著不取色相為欲利樂一切眾生而常脩行檀波羅蜜於諸境界不起分別是則脩行尸波羅蜜即於不起分別之時忍知能取所取自性是則名為羼提波羅蜜初中後夜勤脩匪懈隨順實解不生分別是則名為毗黎耶波羅蜜不生分別不起外道涅槃之見是則名為禪那波羅蜜以智觀察心無分別不墮二邊轉淨所依而不壞滅獲於聖智內證境界是則名為般若波羅蜜爾時世尊欲重宣此義而說偈言空無常剎那愚夫妄想作如河鐙種子而作剎那想剎那息煩亂寂靜離所作一切法不生我說剎那義魏譯爾時世尊重說偈言空無常剎那愚分別有為如河燈種子空無常剎那分別剎那義剎剎亦如是剎尼迦不生寂靜離所作一切法不生我說剎那義唐譯爾時世尊重說頌言愚分別有為空無常剎那分別剎那義如河燈種子一切法不生寂靜無所作諸事性皆離是我剎那義物生則有滅不為愚者說無間相續性妄想之所熏無明為其因心則從彼生乃至色未生中間有何分魏譯初生則有滅不為凡夫說分別相續法妄想見六道若無明為因能生諸心者乃至色未生中間依何住唐譯生無間即滅不為凡愚說無間相續法諸趣分別起無明為其因心則從彼生未能了色來中間何所住相續次第滅餘心隨彼生不住於色時何所緣而生以從彼生故不如實因生云何無所成而知剎那壞魏譯即生即有滅餘心隨彼生色不一念住觀於何法生依何因生法心無因而生是故生不成云何知念壞唐譯無間相續滅而有別心起不住於色時何所緣而生若緣彼心起其因則虗妄因妄體不成云何剎那滅脩行者正受金剛佛舍利光音天宮殿世間不壞事住於正法得如來智具足比丘得平等云何見剎那犍闥婆幻等色無有剎那於不實色等視之若真實魏譯脩行者證定金剛佛舍利光音天宮殿世間不壞事真如證法實如來智成就比丘證平等云何念不住犍闥婆幻色何故念不住無四大見色四大何所為唐譯脩行者正定金剛佛舍利及以光音宮世間不壞事如來圓滿智及比丘證得諸法性常住云何見剎那乾城幻等色何故非剎那大種無實性云何說能造爾時大慧菩薩復白佛言世尊世尊記阿羅漢得成阿耨多羅三藐三菩提與諸菩薩等無差別一切眾生法不涅槃誰至佛道從初得佛至般涅槃於其中間不說一字亦無所答如來常定故亦無慮亦無察化佛化作佛事何故說識剎那展轉壞相金剛力士常隨侍衛何不施設本際現魔魔業惡業果報旃遮摩納孫陀利女空鉢而出惡業障現云何如來得一切種智而不離諸過魏譯爾時聖者大慧菩薩摩訶薩復白佛言世尊如佛世尊與諸羅漢受阿耨多羅三藐三菩提記如來復說諸佛如來不入涅槃復說如來應正徧知何等夜證大菩提何等夜入般涅槃於其中間不說一字如來復說諸佛如來常入無覺無觀無分別定復言作諸種種應化度諸眾生世尊復說諸識念念差別不住金剛密迹常隨侍衛復說世間本際難知復言眾生入般涅槃若入涅槃應有本際復說諸佛無有怨敵而見諸魔復說如來斷一切障而見旃遮摩那毗孫陀黎等謗佛入娑黎那村竟不得食空鉢而出世尊若如是者如來便有無量罪業云何如來不離一切諸罪過惡而得阿耨多羅三藐三菩提一切種智唐譯爾時大慧菩薩摩訶薩復白佛言世尊如來何故授阿羅漢阿耨多羅三藐三菩提記何故復說無般涅槃法眾生得成佛道又何故說從初得佛至般涅槃於其中間不說一字又言如來常在於定無覺無觀又言佛事皆是化作又言諸識剎那變壞又言金剛神常隨衛護又言前際不可知而說有般涅槃又現有魔及以魔業又有餘報謂旃遮婆羅門女孫陀黎外道女及空鉢而還等事世尊既有如是業障云何得成一切種智既已成於一切種智云何不離如是諸過佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧為無餘涅槃故說誘進行菩薩行者故此及餘世界脩菩薩行者樂聲聞乘涅槃為令離聲聞乘進向大乘化佛授聲聞記非是法佛大慧因是故記諸聲聞與菩薩不異大慧不異者聲聞緣覺諸佛如來煩惱障斷解脫一味非智障斷大慧智障者見法無我殊勝清淨煩惱障者先習見人無我斷七識滅法障解脫識藏習滅究竟清淨魏譯佛告聖者大慧菩薩言善哉善哉善哉大慧汝今諦聽當為汝說大慧白佛言善哉世尊唯然受教佛告大慧我為曾行菩薩行諸聲聞等依無餘涅槃而與授記大慧我與聲聞授記者為怯弱眾生生勇猛心大慧此世界中及餘佛國有諸眾生行菩薩行而復樂於聲聞法行為轉彼取大菩提應化佛為應化聲聞授記非報佛法身佛而授記別大慧聲聞辟支佛涅槃無差別何以故斷煩惱無差異故斷煩惱障非斷智障復次大慧見法無我斷於智障見人無我斷煩惱障大慧轉意識故斷法障業障以轉意阿黎耶識熏習故究竟清淨唐譯佛言諦聽當為汝說大慧我為無餘涅槃界故密勸令彼脩菩薩行此界他土有諸菩薩心樂求於聲聞涅槃令捨是心進脩大行故作是說又變化佛與化聲聞而授記別非法性佛大慧授聲聞記是祕密說大慧佛與二乘無差別者據斷惑障解脫一味非謂智障智障要見法無我性乃清淨故煩惱障者見人無我意識捨離是時初斷藏識習滅法障解脫方得永淨因本住法故前後非性魏譯大慧我常依本法體而住更不生法唐譯大慧我依本住法作是密語非異前佛後更有說先具如是諸文字故無盡本願故如來無慮無察而演說法正智所化故念不妄故無慮無察四住地無明住地習氣斷故二煩惱斷離二種死覺人法無我及二障斷魏譯依本名字章句不覺不思而說諸法大慧如來常如意知常不失念是故如來無覺無觀諸佛如來離四種地已遠離二種死二種障二種業故唐譯大慧如來正知無有妄念不待思慮然後說法如來久已斷四種習離二種死除二種障大慧心意意識眼識等七剎那習氣因善無漏品離不復輪轉大慧如來藏者輪轉涅槃苦樂因空亂意慧愚癡凡夫所不能覺魏譯大慧七種識意意識眼耳鼻舌身念念不住因虗妄熏習離於無漏諸善法故大慧如來藏世間不生不死不來不去常恒清涼不變復次大慧依如來藏故有世間涅槃苦樂之因而諸凡夫不覺不知而墮於空虗妄顛倒唐譯大慧意及意識眼識等七習氣為因是剎那性離無漏善非流轉法大慧如來藏者生死流轉及是涅槃苦樂之因凡愚不知妄著於空大慧金剛力士所隨護者是化佛耳非真如來大慧真如來者離一切根量一切凡夫聲聞緣覺及外道根量悉滅得現法樂住無間法智忍故非金剛力士所護一切化佛不從業生化佛者非佛不離佛因陶家輪等眾生所作相而說法非自通處說自覺境界魏譯大慧金剛密跡常隨侍衛應化如來前後圍繞非法佛報佛根本如來應正徧知大慧根本如來遠離諸根大小諸量遠離一切凡夫聲聞辟支佛等大慧如實脩行得彼真如樂行境界者知根本佛以得平等法忍故是故金剛密跡隨應化佛大慧應化佛者無業無謗而應化佛不異法佛報佛如來而亦不一如陶師鹽等作所作事應化佛作化眾生事異真實相說法不說內所證法聖智境界唐譯大慧變化如來金剛力士常隨衛護非真實佛真實如來離諸根量二乘外道所不能知住現法樂成就智忍不假金剛力士所護一切化佛不從業生非即是佛亦非非佛譬如陶師眾事和合而有所作化佛亦爾眾相具足而演說法然不能說自證聖智所行之境復次大慧愚夫依七識身滅起斷見不覺識藏故起常見自妄想故不知本際自妄想慧滅故解脫四住地無明住地習氣斷故一切過斷魏譯復次大慧一切凡夫外道聲聞辟支佛等見六識滅墮於斷見不見阿黎耶識墮於常見復次大慧不見自心分別本際是故世間名無本際大慧遠離自心分別見者名為解脫得涅槃證大慧諸佛如來遠離四種熏習氣故是故無過唐譯復次大慧諸凡愚人見六識滅起於斷見不了藏識起於常見大慧自心分別是其本際故不可得離此分別即得解脫四種習斷離一切過爾時世尊欲重宣此義而說偈言三乘亦非乘如來不磨滅一切佛所記說離諸過惡為諸無間智及無餘涅槃誘進諸下劣是故隱覆說諸佛所起智即分別說道諸乘非為乘彼則非涅槃欲色有及見說是四住地意識之所起識宅意所住意及眼識等斷滅說無常或作涅槃見而為說常住魏譯爾時世尊重說偈言三乘及非乘諸佛無量乘一切記佛地說諸煩惱斷內身證聖智及無餘涅槃誘進怯眾生是故隱覆說如來得證智亦說於彼道眾生依入道二乘無涅槃見欲色及有及四種熏地意識爾所生見意識共住見意眼識等常無常斷滅常見依意等而起涅槃見唐譯爾時世尊重說頌言三乘及非乘無有佛涅槃悉授如來記說離眾過惡成就究竟智及無餘涅槃誘進怯劣人依此密意說諸佛所得智演說如是道唯此更非餘故彼無涅槃欲色有諸見如是四種習意識所從生藏意亦在中見意識眼等無常故說斷迷意藏起常邪智謂涅槃爾時大慧菩薩以偈問曰彼諸菩薩等志求佛道者酒肉及與蔥飲食為云何惟願無上尊哀憫為演說愚夫所貪著臭穢無名稱虎狼所甘嗜云何而可食食者生諸過不食為福善惟願為我說食不食罪福魏譯大慧菩薩問酒肉蔥韮蒜佛言是不淨一切不聽食羅剎等食噉非聖所食味食者聖呵責及惡名流布願佛分別說食不食罪福唐譯爾時大慧菩薩重說頌言菩薩摩訶薩志求無上覺酒肉及與蔥為食為不可愚夫貪嗜肉臭穢無名稱與彼惡獸同云何而可食食者有何過不食有何德惟願最勝尊為我具開演大慧菩薩說偈問已復白佛言惟願世尊為我等說食不食肉功德過惡我及諸菩薩於現在未來當為種種希望食肉眾生分別說法令諸眾生慈心相向得慈心已各於住地清淨明了疾得究竟無上菩提聲聞緣覺自地止息已亦得速成無上菩提惡邪論法諸外道輩邪見斷常顛倒計著尚有遮法不聽食肉況復如來世間救護正法成就而食肉耶魏譯爾時聖者大慧菩薩摩訶薩白佛言世尊我觀世間生死流轉怨結相連墮於惡道皆由食肉更相殺害增長貪嗔不得出離甚為大苦世尊食肉之人斷大慈種脩聖道者不應得食世尊諸外道等說邪見法盧伽耶陀墮俗之論墮於斷常有無見中皆遮食肉自己不食不聽他食云何如來清淨法中脩梵行者自食他食一切不制如來世尊於諸眾生慈悲一等云何而聽以肉為食善哉世尊哀憫世間願為我說食肉之過不食功德我及一切諸菩薩等聞已得依如實脩行廣宣流布令諸現在未來眾生一切識知唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我說食不食肉功德過失我及諸菩薩摩訶薩知其義已為未來現在報習所熏食肉眾生而演說之令捨肉味求於法味於一切眾生起大慈心更相親愛如一子想住菩薩地得阿耨多羅三藐三菩提或二乘地暫時止息究竟當成無上正覺世尊路伽耶等諸外道輩起有無見執著斷常尚有遮禁不聽食肉何況如來應正等覺大悲含育世所依怙而許自他俱食肉耶善哉世尊具大慈悲哀憫世間等觀眾生猶如一子願為解說食肉過惡不食功德令我及與諸菩薩等聞已奉行廣為他說佛告大慧善哉善哉諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧有無量因緣不應食肉然我今當為汝略說謂一切眾生從本已來展轉因緣甞為六親以親想故不應食肉魏譯佛告聖者大慧菩薩言善哉善哉善哉大慧汝大慈悲憫眾生故能問此義汝今諦聽當為汝說大慧菩薩白佛言善哉世尊唯然受教佛告大慧夫食肉者有無量過諸菩薩摩訶薩脩大慈悲不得食肉食與不食功德罪過我說少分汝今諦聽大慧我觀眾生從無始來食肉習故貪著肉味更相殺害遠離賢聖受生死苦捨肉味者聞正法味於菩薩地如實脩行速得阿耨多羅三藐三菩提復令眾生入於聲聞辟支佛地止息之處息已令入如來之地大慧如是等利慈心為本食肉之人斷大慈種云何當得如是大利是故大慧我觀眾生輪迴六道同在生死共相生育遞為父母兄弟姊妹若男若女中表內外六親眷屬或生餘道善道惡道常為眷屬以是因緣我觀眾生更相噉肉無非親者由貪肉味遞互相噉常生害心增長苦業流轉生死不得出離佛說是時諸惡羅剎聞佛所說悉捨惡心止不食肉遞相勸發慈悲之心護眾生命過自護身捨離一切諸肉不食悲泣流淚而白佛言世尊我聞佛說諦觀六道我所噉肉皆是我親乃知食肉眾生大怨斷大慈種長不善業是大苦本世尊我從今日斷不食肉及我眷屬亦不聽食如來弟子有不食者我當晝夜親近擁護若食肉者我當與作大不饒益大慧羅剎惡鬼常食肉者聞我所說尚發慈心捨肉不食況我弟子行善法者當聽食肉若食肉者當知即是眾生大怨斷我聖種大慧若我弟子聞我所說不諦觀察而食肉者當知即是旃陀羅種非我弟子我非其師是故大慧若欲與我作眷屬者一切諸肉悉不應食唐譯爾時佛告大慧菩薩摩訶薩言大慧諦聽諦聽善思念之吾當為汝分別解說大慧一切諸肉有無量緣菩薩於中當生慈憫不應噉食我今為汝說其少分大慧一切眾生從無始來在生死中輪迴不息靡不曾作父母兄弟男女眷屬乃至朋友親愛侍使易生而受鳥獸等身云何於中取之而食大慧菩薩摩訶薩觀諸眾生同於己身念肉皆從有命中來云何而食大慧諸羅剎等聞我此說尚應斷肉況樂法人大慧菩薩摩訶薩在在生處觀諸眾生皆是親屬乃至慈念如一子想是故不應食一切肉驢騾駱駝狐狗牛馬人獸等肉屠者雜賣故不應食肉不淨氣分所生長故不應食肉眾生聞氣悉生恐怖如旃陀羅及譚婆等狗見憎惡驚怖群吠故不應食肉魏譯復次大慧菩薩應觀一切是肉皆依父母膿血不淨赤白和合生不淨身是故菩薩觀肉不淨不應食肉復次大慧食肉之人眾生聞氣悉皆驚怖逃走遠離是故菩薩脩如實行為化眾生不應食肉大慧譬如旃陀羅獵師屠兒捕魚鳥人一切行處眾生遙見作如是念我今定死而此來者是大惡人不識罪福斷眾生命求現前利今來至此為覔我等今我等身悉皆有肉是故今來我等定死大慧由人食肉能令眾生見者皆生如是驚怖大慧一切虗空地中眾生見食肉者皆生驚怖而起疑念我於今者為死為活如是惡人不脩慈心亦如豺狼遊行世間常覔肉食如牛噉草𧏙蜋逐糞不知飽足我身是肉正是其食不應逢見即捨逃走離之遠去如人畏懼羅剎無異大慧食肉之人能令眾生見者皆生如是驚怖當知食肉眾生大怨是故菩薩脩行慈悲為攝眾生不應食彼非聖惡人所食之味惡名流布聖人呵責是故大慧菩薩為攝諸眾生故不應食肉唐譯大慧衢路市肆諸賣肉人或將犬馬人牛等肉為求利故而販鬻之如是雜穢云何可食大慧一切諸肉皆是精血汙穢所成求清淨人云何取食大慧食肉之人眾生見之悉皆驚怖脩慈心者云何食肉大慧譬如獵師及旃陀羅捕魚網鳥諸惡人等狗見驚吠獸見犇走空飛水陸一切眾生若有見之咸作是念此人氣息猶如羅剎今來至此必當殺我為護命故悉皆走避食肉之人亦復如是是故菩薩為脩慈行不應食肉又令脩行者慈心不生故不應食肉凡愚所嗜臭穢不淨無善名稱故不應食肉令諸呪術不成就故不應食肉以殺生者見形起識深味著故不應食肉彼食肉者諸天所棄故不令食肉令口氣臭故不應食肉多惡夢故不應食肉空間林中虎狼聞香故不應食肉令飲食無節故不應食肉令脩行者不生厭離故不應食肉我甞說言凡所飲食作食子肉想作服藥想故不應食肉聽食肉者無有是處魏譯復次大慧菩薩為護眾生信心不應食肉何以故大慧言菩薩者眾生皆知是佛如來慈心之種能與眾生作歸依處聞者自然不生疑怖生親友想善知識想不怖畏想言得歸依處得安隱處得善導師大慧由不食肉能生眾生如是信心若食肉者眾生即失一切信心便言世間無可信者斷於信根是故大慧菩薩為護眾生信心一切諸肉悉不應食復次大慧我諸弟子為護世間謗三寶故不應食肉何以故世間有人見食肉故謗毀三寶作如是言於佛法中何處當有真實沙門婆羅門脩梵行者捨於聖人本所應食食眾生肉猶如羅剎食肉滿腹醉眠不動依世凡夫豪貴勢力覓肉食噉如羅剎王驚怖眾生是故處處唱如是言何處有實沙門婆羅門脩淨行者無法無沙門無毗尼無淨行者生如是等無量無邊惡不善心斷我法輪絕滅聖種一切皆由食肉者過是故大慧我弟子者為護惡人毀謗三寶乃至不應生念肉想何況食噉復次大慧菩薩為求清淨佛土教化眾生不應食肉應觀諸肉如人死屍眼不欲見不用聞氣何況可齅而著口中一切諸肉亦復如是大慧如燒死屍臭氣不淨與燒餘肉臭穢無異云何於中有食不食是故菩薩為求清淨佛土教化眾生不應食肉復次大慧菩薩為求出離生死應當專念慈悲之行少欲知足厭世間苦速求解脫當捨憒閙就於空間住屍陀林阿蘭若處冢間樹下獨坐思惟觀諸世間無一可樂妻子眷屬如枷鎖想宮殿臺觀如牢獄想觀諸珍寶如糞聚想見諸飲食如膿血想受諸飲食如塗癰瘡趣得存命繫念聖道不為貪味酒肉蔥韮蒜薤臭味悉捨不食大慧若如是者是真脩行堪受一切人天供養若於世間不生厭離貪著諸味酒肉葷辛得便噉食不應受於世間信施復次大慧有諸眾生過去曾脩無量因緣有微善根得聞我法信心出家在我法中過去曾作羅剎眷屬虎狼獅子猫狸中生雖在我法食肉餘習見食肉者歡喜親近入諸城邑聚落塔寺飲酒噉肉以為歡樂諸天下觀猶如羅剎爭噉死屍等無有異而不自知已失我眾成羅剎眷屬雖服袈裟剃除鬚𩬊有命者見心生恐怖如畏羅剎是故大慧若以我為師者一切諸肉悉不應食復次大慧世間邪見諸呪術師若其食肉呪術不成為成邪術尚不食肉況我弟子為求如來無上聖道出世解脫脩大慈悲精勤苦行猶恐不得何處當有如是解脫為彼癡人食肉而得是故大慧我諸弟子為求出世解脫樂故不應食肉復次大慧食肉能起色力食味人多貪著應當諦觀一切世間有身命者各自寶重畏於死苦護惜身命人畜無別寧當樂存疥癩野干身不能捨命受諸天樂何以故畏生死苦故大慧以是觀察死是大苦是可畏法自身畏死云何當得而食他肉是故大慧欲食肉者先自念身次觀眾生不應食肉復次大慧夫食肉者諸天遠離何況聖人是故菩薩為見聖人當脩慈悲不應食肉大慧食肉之人睡眠亦苦起時亦苦若於夢中見種種惡驚怖毛竪心常不安無慈心故乏諸善力若其獨在空間之處多為非人而伺其便虎狼師子亦來伺求欲食其肉心常驚怖不得安隱復次大慧諸食肉者貪心難滿食不知量不能消化增益四大口氣腥臊腹中多有無量惡蟲身多瘡癬惡癩疾病種種不淨現在凡夫不喜聞見何況未來無病香潔人身可得復次大慧我說凡夫為求淨命噉於淨食尚應生心如子肉想何況聽食非聖人食聖人離者以肉能生無量諸過失於出世一切功德云何言我聽諸弟子食諸血肉不淨等味言我聽者是則謗我大慧我聽弟子食諸聖人所應食食非謂聖人遠離之食聖食能生無量功德遠離諸過大慧過去現在聖人食者所謂粳米大小麥荳種種油蜜甘蔗甘蔗汁騫陀末干提等隨時得者聽食為淨大慧於未來世有愚癡人說種種毗尼言得食肉因於過去食肉熏習愛著肉味隨自心見作如是說非佛聖人說為美食大慧不食肉者要因過去供養諸佛種諸善根能信佛語堅住毗尼信諸因果至於身口能自節量不為世間貪著諸味見食肉者能生慈心唐譯大慧夫食肉者身體臭穢惡名流布賢聖善人不用親狎是故菩薩不應食肉大慧夫血肉者眾仙所棄羣聖不食是故菩薩不應食肉大慧菩薩為護眾生信心令於佛法不生譏謗以慈憫故不應食肉大慧若我弟子食噉於肉令諸世人悉懷譏謗而作是言云何沙門脩淨行人棄捨天仙所食之味猶如惡獸食肉滿腹遊行世間令諸眾生悉懷驚怖壞清淨行失沙門道是故當知佛法之中無調伏行菩薩慈憫為護眾生不令生於如是之心不應食肉大慧如燒人肉其氣臭穢與燒餘肉等無差別云何於中有食不食是故一切樂清淨者不應食肉大慧諸善男子冢間樹下阿蘭若處寂靜脩行或住慈心或持呪術或求解脫或趣大乘以食肉故一切障礙不得成就是故菩薩欲利自他不應食肉大慧夫食肉者見其形色則已生於貪滋味心菩薩慈念一切眾生猶如己身云何見之而作食想是故菩薩不應食肉大慧夫食肉者諸天遠離口氣常臰睡夢不安覺已憂悚夜叉惡鬼奪其精氣心多驚怖食不知足增長疾病易生瘡癬恒被諸虫之所唼食不能於食深生厭離大慧我常說言凡所食噉作子肉想餘食尚然云何而聽弟子食肉大慧肉非美好肉不清淨生諸罪惡敗諸功德諸仙聖人之所棄捨云何而許弟子食耶若言許食此人謗我大慧淨美食者應知則是秔米粟米大小麥豆蘇油石蜜如是等類此是過去諸佛所許我所稱說我種姓中諸善男女心懷淨信久植善根於身命財不生貪著慈憫一切猶如己身如是之人之所應食非諸惡習虎狼性者心所愛重復次大慧過去有王名師子蘇陀娑食種種肉遂至食人臣民不堪即便謀反斷其奉祿以食肉者有如是過故不應食肉魏譯大慧我憶過去有王名師子奴食種種肉愛著肉味次第乃至食於人肉因食人肉父母兄弟妻子眷屬皆悉捨離一切臣民國土聚落即便謀反共斷其命以食肉者有如是過是故不應食一切肉復次大慧自在天王化身為鴿釋提桓因是諸天主因於過去食肉習氣化身作鷹驚逐此鴿鴿來投我我於爾時作尸毗王憐憫眾生更相食噉稱己身肉與鷹代鴿割肉不足身上稱上受大苦惱大慧如是無量世來食肉熏習自身他身有如是過何況無愧常食肉者大慧復有餘王不食肉者乘馬遊戲為馬驚波牽入深山失於侍從不知歸路不食肉故師子虎狼見無害心與雌師子共行欲事乃至生子斑足王等以過去世食肉熏習及作人王亦常食肉在七家村多樂食肉食肉大過遂食人肉生諸男女盡為羅剎大慧食肉眾生依於過去食肉熏故多生羅剎師子虎狼豺豹猫狸鴟梟鵰鷲鷹等中有命之類各自護身不令得便受飢餓苦常生惡心念食他肉命終復墮惡道受生人身難得何況當有得涅槃道大慧當知食肉之人有如是等無量諸過不食肉者即是無量功德之聚大慧而諸凡夫不知如是食肉之過不食功德我今略說不聽食肉唐譯大慧過去有王名師子生耽著肉味食種種肉如是不已遂至食人臣民不堪悉皆離叛亡失國位受大苦惱大慧釋提桓因處天王位以於過去食肉餘習變身為鷹而逐於鴿我時作王名曰尸毗憫念其鴿自割身肉以代其命大慧帝釋餘習尚惱眾生況餘無慚常食肉者當知食肉自惱惱他是故菩薩不應食肉大慧昔有一王乘馬遊獵馬驚奔逸入於山險既無歸路又絕人居有牝師子與同遊處遂行醜行生諸子息其最長者名曰斑足後得作王領七億家食肉餘習非肉不食初食禽獸後乃至人所生男女悉是羅剎轉此身已復生師子豺狼虎豹鵰鷲等中欲求人身終不可得況出生死涅槃之道大慧夫食肉者有如是等無量過失斷而不食獲大功德凡愚不知如是損益是故我今為汝開演凡是肉者悉不應食復次大慧凡諸殺者為財利故殺生屠販彼諸愚癡食肉眾生以錢為網而捕諸肉彼殺生者若以財物若以鈎網取彼空行水陸眾生種種殺害屠販求利大慧亦無不教不求不想而有魚肉以是義故不應食肉魏譯大慧若一切人不食肉者亦無有人殺害眾生由人食肉若無可食處處求買為財利者殺以販賣為買者殺是故買者與殺無異是故食肉能障聖道大慧食肉之人愛著肉味至無畜生乃食人肉何況麞鹿雉兔鵞鴈猪羊雞狗駝驢象馬龍蛇魚鱉水陸有命得而不食由著肉味設諸方便殺害眾生造作種種羅機網羅山罝地截河堰海遍諸水陸安置網機撥坑埳弓刀毒箭間無空處虗空地水種種眾生皆被殺害為食肉故大慧獵師屠兒食肉人等惡心堅固能行不忍見諸眾生形體鮮肥膚肉充悅生食味心更相指示言是可噉不生一念不忍之心是故我說食肉之人斷大慈種大慧我觀世間無有是肉而非命者自己不殺不教人殺他不為殺不從命來而是肉者無有是處若有是肉不從命出而是美食我以何故不聽人食遍求世間無如是肉是故我說食肉是罪斷如來種故不聽食大慧我涅槃後於未來世法欲滅時於我法中有出家者剃除鬚𩬊自稱我是沙門釋子被我袈裟癡如小兒自稱律師墮於二邊種種虗妄覺觀亂心貪著肉味隨自心見說毗尼中言得食肉亦謗我言諸佛如來聽人食肉亦說因制而聽食肉亦謗我言如來世尊亦自食肉大慧我於象腋央掘魔涅槃大雲等一切修多羅中不聽食肉亦不說肉入於食味大慧我若聽諸聲聞弟子肉為食者我終不得口常讚歎脩行慈悲行如實行者亦不讚歎屍陀林中頭陀行者亦不讚歎修行大乘住大乘者亦不讚歎不食肉者我不自食不聽他食是故我勸脩菩薩行歎不食肉勸觀眾生應如一子云何唱言我聽食肉我為弟子脩三乘行者速得果故遮一切肉悉不聽食云何說言我毗尼中聽人食肉唐譯大慧凡殺生者多為人食若人不食亦無殺事是故食肉與殺同罪奇哉世間貪著肉味人身有肉尚取食之況於鳥獸有不食者以貪味故廣設方便罝羅網罟處處安施水陸飛行皆被殺害設自不食為貪價直而作是事大慧世復有人心無慈憫專行慘暴猶如羅剎若見眾生其身充盛便生肉想言此可食大慧世無有肉非是自殺亦非他殺心不疑殺而可食者以是義故我許聲聞食如是肉大慧未來之世有愚癡人於我法中而為出家妄說毗尼壞亂正法誹謗於我言聽食肉亦自曾食大慧若我聽許聲聞食肉我則非是住慈心者脩觀行者行頭陀者趣大乘者云何而勸諸善男子及善女人於諸眾生生一子想斷一切肉大慧我有時說遮五種肉或制十種今於此經一切種一切時開除方便一切悉斷大慧如來應供等正覺尚無所食況食魚肉亦不教人以大悲前行故視一切眾生猶如一子是故不聽令食子肉魏譯又復說言如來餘修多羅中說三種肉聽人食者當知是人不脩毗尼次第斷故唱言得食何以故大慧肉有二種一者他殺二者自死以世人言有肉得食有不得者象馬龍蛇人鬼獼猴猪狗及牛言不得食餘者得食屠兒不問得食不得一切盡殺處處衒賣眾生無過橫被殺害是故我制他殺自死悉不得食見聞疑者所謂他殺不見聞疑所謂自死是故大慧我毗尼中唱如是言凡所有肉於一切沙門釋子皆不淨食汙清淨命障聖道分無有方便而可得食若有說言佛毗尼中說三種肉為不聽食非為聽食當知是人堅住毗尼是不謗我大慧今此楞伽修多羅中一切時一切肉亦無方便而可得食是故大慧我遮食肉不為一人現在未來一切不得是故大慧若彼癡人自言律師言毗尼中聽人食肉亦謗我言如來自食彼愚癡人成大罪障長夜墮於無利益處無聖人處不聞法處亦不得見現在未來賢聖弟子況當得見諸佛如來大慧諸聲聞人常所應食米油蜜種種麻豆能生淨命非法貯畜非法受取我說不淨尚不聽食何況聽食血肉不淨大慧我諸聲聞辟支佛菩薩弟子食於法食非食飲食何況如來大慧諸佛如來法食法住非飲食身非諸一切飲食住身離諸資生愛有求等遠離一切煩惱習過善分別知心心智慧一切智一切見見諸眾生平等憐憫是故大慧我見一切諸眾生等猶如一子云何而聽以肉為食亦不隨喜何況自食大慧如是一切蔥韮蒜薤臭穢不淨能障聖道亦障世間人天淨處何況諸佛淨土果報酒亦如是能障聖道能損善業能生諸過是故大慧求聖道者酒肉蔥韮及蒜薤等能熏之味悉不應食唐譯大慧我於諸處說遮十種許三種者是漸禁斷令其脩學今此經中自死他殺凡是肉者一切悉斷大慧我不曾許弟子食肉亦不現許亦不當許大慧凡是肉食於出家人悉是不淨大慧若有癡人謗言如來聽許食肉亦自食者當知是人惡業所纏必當永墮不饒益處大慧我之所有諸聖弟子尚不食於凡夫段食況食血肉不淨之食大慧聲聞緣覺及諸菩薩尚唯法食豈況如來大慧如來法身非雜食身大慧我已斷除一切煩惱我已洗滌一切習氣我已善擇諸心智慧大悲平等普觀眾生猶如一子云何而許聲聞弟子食於子肉何況自食作是說者無有是處爾時世尊欲重宣此義而說偈言曾昔為親屬鄙穢不淨雜不淨所生長聞氣悉恐怖一切肉與蔥及諸韮蒜等種種放逸酒脩行常遠離亦常離麻油及諸穿孔床以彼諸細蟲於中極恐怖魏譯爾時世尊重說偈言大慧汝諦聽我說食中過酒肉蔥韮蒜是障聖道分我觀三界中及得聖道眾無始世界來展轉莫非親云何於其中而有食不食觀肉所從來出處最不淨膿血和雜生屎尿膿洟合脩行淨行者當觀不應食種種肉及蔥酒亦不得飲種種韮及蒜脩行常遠離常遠離麻油穿孔床不眠飛揚諸細虫斷害他命故唐譯爾時世尊重說頌言悉曾為親屬眾穢所成長恐怖諸含生是故不應食一切肉與蔥韮蒜及諸酒如是不淨物脩行者遠離亦常離麻油及諸穿孔床以彼諸細虫於中大驚怖飲食生放逸放逸生諸覺從覺生貪欲是故不應食由食生貪欲貪令心迷醉迷醉長愛欲生死不解脫為利殺眾生以財網諸肉二俱是惡業死墮叫呼獄若無教想求則無三淨肉彼非無因有是故不應食彼諸脩行者由是悉遠離十方佛世尊一切咸呵責展轉更相食死墮虎狼類臭穢可厭惡所生常愚癡多生旃陀羅獵師譚婆種或生陀夷尼及諸食肉性羅剎猫狸等徧於是中生縛象與大雲央掘利魔羅及此楞伽經我悉制斷肉魏譯肉食長身力由力生邪念邪念生貪欲故不聽食肉由食肉生貪貪心致迷醉迷醉長愛欲不解脫生死為利殺眾生以肉追錢財彼二人惡業死墮叫喚獄三種名淨肉不見聞不疑世無如是肉生墮食肉中臭穢可厭患常生顛狂中多生旃陀羅獵師屠兒家或生羅剎女及諸食肉處羅剎猫狸等食肉生彼中象腋與大雲涅槃勝鬘經及入楞伽經我不聽食肉唐譯飲食生放逸放逸生邪覺從覺生於貪是故不應食邪覺生貪故心為貪所醉心醉長愛欲生死不解脫為利殺眾生以財取諸肉二俱是惡業死墮叫喚獄不想不教求此三種名淨世無如是肉食者我訶責更互相食噉死墮惡獸中臭穢而顛狂是故不應食獵師旃荼羅屠兒羅剎娑此等種中生斯皆食肉報象脇與大雲涅槃央掘摩及此楞伽經我皆制斷肉諸佛及菩薩聲聞所訶責食已無慚愧生生常癡冥先說見聞疑已斷一切肉妄想不覺知故生食肉處如彼貪欲過障礙聖解脫酒肉蔥韮蒜悉為聖道障未來世眾生於肉愚癡說言此淨無罪佛聽我等食食如服藥想亦如食子肉知足生厭離脩行行乞食安住慈心者我說常厭離虎狼諸惡獸恒可同遊止若食諸血肉眾生悉恐怖是故脩行者慈心不食肉食肉無慈慧永背正解脫及違聖表相是故不應食得生梵志種及諸脩行處智慧富貴家斯由不食肉魏譯諸佛及菩薩聲聞亦訶責食肉無慚愧生生常顛狂先說見聞疑已斷一切肉妄想不覺知故生食肉想如彼貪欲過障礙聖解脫酒肉蔥韮蒜悉為聖道障未來世眾生於肉愚癡說言此淨無罪佛聽我等食淨食如藥想猶如食子肉知足生厭離脩行行乞食安住慈心者我說常厭離師子豺虎狼恒可同遊止食肉見者怖云何而可食是故脩行者慈心不食肉食肉斷慈心離涅槃解脫及違聖人教故不聽食肉不食生梵種及諸脩行道智慧及富貴斯由不食肉唐譯食已無慚愧生生常顛狂諸佛及菩薩聲聞所嫌惡先說見聞疑已斷一切肉以其惡習故愚者妄分別如貪障解脫肉等亦復然若有食之者不能入聖道未來世眾生於肉愚癡說言此淨無罪佛聽我等食淨肉尚如藥猶如子肉想是故脩行者知量而行乞安住慈心者我說常厭離師子及虎狼應共同遊止食肉背解脫及違聖表想令眾生生怖是故不應食若於酒肉等一切皆不食必生賢聖中豐財具智慧
