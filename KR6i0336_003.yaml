故自心所見非有性故離有無生故如兔馬等角凡愚妄取唯自證聖智所行之處非諸愚夫二分別境大慧身及資生器世間等一切皆是藏識影像所取能取二種相現彼諸愚夫墮生住滅二見中故於中妄起有無分別大慧汝於此義當勤修學復次大慧有五無間種性云何為五謂聲聞乘無間種性緣覺乘無間種性如來乘無間種性不定種性各別種性魏譯復次大慧我説五種乘性證法何等為五一者聲聞乘性證法二者辟支佛乘性證法三者如來乘性證法四者不定乘性證法五者無性證法唐譯復次大慧有五種種性何等為五謂聲聞乘種性緣覺乘種性如來乘種性不定種性無種性云何知聲聞乘無間種性若聞説得陰界入自共相斷知時舉身毛孔熙怡欣悅及樂修相智不修緣起發悟之相是名聲聞乘無間種性聲聞無間見第八地起煩惱斷習煩惱不斷不度不思議變易死度分段死正師子吼我生已盡梵行已立不受後有如實知修習人無我乃至得般涅槃覺魏譯大慧何者聲聞乘性證法謂説陰界入法故説自相同相證智法故彼身毛孔熙怡欣悅樂修相智不修因緣不相離相故大慧是名聲聞乘性證法故彼聲聞人邪見證智離起粗煩惱不離無明熏習煩惱見己身證相謂初地中乃至五地六地離諸煩惱同己所離故熏習無明煩惱故墮不可思議變易死故而作是言我生已盡梵行已立所作已辦不受後有如是等得入人無我乃至生心以為得涅槃故唐譯大慧云何知是聲聞乘種性若聞説於蘊界處自相共相若知若證舉身毛竪心樂修習於緣起相不樂觀察應知此是聲聞乘種性彼於自乘見所證已於五六地斷煩惱結不斷煩惱習住不思議死正師子吼言我生已盡梵行已立所作已辦不受後有修習人無我乃至生於得涅槃覺大慧各別無間者我人衆生壽命長養士夫彼諸衆生作如是覺求般涅槃復有異外道説悉由作者見一切性已言此是般涅槃作如是覺法無我見非分彼無解脫大慧此諸聲聞乘無間外道種性不出出覺為轉彼惡見故應當修學魏譯大慧復有餘外道求證涅槃而作是言覺知我人衆生壽命作者受者丈夫以為涅槃大慧復有餘外道見一切諸法依因而有生涅槃心故大慧彼諸外道無涅槃解脫以不見法無我故大慧是名聲聞乘外道性於非離處而生離想大慧汝應轉此邪見修行如實行故唐譯大慧復有衆生求證涅槃言能覺知我人衆生養者取者此是涅槃復有説言見一切法因作者有此是涅槃大慧彼無解脫以未能見法無我故此是聲聞乘及外道種性於未出中生出離想應勤修習捨此惡見大慧緣覺乘無間種性者若聞説各別緣無間舉身毛竪悲泣流淚不相近緣所有不著種種自身種種神通若合若離種種變化聞説是時其心隨入若知彼緣覺乘無間種性已隨順為説緣覺之乘是名緣覺乘無間種性相魏譯大慧何者辟支佛乘性證法謂聞説緣覺證法舉身毛竪悲泣流淚不樂憒閙故觀察諸因緣法故不著諸因緣法故聞説自身種種神通若離若合種種變化其心隨入故大慧是名緣覺乘性證法汝當應知隨順緣覺説唐譯大慧云何知是緣覺乘種性謂若聞説緣覺乘法舉身毛竪悲泣流淚離憒閙緣無所染著有時聞説現種種身或聚或散神通變化其心信受無所違逆當知此是緣覺乘種性應為其説緣覺乘法大慧彼如來乘無間種性有四種謂自性法無間種性離自性法無間種性得自覺聖無間種性外剎殊勝無間種性大慧若聞此四事一一説時及説自心現身財建立不思議境界時心不驚怖者是名如來乘無間種性相魏譯大慧何者如來乘性證法大慧如來乘性證法有四種何者為四一者證實法性二者離實法證性三者自身內證聖智性四者外諸國土勝妙莊嚴證法性大慧若聞説此一一法時但阿黎耶心見外身所依資生器世間不可思議境界不驚不怖不畏者大慧當知是證如來乘性人大慧是名如來乘性證法人相唐譯大慧如來乘種性所證法有三種所謂自性無自性法內身自證聖智法外諸佛剎廣大法大慧若有聞説此一一法及自心所現身財建立阿賴耶識不思議境不驚不怖不畏當知此是如來乘性大慧不定種性者謂説彼三種時隨説而入隨彼而成大慧此是初治地者謂種性建立為超入無所有地故作是建立彼自覺藏者自煩惱習淨見法無我得三昧樂住聲聞當得如來最勝之身魏譯大慧何者不定乘性證法大慧若人聞説此三種法於一一中有所樂者隨順為説大慧説三乘者為發起修行地故説諸性差別非究竟地為欲建立畢竟能取寂靜之地故大慧彼三種人離煩惱障熏習得清淨故見法無我得三昧樂行故聲聞緣覺畢竟證得如來法身故唐譯大慧不定種性者謂聞説彼三種法時隨生信解而順修學大慧為初治地人而説種性欲令其入無影像地作此建立大慧彼住三昧樂聲聞若能證知自所依識見法無我淨煩惱習畢竟常得如來之身爾時世尊欲重宣此義而説偈言須陀槃那果往來及不還逮得阿羅漢是等心惑亂魏譯爾時世尊重説偈言逆流修無漏往來及不還應供阿羅漢是等心亂惑唐譯爾時世尊即説頌言預流一來果不還阿羅漢是等諸聖人其心悉迷惑三乘與一乘非乘我所説愚夫少智慧諸聖遠離寂魏譯我説於三乘一乘及非乘諸聖如實解凡夫不能知唐譯我所立三乘一乘及非乘為愚夫少智樂寂諸聖説第一義法門遠離於二教住於無所有何建立三乘魏譯第一義法門遠離於二教建立於三乘為住寂靜處唐譯第一義法門遠離於二取住於無境界何建立三乘諸禪無量等無色三摩提受想悉寂滅亦無有心量魏譯諸禪及無量無色三摩提無想定滅盡亦皆心中無唐譯諸禪及無量無色三摩提乃至滅受想唯心不可得大慧彼一闡提非一闡提世間解脫誰轉大慧一闡提有二種一者捨一切善根及於無始衆生發願云何捨一切善根謂謗菩薩藏及作惡言此非隨順修多羅毗尼解脫之説捨一切善根故不般涅槃魏譯大慧何者無性乘謂一闡提大慧一闡提者無涅槃性何以故於解脫中不生信心不入涅槃大慧一闡提者有二種何等為二一者焚燒一切善根二者憐愍一切衆生作盡一切衆生界願大慧云何焚燒一切善根謂謗菩薩藏作如是言彼非隨順修多羅毗尼解脫説捨諸善根是故不得涅槃唐譯復次大慧此中一闡提何故於解脫中不生欲樂大慧以捨一切善根故為無始衆生起願故云何捨一切善根謂謗菩薩藏言此非隨順契經調伏解脫之説作是語時善根悉斷不入涅槃二者菩薩本自願方便故非不般涅槃一切衆生而般涅槃大慧彼般涅槃是名不般涅槃法相此亦到一闡提趣魏譯大慧憐愍衆生作盡衆生界願者是為菩薩大慧菩薩方便作願若諸衆生不入涅槃者我亦不入涅槃是故菩薩摩訶薩不入涅槃大慧是名二種一闡提無涅槃性以是義故決定取一闡提行唐譯云何為無始衆生起願謂諸菩薩以本願方便願一切衆生悉入涅槃若一衆生未涅槃者我終不入此亦住一闡提趣此是無涅槃種性相大慧白佛言世尊此中云何畢竟不般涅槃佛告大慧菩薩一闡提者知一切法本來般涅槃已畢竟不般涅槃而非捨一切善根一闡提也大慧捨一切善根一闡提者復以如來神力故或時善根生所以者何謂如來不捨一切衆生故以是故菩薩一闡提不般涅槃魏譯大慧菩薩白佛言世尊此二種一闡提何等一闡提常不入涅槃佛告大慧菩薩摩訶薩一闡提常不入涅槃何以故以能善知一切諸法本來涅槃是故不入涅槃非捨一切善根闡提何以故大慧彼捨一切善根闡提若值諸佛善知識等發菩提心生諸善根便證涅槃何以故大慧諸佛如來不捨一切諸衆生故是故大慧菩薩一闡提常不入涅槃唐譯大慧菩薩言世尊此中何者畢竟不入涅槃佛言大慧彼菩薩一闡提知一切法本來涅槃畢竟不入非捨善根何以故捨善根一闡提以佛威力故或時善根生所以者何佛於一切衆生無捨時故是故菩薩一闡提不入涅槃復次大慧菩薩摩訶薩當善三自性云何三自性謂妄想自性緣起自性成自性魏譯復次大慧菩薩摩訶薩當善知三法自體相大慧何等三法自體相一者虗妄分別名字相二者因緣法體自相相三者第一義諦法體相唐譯復次大慧菩薩摩訶薩當善知三自性相何者為三所謂妄計自性緣起自性圓成自性大慧妄想自性從相生大慧白佛言世尊云何妄想自性從相生佛告大慧緣起自性事相相行顯現事相相計著有二種妄想自性如來應供等正覺之所建立謂名相計著相及事相計著相名相計著相者謂內外法計著事相計著相者謂即彼如是內外自共相計著是名二種妄想自性相若依若緣生是名緣起魏譯大慧何者虗妄分別名字相謂從名字虗妄分別一切法相是名虗妄分別名字之相大慧何者因緣法體自相相大慧因緣法體自相相者從境界事生故大慧因緣法體境界事相諸佛如來應正遍知説虗妄分別差別有二種何等為二種一者妄執名字戲論分別二者妄執名字相分別境界相事相大慧何者妄執名字相境界相事相謂即彼內外法自相同相大慧是名因緣法體二種自相相以依彼法觀彼法生故大慧是名因緣法體自相相唐譯大慧妄計自性從相生云何從相生謂彼依緣起事相種類顯現生計著故大慧彼計著事相有二種妄計性生是諸如來之所演説謂名相計著相事相計著相大慧事計著相者謂計著內外法相計著相者謂即彼內外法中計著自共相是名二種妄計自性相大慧從所依所緣起是緣起性云何成自性謂離名相事相妄想聖智所得及自覺聖智趣所行境界是名成自性如來藏心魏譯大慧何者第一義諦法體相謂諸佛如來離名字相境界相事相相聖智修行境界行處大慧是名第一義諦相諸佛如來藏心唐譯何者圓成自性謂離名相事相一切分別自證聖智所行真如大慧此是圓成自性如來藏心爾時世尊欲重宣此義而説偈言名相覺想自性二相正智如如是則成相魏譯爾時世尊重説偈言名相分別事及法有二相真如正妙智是第一義相唐譯爾時世尊即説頌言名相分別二自性相正智真如是圓成性大慧是名觀察五法自性相經自覺聖智趣所行境界汝等諸菩薩摩訶薩應當修學魏譯大慧是名觀察五法自相法門諸佛菩薩修行內證境界之相汝及諸菩薩應如是學唐譯大慧是名觀察五法自性相法門自證聖智所行境界汝及諸菩薩摩訶薩當勤修學復次大慧菩薩摩訶薩善觀二種無我相云何二種無我相謂人無我及法無我云何人無我謂離我我所陰界入聚無知業愛生眼色等攝受計著生識一切諸根自心現器身藏自妄想相施設顯示魏譯復次大慧菩薩摩訶薩應當善觀二無我相大慧何等二種一者人無我智二者法無我智云何人無我智謂離我我所陰界入聚故無智業愛生故依眼色等虗妄執著故自心現見一切諸根器身屋宅故自心分別分別故分別分別識故唐譯復次大慧菩薩摩訶薩當善觀察二無我相何者為二所謂人無我相法無我相大慧何者是人無我相謂蘊界處離我我所無知愛業之所生起眼等識生取於色等而生計著又自心所見身器世間皆是藏心之所顯現剎那相續變壞不停如河流如種子如燈如風如雲剎那展轉壞躁動如猿猴樂不淨處如飛蠅無厭足如風火無始虗偽習氣因如汲水輪生死趣有輪種種身色如幻術神呪機發像起善彼相知是名人無我智魏譯如河流種子燈焰風雲念念展轉前後差別輕躁動轉如猿猴蠅等愛樂不淨境界處故無厭足如火故因無始來戲論境界熏習故猶如轆轤車輪機關於三界中生種種色種種身如幻起尸大慧如是觀諸法相巧方便智是名善知人無我智境界之相唐譯如河流如種子如燈焰如迅風如浮雲躁動不安如猿猴樂不淨處如飛蠅不知厭足如猛火無始虗偽習氣為因諸有趣中流轉不息如汲水輪種種色身威儀進止譬如死尸呪力故行亦如木人因機運動若能於此善知其相是名人無我智云何法無我智謂覺陰界入妄想相自性如陰界入離我我所陰界入積聚因業愛繩縛展轉相緣生無動搖諸法亦爾離自共相不實妄想相妄想力是凡夫生非聖賢也心意識五法自性離故魏譯大慧何者法無我智謂如實分別陰界入相大慧菩薩觀察陰界入等無我我所陰界入聚因業愛繩遞共相縛因緣生故無我無作者大慧陰界入等離同相異相故依不實相分別得名愚癡凡夫妄想分別以為有故非證實者見以為有大慧菩薩如是觀察心意意識五法體相一切離故諸因緣無是名善知諸法無我智境界相唐譯大慧云何為法無我智謂知蘊界處是妄計性如蘊界處離我我所唯共積聚愛業繩縛互為緣起無能作者蘊等亦爾離自共相虗妄分別種種相現愚夫分別非諸聖者如是觀察一切諸法離心意意識五法自性是名菩薩摩訶薩法無我智大慧菩薩摩訶薩當善分別一切法無我善法無我菩薩摩訶薩不久當得初地菩薩無所有觀地相觀察開覺歡喜次第漸進超九地相得法雲地於彼建立無量寶莊嚴大寶蓮花王像大寶宮殿幻自性境界修習生於彼而坐同一像類諸最勝子眷屬圍繞從一切佛剎來佛手灌頂如轉輪聖王太子灌頂超佛子地到自覺聖智法趣當得如來自在法身見法無我故是名法無我相汝等諸菩薩摩訶薩應當修學魏譯大慧菩薩善知諸法無我已觀察真如修寂靜行不久當得初歡喜地善能觀察歡喜地已如是諸地次第轉明乃至得證法雲之地菩薩住彼法雲地已無量諸寶間錯莊嚴大蓮花王座大寶宮殿如實業幻境界所生而坐其上一切同行諸佛子等恭敬圍繞十方諸佛申手灌頂授於佛位如轉輪王灌太子頂過佛子地過佛子地已觀諸佛法如實修行於諸法中而得自在得自在已名得如來無上法身以見法無我故大慧是名如實法無我相大慧汝及諸菩薩應如是學唐譯得此智已知無境界了諸地相即入初地心生歡喜次第漸進乃至善慧及以法雲諸有所作皆悉已辦住是地已有大寶蓮花王衆寶莊嚴於其花上有寶宮殿狀如蓮花菩薩往修幻性法門之所成就而坐其上同行佛子前後圍繞一切佛剎所有如來皆舒其手如轉輪王子灌頂之法而灌其頂超佛子地獲自證法成就如來自在法身大慧是名見法無我相汝及諸菩薩摩訶薩應勤修學爾時大慧菩薩摩訶薩復白佛言世尊建立誹謗相惟願説之令我及諸菩薩摩訶薩離建立誹謗二邊惡見疾得阿耨多羅三藐三菩提覺已離常建立斷誹謗見不謗正法魏譯爾時聖者大慧菩薩復白佛言世尊世尊有無謗相願為我説世尊我及諸菩薩摩訶薩若聞得離有無邪見速得阿耨多羅三藐三菩提得阿耨多羅三藐三菩提已遠離斷常邪見建立便能建立諸佛正法唐譯爾時大慧菩薩摩訶薩復白佛言世尊願説建立誹謗相令我及諸菩薩摩訶薩離此惡見疾得阿耨多羅三藐三菩提得菩提已破建立常誹謗斷見令於正法不生毀謗爾時世尊受大慧菩薩請已而説偈言建立及誹謗無有彼心量身受用建立及心不能知愚癡無智慧建立及誹謗魏譯爾時世尊復受聖者大慧菩薩摩訶薩請已而説偈言心中無斷常身資生住處惟心愚無智無物而見有唐譯佛受其請即説頌言身資財所住皆唯心影像凡愚不能了起建立誹謗所起但是心離心不可得爾時世尊於此偈義復重顯示告大慧言有四種非有有建立云何為四謂非有相建立非有見建立非有因建立非有性建立是名四種建立又誹謗者謂於彼所立無所得觀察非分而起誹謗是名建立誹謗相魏譯爾時世尊於此偈義復重宣説告聖者大慧菩薩言大慧有四種建立謗相何等為四一者建立非有相二者建立非正見相三者建立非有因相四者建立非有體相大慧是名四種建立大慧何者是謗相大慧觀察邪見所建立法不見實相即謗諸法言一切無大慧是名建立謗相唐譯爾時世尊欲重明此義告大慧言有四種無有有建立何者為四所謂無有相建立相無有見建立見無有因建立因無有性建立性是為四大慧誹謗者謂於諸惡見所建立法求不可得不善觀察遂生誹謗此是建立誹謗相復次大慧云何非有相建立相謂陰界入非有自共相而起計著此如是此不異是名非有相建立相此非有相建立妄想無始虗偽過種種習氣計著生魏譯復次大慧何者建立非有相謂分別陰界入非有法無始來戲論非有實故而執著同相異相此法如是如是畢竟不異大慧依此無量世來煩惱熏習執著而起大慧是名建立非有相唐譯大慧云何無有相建立相謂於蘊界處自相共相本無所有而生計著此如是此不異而此分別從無始種種惡習所生是名無有相建立相大慧非有見建立相者若彼如是陰界入我人衆生壽命長養士夫見建立是名非有見建立相魏譯大慧何者建立非正見相大慧彼陰界入中無我人衆生壽者作者受者而建立邪見謂有我等故大慧是名建立非正見相唐譯云何無有見建立見謂於蘊界處建立我人衆生等見是名無有見建立見大慧非有因建立相者謂初識無因生後不實如幻本不生眼色明界念前生生已實已還壞是名非有因建立相魏譯大慧何者建立非有因相謂初識不從因生本不生後時生如幻本無因物而有因眼色明空念故識生生已還滅大慧是名建立非有因相唐譯云何無有因建立因謂初識前無因不生其初識本無後眼色明念等為因如幻生生已有有還滅是名無有因建立因大慧非有性建立相者謂虗空滅般涅槃非作計著性建立此離性非性一切法如兔馬等角如垂髮現離有非有是名非有性建立相魏譯大慧何者建立非有體謗法相謂虗空滅涅槃無作無物建立執著大慧彼三法離有無故大慧一切諸法如兔馬驢駝角毛輪等故離有無建立相故大慧是名建立非有體謗法相唐譯云何無有性建立性謂於虗空涅槃非數滅無作性執著建立大慧此離性非性一切諸法離於有無猶如毛輪兔馬等角是名無有性建立性建立及誹謗愚夫妄想不善觀察自心現量非聖賢也是故離建立誹謗惡見應當修學魏譯大慧建立謗相者諸凡夫虗妄分別故不知但是心見諸法是有非聖人所見故大慧汝當遠離不正見建立謗法相故唐譯大慧建立誹謗皆是凡愚不了唯心而生分別非諸聖者是故汝等當勤觀察遠離此見復次大慧菩薩摩訶薩善知心意意識五法自性二無我相趣究竟為安衆生故作種種類像如妄想自性處依於緣起譬如衆色如意寶珠普現一切諸佛剎土一切如來大衆集會悉於其中聽受佛法所謂一切法如幻如夢光影水月於一切法離生滅斷常及離聲聞緣覺之法魏譯復次大慧諸菩薩摩訶薩如實知心意意識五法體相二種無我為安隱衆生現種種類像如彼虗妄無所分別依因緣法而有種種大慧菩薩摩訶薩亦復如是依衆生現種種色如如意寶隨諸一切衆生心念於諸佛土大衆中現如幻如夢如響如水中月鏡中像故遠離諸法不生不滅非常非斷故現佛如來離諸聲聞緣覺乘故唐譯大慧菩薩摩訶薩善知心意意識五法自性二無我相已為衆生故作種種身如依緣起起妄計性亦如摩尼隨心現色普入佛會聽聞佛説諸法如幻如夢如影如鏡中像如水中月遠離生滅及以斷常不住聲聞辟支佛道得百千三昧乃至百千億那由他三昧得三昧已遊諸佛剎供養諸佛生諸天宮宣揚三寶示現佛身聲聞菩薩大衆圍繞以自心現量度脫衆生分別演説外性無性悉令遠離有無等見魏譯聞諸佛法即得無量百千萬億諸深三昧得三昧已依三昧力從一佛土至一佛土供養諸佛示現生於諸宮殿中讚歎三寶現作佛身菩薩聲聞大衆圍繞令諸一切衆生得入自心見境為説外境無物有物令得遠離建立有無法故唐譯聞已成就無量百千億那由他三昧得此三昧已遍遊一切諸佛國土供養諸佛生諸天上顯揚三寶示現佛身為諸聲聞菩薩大衆説外境界皆唯自心悉令遠離有無等執爾時世尊欲重宣此義而説偈言心量世間佛子觀察種類之身離所作行得力神通自在成就魏譯爾時世尊重説偈言佛子見世間惟心無諸法種類非身作得力自在成唐譯爾時世尊即説頌言佛子能觀見世間唯是心示現種種身所作無障礙神通力自在一切皆成就爾時大慧菩薩摩訶薩復請佛言惟願世尊為我等説一切法空無生無二離自性相我等及餘諸菩薩衆覺悟是空無生無二離自性相已離有無妄想疾得阿耨多羅三藐三菩提爾時世尊告大慧菩薩摩訶薩言諦聽諦聽善思念之今當為汝廣分別説大慧白佛言善哉世尊唯然受教魏譯爾時聖者大慧菩薩復請佛言惟願世尊為我等説一切法空無生無二離自體相我及一切諸菩薩衆知諸法空無生無二離自體相已離有無妄想速得阿耨多羅三藐三菩提爾時佛告聖者大慧菩薩摩訶薩言善哉善哉善哉大慧諦聽諦聽我今為汝廣分別説大慧白佛言善哉世尊唯然受教唐譯爾時大慧菩薩摩訶薩復請佛言願為我説一切法空無生無二無自性相我及諸菩薩悟此相故離有無分別疾得阿耨多羅三藐三菩提佛言諦聽當為汝説佛告大慧空空者即是妄想自性處大慧妄想自性計著者説空無生無二離自性相大慧彼略説七種空謂相空性自性空行空無行空一切法離言説空第一義聖智大空彼彼空魏譯佛告大慧言大慧空者即是妄想法體句大慧依執著妄想法體説空無生無體相不二大慧空有七種何等為七一者相空二者一切法有物無物空三者行空四者不行空五者一切法無言空六者第一義聖智大空七者彼彼空唐譯大慧空者即是妄計性句義大慧為執著妄計自性故説空無生無二無自性大慧略説空性有七種謂相空自性空行空無行空一切法不可説空第一義聖智大空彼彼空云何相空謂一切性自共相空觀展轉積聚故分別無性自共相不生自他俱性無性故相不住是故説一切性相空是名相空魏譯大慧何者是相空謂一切法自相同相空見遞共積聚大慧觀察一一法自相同相無一法可得離自相他相二相無相可住可見是故名為自相空唐譯云何相空謂一切法自相共相空展轉積聚互相待故分析推求無所有故自他及共皆不生故自共相無生亦無住是故名一切法自相空云何性自性空謂自己性自性不生是名一切法性自性空是故説性自性空魏譯大慧何者一切法有物無物空謂自體相實有法生大慧諸法自體相有無俱空是故名為自體相有物無物空唐譯云何自性空謂一切法自性不生是名自性空云何行空謂陰離我我所因所成所作業方便生是名行空魏譯大慧何者是行空謂諸陰等離我我所依因作業而得有生大慧是故名為行空唐譯云何行空所謂諸蘊由業及因和合而起離我我所是名行空大慧即此如是行空展轉緣起自性無性是名無行空魏譯大慧何者不行空謂陰法中涅槃未曾行大慧是名不行空唐譯云何無行空所謂諸蘊本來涅槃無有諸行是名無行空云何一切法離言説空謂妄想自性無言説故一切法離言説是名一切法離言説空魏譯大慧何者一切法無言空謂妄想分別一切諸法無言可説大慧是名一切法無言空唐譯云何一切法不可説空謂一切法妄計自性無可言説是名不可説空云何一切法第一義聖智大空謂得自覺聖智一切見過習氣空是名一切法第一義聖智大空魏譯大慧何者第一義聖智大空謂自身內證聖智法空離諸邪見熏習之過大慧是名第一義聖智大空唐譯云何第一義聖智大空謂得自證聖智待一切諸見過習悉離是名第一義聖智大空云何彼彼空謂於彼無彼空是名彼彼空大慧譬如鹿子母舍無象馬牛羊等非無比丘衆而説彼空非舍舍性空亦非比丘比丘性空非餘處無象馬是名一切法自相彼於彼無彼是名彼彼空是名七種空彼彼空者是空最粗汝當遠離魏譯大慧何者彼彼空謂何等何等法處彼法無此法有彼法有此法無是故言空大慧我昔曾為鹿母説殿堂空者無象馬牛羊等名為空有諸比丘等名為不空而殿堂殿堂體無比丘比丘體亦不可得而彼象馬牛羊等非餘處無大慧如是諸法自相同相亦不可得離此彼處是故我言彼彼空大慧是名七種空大慧此彼彼空最為粗淺大慧汝當應離彼彼空不須修習唐譯云何彼彼空謂於此無彼是名彼彼空譬鹿子母堂無象馬牛羊等我説彼堂空非無比丘衆大慧非謂堂無堂自性非謂比丘無比丘自性非謂餘處無象馬牛羊大慧一切諸法自共相彼彼求不可得是故説名彼彼空是名七種空大慧此彼彼空空中最粗汝應遠離大慧不自生非不生除住三昧是名無生魏譯大慧言何者不生大慧自體不生而非不生依世諦故説名為生依本不生故言不生唐譯復次大慧無生者自體不生而非不生除住三昧是名無生離自性即是無生離自性剎那相續流注及異性現一切性離自性是故一切性離自性魏譯大慧言何者無體相大慧我説無體相者一切諸法體本不生是故我言諸法無體相而相續體剎那剎那不住大慧以見異異相故是故一切法無體相唐譯大慧無自性者以無生故密意而説大慧一切法無自性以剎那不住故見後變異故是名無自性云何無二謂一切法如陰熱如長短如黑白大慧一切法無二非於涅槃彼生死非於生死彼涅槃異相因有性故是名無二如涅槃生死一切法亦如是是故空無生無二離自性相應當修學魏譯大慧言何者名為不二法相大慧二法相者謂日光影長短黑白彼如是等法各各別名不得言不二大慧如世間涅槃一切諸法各各有二大慧何等涅槃彼處無世間何處世間彼處無涅槃以異因相故是故我言一切諸法不二一切諸法不二者世間涅槃無二故是故汝應修學諸法空不生無體不二故唐譯云何無二相大慧如光影如長短如黑白皆相待立獨則不成大慧非於生死外有涅槃非於涅槃外有生死生死涅槃無相違相如生死涅槃一切法亦如是是名無二相大慧空無生無二無自性相汝當勤學爾時世尊欲重宣此義而説偈言我常説空法遠離於斷常生死如幻夢而彼業不壞虗空及涅槃滅二亦如是愚夫作妄想諸聖離有無魏譯爾時世尊重説偈言我常説空法遠離於斷常生死如幻夢而彼業不失虗空及涅槃滅二亦如是凡夫分別生聖人離有無唐譯爾時世尊重説頌言我常説空法遠離於斷常生死如幻夢而業亦不壞虗空及涅槃滅度亦如是愚夫妄分別諸聖離有無爾時世尊復告大慧菩薩摩訶薩言大慧空無生無二離自性相普入諸佛一切修多羅凡所有經悉説此義諸修多羅悉隨衆生希望心故為分別説顯示其義而非真實在於言説如鹿渴想誑惑羣鹿鹿於彼相計著水性而彼無水如是一切修多羅所説諸法為令愚夫發歡喜故非實聖智在於言説是故當依於義莫著言説魏譯爾時佛告聖者大慧菩薩摩訶薩言大慧一切法空不生無體不二相入於諸佛如來所説修多羅中凡諸法門皆説此義大慧一切修多羅隨諸一切衆生心故分別顯示大慧譬如陽𦦨迷惑禽獸虗妄執著生於水想而陽𦦨中實無有水大慧一切修多羅説法亦復如是為諸凡夫自心分別令得歡喜非如實聖智在於言説大慧汝應隨順於義莫著所説名字章句唐譯爾時世尊復告大慧菩薩摩訶薩言大慧此空無生無自性無二相悉入一切諸佛所説修多羅中佛所説經皆有是義大慧諸修多羅隨順一切衆生心説而非真實在於言中譬如陽𦦨誑惑諸獸令生水想而實無水衆經所説亦復如是隨諸愚夫自所分別令生歡喜非皆顯示聖智證處真實之法大慧應隨順義莫著言説
