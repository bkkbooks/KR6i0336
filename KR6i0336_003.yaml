body:
  text: 明臨濟正宗中都沙門員珂會譯一切佛語心品第一之下爾時大慧菩薩摩訶薩知大菩薩衆心之所念名聖智事分別自性經承一切佛威神之力而白佛言世尊惟願為説聖智事分別自性經百八句分別所依魏譯爾時聖者大慧菩薩知諸大菩薩摩訶薩心之所念承佛如來住持之力問於如來名聖智行分別法門體世尊願為我説名聖智行分別法門體依百八句分別説唐譯爾時大慧菩薩摩訶薩知諸菩薩心之所念承一切佛威神之力白佛言唯願為説百八句差別所依聖智事自性法門如來應供等正覺依此分別説菩薩摩訶薩入自相共相妄想自性以分別説妄想自性故則能善知周遍觀察人法無我淨除妄想照明諸地超越一切聲聞緣覺及諸外道諸禪定樂觀察如來不可思議所行境界畢定捨離五法自性諸佛如來法身智慧善自莊嚴起幻境界升一切佛剎兜率天宮乃至色究竟天宮逮得如來常住法身魏譯如來應正遍知依此百八句為諸菩薩摩訶薩分別説自相同相妄想分別體修行差別法諸菩薩善得此妄想分別自體法行差別能清淨人無我法無我善解諸地過諸聲聞辟支佛禪定三摩跋提之樂得諸佛如來不可思議境界修行故得離五法自體相行入諸佛法身體真實行故得如來法身善決定處如幻境界所成故一切國土從兜率天阿迦尼吒處得如來身故唐譯一切如來應正等覺為諸菩薩摩訶薩墮自共相者説此妄計性差別義門知此義已則能淨治二無我觀照明諸地超越一切二乘外道三昧之樂見諸如來不可思議所行境界畢竟捨離五法自性以一切佛法身智慧而自莊嚴入如幻境住一切剎兜率陀宮色究竟天成如來身佛告大慧有一種外道作無所有妄想計著覺知因盡兔無角想如兔無角一切法亦復如是大慧復有餘外道見種求那極微陀羅驃形處橫法各各差別見已計著無兔角橫法作牛有角想魏譯佛告聖者大慧菩薩有一種外道邪見執著空無所有妄想分別智因有二自體無體分別兔角無如兔角無諸法亦無大慧復有餘外道見四大功德實有物見各各有差別相實無兔角虗妄執著妄想分別實有牛角唐譯佛言大慧有一類外道見一切法隨因而盡生分別解想兔無角起於無見如兔角無一切諸法悉亦如是復有外道見大種求那塵等諸物形量分位各差別已執兔無角於此而生牛有角想大慧彼墮二見不解心量自心境界妄想增長身受用建立妄想根量大慧一切法性亦復如是離有無不應作想大慧若復離有無而作兔無角想是名邪想彼因待觀故兔無角不應作想乃至微塵分別事性悉不可得大慧聖境界離不應作牛有角想魏譯大慧彼諸外道墮於二見不知唯心妄想分別增長自心界大慧如身資生器世間等唯是心分別不得分別兔角離於有無大慧不得分別一切諸法離於有無大慧若有人離於有無作如是言無有有兔角分別不得分別無有有兔角彼人見相待因不得分別無兔角何以故大慧乃至觀察微細微塵不見實事離聖人智境界不得分別有牛角唐譯大慧彼墮二見不了唯心但於自心增長分別大慧身及資生器世間等一切皆唯分別所現大慧應知兔角離於有無諸法悉然勿生分別云何兔角離於有無互因待故分析牛角乃至微塵求其體相終不可得聖智所行遠離彼見是故於此不應分別爾時大慧菩薩摩訶薩白佛言世尊得無妄想者見不生相已隨比思量觀察不生妄想言無耶魏譯爾時聖者大慧菩薩摩訶薩白佛言世尊愚癡凡夫不見分別相而比智分別彼人見無唐譯爾時大慧菩薩摩訶薩復白佛言世尊彼豈不以妄見起相比度觀待妄計無耶佛告大慧非觀察不生妄想言無所以者何妄想者因彼生故依彼角生妄想以依角生妄想是故言依因故離異不異故非觀察不生妄想言無角魏譯佛告聖者大慧菩薩大慧非觀分別心彼人無相何以故因虗妄分別心依角有分別心大慧依止虗妄角有分別心是故依依止因離相待法非見法彼無角唐譯佛言不以分別起相待以言無何以故彼以分別為生因故以角分別為其所依所依為因離異不異非由相待顯兔角無大慧若復妄想異角者則不因角生若不異者則因彼故乃至微塵分析推求悉不可得不異角故彼亦非性二俱無性者何法何故而言無耶大慧若無故無角觀有故言兔無角者不應作想大慧不正因故而説有無二俱不成魏譯大慧若離分別心更有分別應離角有非因角有大慧若不離彼分別心彼法乃至觀察微塵不見有實物大慧不離於心彼法應無以彼二法有無不可得若爾見何等法有何等法無大慧若不如是見有無不得分別有無此義云何見有牛角見無兔角不得如是分別大慧以因不相似故有無義不成以諸外道凡夫聲聞説有無義二俱不成故唐譯大慧若此分別異兔角者則非角因若不異者因彼而起大慧分析牛角乃至極微求不可得異於有角言無角者如是分別決定非理二俱非有誰待於誰若相待不成待於有故言兔角無不應分別不正因故有無論者執有執無二俱不成大慧復有餘外道見計著色空事形處橫法不能善知虗空分齊言色離虗空起分齊見妄想魏譯大慧復有餘外道見色有因妄想執著形相長短見虗空無形相分齊見諸色相異於虗空有其分齊唐譯大慧復有外道見色形狀虗空分齊而生執著言色異虗空起於分別大慧虗空是色隨入色種大慧色是虗空持所持處所建立性色空事分別當知大慧四大種生時自相各別亦不住虗空非彼無虗空魏譯大慧虗空即是色以色大入虗空故大慧色即是虗空依此法有彼法依彼法有此法故以依色分別虗空以虗空分別色故大慧四大種生自相各別不住虗空而四大中非無虗空唐譯大慧虗空是色隨入色種大慧色是虗空能持所持建立性故色空分齊應如是知大慧大種生時自相各別不住虗空中非彼無虗空如是大慧觀牛有角故兔無角大慧又牛角者析為微塵又分別微塵剎那不住彼何所觀故而言無耶若言觀餘物者彼法亦然魏譯大慧兔角亦如是因牛角有言兔角無大慧又彼牛角析為微塵分別微塵相不可得見彼何等何等法有何等何等法無而言有耶無耶若如是觀餘法亦然唐譯大慧兔角亦爾觀待牛角言彼角無大慧分析牛角乃至微塵又析彼塵其相不現彼何所待而言無耶若待餘物彼亦如是爾時世尊告大慧菩薩摩訶薩言當離兔角牛角虗空形色異見妄想汝等諸菩薩摩訶薩當思惟自心現妄想隨入為一切剎土最勝子以自心現方便而教授之魏譯爾時佛告聖者大慧菩薩言大慧汝當應離兔角牛角虗空色異妄想見等大慧汝亦應為諸菩薩説離兔角等相大慧汝應當知自心所見虗妄分別之相大慧汝當於諸佛國土中為諸佛子説汝自心現見一切虗妄境界唐譯大慧汝應遠離兔角牛角虗空及色所有分別汝及諸菩薩摩訶薩應常觀察自心所見分別之相於一切國土為諸佛子説觀察自心修行之法爾時世尊欲重宣此義而説偈言色等及心無色等長養心身受用安立識藏現衆生心意及與識自性法有五無我二種淨廣説者所説長短有無等展轉互相生以無故成有以有故成無微塵分別事不起色妄想心量安立處惡見所不樂覺想非境界聲聞亦復然救世之所説自覺之境界魏譯爾時世尊重説偈言色於心中無心依境見有內識衆生見身資生住處心意與意識自性及五法二種無我淨如來如是説長短有無等展轉互相生以無故成有以有故成無分別微塵體不起色妄想但心安住處惡見不能淨非妄智境界聲聞亦不知如來之所説自覺之境界唐譯爾時世尊即説頌言心所見無有唯依心故起身資所住影衆生藏識現心意及與識自性五種法二無我清淨諸導師演説長短共觀待展轉互相生因有故成無因無故成有微塵分析事不起色分別唯心所安立惡見者不信外道非行處聲聞亦復然救世之所説自證之境界爾時大慧菩薩為淨除自心現流故復請如來白佛言世尊云何淨除一切衆生自心現流為頓為漸耶魏譯爾時聖者大慧菩薩摩訶薩為淨自心現流復請如來而作是言世尊云何淨除自心現流為次第淨為一時耶唐譯爾時大慧菩薩摩訶薩為淨自心現流故而請佛言世尊云何淨諸衆生自心現流為漸次淨為頓淨耶佛告大慧漸淨非頓如菴羅果漸熟非頓如來淨除一切衆生自心現流亦復如是漸淨非頓譬如陶家造作諸器漸成非頓如來淨除一切衆生自心現流亦復如是漸淨非頓譬如大地漸生萬物非頓生也如來淨除一切衆生自心現流亦復如是漸淨非頓譬如人學音樂書畫種種伎術漸成非頓如來淨除一切衆生自心現流亦復如是漸成非頓譬如明鏡頓現一切無相色像如來淨除一切衆生自心現流亦復如是頓現無相無有所有清淨境界如日月輪頓照顯示一切色像如來為離自心現習氣過患衆生亦復如是頓為顯示不思議智最勝境界譬如藏識頓分別知自心現及身安立受用境界彼諸依佛亦復如是頓熟衆生所處境界以修行者安處於彼色究竟天譬如法佛所作依佛光明照耀自覺聖趣亦復如是彼於法相有性無性惡見妄想照令除滅魏譯佛告聖者大慧菩薩摩訶薩言大慧淨自心現流次第漸淨非為一時大慧譬如菴摩羅果漸次成熟非為一時大慧衆生清淨自心現流亦復如是漸次清淨非為一時譬如陶師造作諸器漸次成就非為一時大慧諸佛如來淨諸衆生自心現流亦復如是漸次而淨非一時淨大慧譬如大地生諸樹林藥草萬物漸次增長非一時成大慧諸佛如來淨諸衆生自心現流亦復如是漸次而淨非一時淨大慧譬如有人學諸音樂歌舞書畫種種伎術漸次而解非一時知大慧諸如來淨諸衆生自心現流亦復如是漸次而淨非一時淨大慧譬如明鏡無分別心一時俱現一切色像如來世尊亦復如是無有分別淨諸衆生自心現流一時清淨非漸次淨令住寂靜無分別處大慧譬如日月輪相光明一時遍照一切色像非為前後大慧如來世尊亦復如是為令衆生遠離自心煩惱見熏習氣過患一時示現不思議智最勝境界大慧譬如阿黎耶識分別現境自身資生器世間等一時而知非是前後大慧報佛如來亦復如是一時成熟諸衆生界置究竟天淨妙宮殿修行清淨之處大慧譬如法佛報佛放諸光明有應化佛照諸世間大慧內身聖行光明法體照除世間有無邪見亦復如是唐譯佛言大慧漸淨非頓如菴羅果漸熟非頓諸佛如來淨諸衆生自心現流亦復如是漸淨非頓如陶師造器漸成非頓諸佛如來淨諸衆生自心現流亦復如是漸而非頓譬如大地生諸草木漸生非頓諸佛如來淨諸衆生自心現流亦復如是漸而非頓大慧譬如人學音樂書畫種種伎術漸成非頓諸佛如來淨諸衆生自心現流亦復如是漸而非頓譬如明鏡頓現衆像而無分別諸佛如來淨諸衆生自心現流亦復如是頓現一切無相境界而無分別如日月輪一時遍照一切色像諸佛如來淨諸衆生自心過習亦復如是頓為示現不可思議諸佛如來智慧境界譬如藏識頓現於身及資生國土一切境界報佛亦爾於色究竟天頓能成熟一切衆生令修諸行譬如法佛頓現報佛及以化佛光明照曜自證聖境亦復如是頓現法相而為照曜令離一切有無惡見大慧法依佛説一切法入自相共相自心現習氣因相續妄相自性計著因種種不實如幻種種計著不可得魏譯復次大慧法佛報佛説一切法自相同相故因故自心現見熏習相故因虗妄分別戲論相縛故如所説法無如是體故大慧譬如幻師幻作一切種種形像諸愚癡人取以為實而彼諸像實不可得唐譯大慧法性所流佛説一切法自相共相自心現習氣因相妄計性所執因相更相繫屬種種幻事皆無自性而諸衆生種種執著取以為實悉不可得復次大慧計著緣起自性生妄想自性相大慧如工幻師依草木瓦石作種種幻起一切衆生若干形色起種種妄想彼諸妄想亦無真實魏譯復次大慧虗妄法體依因緣法執著有實分別而生大慧如巧幻師依草木瓦石作種種事依於呪術人工之力成就一切衆生形色身分之相名幻人像衆生見幻種種形色執著為人而實無人大慧衆生雖見以為是人無實人體唐譯復次大慧妄計自性執著緣起自性起大慧譬如幻師以幻術力依草木瓦石幻作衆生若干色像令其見者種種分別皆無真實如是大慧依緣起自性起妄想自性種種妄想心種種相行事妄想相計著習氣妄想大慧是為妄想自性相生大慧是名依佛説法魏譯大慧因緣法體隨心分別亦復如是以見心相種種幻故何以故以執著虗妄相因分別心熏習故大慧是名分別虗妄體相大慧是名報佛説法之相唐譯大慧此亦如是由取著境界習氣力故於緣起性中有妄計性種種相現是名妄計性生大慧是名法性所流佛説法相大慧法佛者離心自性相自覺聖所緣境界建立施作魏譯大慧法佛説法者離心相應體故內證聖行境界故大慧是名法佛説法之相唐譯大慧法性佛者建立自證智所行離心自性相大慧化佛者説施戒忍精進禪定及心智慧離陰界入解脫識相分別觀察建立超外道見無色見魏譯大慧應化佛所作應佛説施戒忍精進禪定智慧故陰界入解脫故建立識想差別行故説諸外道無色三摩跋提次第相大慧是名應佛所作應佛説法相唐譯大慧化佛説施戒忍進禪定智慧蘊界處法又諸解脫諸識行相建立差別越外道見超無色行大慧又法佛者離攀緣攀緣離一切所作根量根滅非諸凡夫聲聞緣覺外道計著我相所著境界自覺聖究竟差別相建立是故大慧自覺聖究竟差別相當勤修學自心現見應當除滅魏譯復次大慧法佛説法者離攀緣故離能觀所觀故離所作相量相故大慧非諸凡夫聲聞緣覺外道境界故以諸外道執著虗妄我相故是故大慧如是內身自覺修行勝相當如是學大慧汝當應離見自心相以為非實唐譯復次大慧法性佛非所攀緣一切所緣一切所作根量等相悉皆遠離非凡夫二乘及諸外道執著我相所取境界是故大慧於自證聖智勝境界相當勤修學於自心所現分別見相當速捨離復次大慧有二種聲聞乘通分別相謂得自覺聖差別相及性妄想自性計著相云何得自覺聖差別相聲聞謂無常苦空無我境界真諦離欲寂滅息陰界入自共相外不壞相如實知心得寂止心寂止已禪定解脫三昧道果正受解脫不離習氣不思議變易死得自覺聖樂住聲聞是名得自覺聖差別相聲聞魏譯復次大慧聲聞乘有二種差別相謂於內身證得聖相故執著虗妄相分別有物故大慧何者聲聞內身證得聖相謂無常苦空無我境界故真諦離欲寂滅故陰界入故自相同相故內外不滅相故見如實法故得心三昧得心三昧已得禪定解脫三昧道果三摩跋提不退解脫故未得不可思議熏習變易死故內身證得聖樂行法住聲聞地故大慧是名聲聞內身證得聖相唐譯復次大慧聲聞乘有二種差別相所謂自證聖智殊勝相分別執著自性相云何自證聖智殊勝相謂明見苦空無常無我諸諦境界離欲寂滅故於蘊界處若自若共外不壞相如實了知故心住一境住一境已獲禪解脫三昧道果而得出離住自證聖智境界樂未離習氣及不思議變易死是名聲聞乘自證聖智境界相大慧得自覺聖差別樂住菩薩摩訶薩非滅門樂正受樂顧憫衆生及本願不作證大慧是名聲聞得自覺聖差別相樂菩薩摩訶薩於彼得自覺聖差別相樂不應修學魏譯大慧菩薩摩訶薩入諸聲聞內證聖行三昧樂法而不取寂滅空門樂不取三摩跋提樂以憐愍衆生故起本願力行是故雖知不取為究竟大慧是名聲聞內身證聖修行樂相大慧菩薩摩訶薩應當修行內身證聖修行樂門而不取著唐譯菩薩摩訶薩雖亦得此聖智境界以憐愍衆生故本願所持故不證寂滅門及三昧樂諸菩薩摩訶薩於此自證聖智樂中不應修學大慧云何性妄想自性計著相聲聞所謂大種青黃赤白堅濕暖動非作生自相共相先勝善説見已於彼起自性妄想菩薩摩訶薩於彼應知應捨隨入法無我相滅人無我相見漸次諸地相續建立是名諸聲聞性妄想自性計著相魏譯大慧何者是聲聞分別有物執著虗妄相謂於四大堅濕熱動相青黃赤白等相故無作者而有生故自相同相故斟量相應阿含先勝見善説故依彼法虗妄執著以為實有大慧是名聲聞分別有物執著虗妄相大慧菩薩摩訶薩於彼聲聞法應知而捨捨已入法無我相入法無我相已入人無我觀察無我相已次第入諸地大慧是名聲聞分別有物執著虗妄相大慧所言聲聞乘有二種相者我已説竟唐譯大慧云何分別執著自性相所謂知堅濕暖動青黃赤白如是等法非作者生然依教理見自共相分別執著是名聲聞乘分別執著相菩薩摩訶薩於此法中應知應捨離人無我見入法無我相漸住諸地爾時大慧菩薩摩訶薩白佛言世尊世尊所説常不思議自覺聖趣境界及第一義境界世尊非諸外道所説常不思議因緣耶魏譯爾時聖者大慧菩薩摩訶薩復白佛言世尊世尊所説常不可思議法內身證聖境界法第一義法世尊外道亦説常不可思議因果此義云何唐譯爾時大慧菩薩摩訶薩白佛言世尊如來所説常不思議自證聖智第一義境將無同諸外道所説常不思議作者耶佛告大慧非諸外道因緣得常不思議所以者何諸外道常不思議不因自相成若常不思議不