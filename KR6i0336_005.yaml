body:
  text: 明臨濟正宗中都沙門員珂會譯一切佛語心品第二之下爾時大慧菩薩摩訶薩復白佛言世尊常聲者何事說佛告大慧為惑亂以彼惑亂諸聖亦現而非顛倒大慧如春時𦦨火輪垂髮犍闥婆城幻夢鏡像世間顛倒非明智也然非不現大慧彼惑亂者有種種現非惑亂作無常所以者何謂離性非性故魏譯爾時聖者大慧菩薩摩訶薩復白佛言世尊世尊說常法依何等法作如是說佛告聖者大慧菩薩言大慧依迷惑法我說為常何以故大慧聖人亦見世間迷惑法非顛倒心大慧譬如陽𦦨火輪毛輪乾闥婆城幻夢水中月鏡中像世間非智慧者見有諸像顛倒見故有智慧者不生分別非不見彼迷惑之事大慧有智慧者見彼種種迷惑之事不生實心何以故離有無法故唐譯爾時大慧菩薩摩訶薩復白佛言世尊所說常聲依何處說佛言大慧依妄法說以諸妄法聖人示現然不顛倒大慧譬如陽𦦨火輪垂髮乾闥婆城夢幻鏡像世無智者生顛倒解有智不然然非不現大慧妄法現時無量差別然非無常何以故離有無故大慧云何離性非性惑亂謂一切愚夫種種境界故如彼恒河餓鬼見不見故無惑亂性於餘現故非無性如是惑亂諸聖離顛倒不顛倒是故惑亂常謂相相不壞故大慧非惑亂種種相妄想相壞是故惑亂常魏譯佛告聖者大慧菩薩言大慧云何迷惑法離於有無謂諸愚痴凡夫見有種種境界如諸餓鬼大海恒河見水不見大慧是迷惑法不得言有不得言無大慧餘眾生見彼是水故不得言無大慧迷惑之事亦復如是以諸聖人離顛倒見故大慧言迷惑法常者以想差別故大慧因迷惑法見種種相而迷惑法不分別異差別是故大慧迷惑法常唐譯云何離有無一切愚夫種種解故如恒河水有見不見餓鬼不見不可言有餘所見故不可言無聖於妄法離顛倒見大慧妄法是常相不異故非諸妄法有差別相以分別故而有別異是故妄法其体是常大慧云何惑亂真實若復因緣諸聖於此惑亂不起顛倒覺非不顛倒覺大慧除諸聖於此惑亂有少分想非聖智事相大慧凡有者愚夫妄說非聖言說魏譯大慧云何迷惑法名之為實以諸聖人迷惑法中不生顛倒心亦不生實心大慧而諸聖人見彼迷惑法起少心想不生聖智事相大慧起少想者是謂凡夫非謂聖人唐譯大慧云何而得妄法真實謂諸聖者於妄法中不起顛倒非顛倒覺若於妄法有少分想則非聖智有少想者當知則是愚夫戲論非聖言說彼惑亂者倒不倒妄想起二種種性謂聖種性及愚夫種性聖種性者三種分別謂聲聞乘緣覺乘佛乘云何愚夫妄想起聲聞乘種性謂自共相計着起聲聞乘種性是名妄想起聲聞乘種性大慧即彼惑亂妄想起緣覺乘種性謂即彼惑亂自共相不親計着起緣覺乘種性云何智者即彼惑亂起佛乘種性謂覺自心現量外性非性不妄想相起佛乘種性是名即彼惑亂起佛乘種性魏譯大慧分別彼惑亂法顛倒非顛倒者能生二種性何等二種一者能生凡夫性二者能生聖人性大慧彼聖人性者能生三種差別之性所謂聲聞辟支佛佛國土差別性故大慧云何毛道凡夫分別迷惑法而能生彼聲聞乘性大慧所謂執着彼迷惑法自相同相能成聲聞乘性大慧是名迷惑法能生能成聲聞乘性大慧云何愚痴凡夫分別迷惑法而能生彼辟支佛乘性大慧所謂執着彼迷惑法觀察諸法自相同相不樂憒閙能生辟支佛乘性大慧是名迷惑法能生能成辟支佛乘性大慧云何智者即分別彼迷惑之法能生佛乘性大慧所謂見彼能見可見唯是自心而不分別有無法故大慧如是觀察迷惑之法能生能成如來乘性大慧如是名為性義唐譯大慧若分別妄法是倒非倒彼則成就二種種性謂聖種性凡夫種性大慧聖種性者彼復三種謂聲聞緣覺佛乘別故大慧云何愚夫分別妄法生聲聞乘種性所謂計着自相共相大慧何謂復有愚夫分別妄法成緣覺乘種性謂即執着自共相時離於憒閙大慧何謂智人分別妄法而得成就佛乘種性所謂了達一切唯是自心分別所見無有外法又種種事性凡夫惑想起愚夫種性彼非有事非無事是名種性義大慧即彼惑亂不妄想諸聖心意意識過習氣自性法轉變性是名為如是故說如離心我說此句顯示離想即說離一切想魏譯大慧何者一切毛道凡夫即分別彼迷惑之法見種種事能生世間所有乘性以觀察諸法如是如是決定不異是故大慧彼迷惑法愚痴凡夫虗妄分別種種法體大慧彼迷惑法非是實事非不實事何以故大慧聖人觀察彼迷惑法不虗妄分別是故聖人能轉心意意識身相離煩惱習故是故聖人轉彼迷惑法名為真如大慧此名何等法此名真如法離分別法故大慧為此義故我重宣說真如法體離分別法彼真如中無彼虗妄分別法故唐譯大慧有諸愚夫分別妄法種種事物決定如是決定不異此則成就生死乘性大慧彼妄法中種種事物非即是物亦非非物大慧即彼妄法諸聖智者心意意識諸惡習氣自性法轉依故即說此妄名為真如是故真如離於心識我今明了顯示此句離分別者悉離一切諸分別故大慧白佛言世尊惑亂為有為無佛告大慧如幻無計着相若惑亂有計着相者計着性不可滅緣起應如外道說因緣生法魏譯大慧菩薩復白佛言世尊彼惑亂法為有為無佛告大慧彼迷惑法執着種種相故名有大慧彼迷惑法於妄想中若是有者一切聖人皆應不離執着有無虗妄法故大慧如外道說十二因緣有從因生不從因生此義亦如是唐譯大慧菩薩白言世尊所說妄法為有為無佛言如幻無執着相故若執着相體是有者應不可轉則諸緣起應如外道說作者生大慧白佛言世尊若惑亂如幻者復當與餘惑作因佛告大慧非幻惑因不起過故大慧幻不起過無有妄想大慧幻者從他明處生非自妄想過習氣處生是故不起過大慧此是愚夫心惑計着非聖賢也魏譯大慧言世尊若迷惑法如幻見者此迷惑法異於迷惑以迷惑法能生法故佛告大慧大慧非迷惑法生煩惱過大慧若不分別迷惑法者不生諸過復次大慧一切幻法依於人功呪術而生非自心分別煩惱而生是故大慧彼迷惑法不生諸過唯是愚痴人見迷惑法故大慧愚痴凡夫執着虗妄微細之事而生諸過非謂聖人唐譯大慧又言若諸妄法同於幻者此則當與餘妄作因佛言大慧非諸幻事為幻惑因以幻不生諸過惡故以諸幻事無分別故大慧夫幻事者從他明呪而得生起非自分別過習力起是故幻事不生過惡大慧此妄惑法唯是愚夫心所執着非諸聖者爾時世尊欲重宣此義而說偈言聖不見惑亂中間亦無實中間若真實惑亂即真實捨離一切惑若有相生者是亦為惑亂不淨猶如翳魏譯爾時世尊重說偈言聖不見惑亂中間亦無實迷惑即是實實法決迷惑捨離諸迷惑若有相生者即彼是迷惑不淨猶如翳唐譯爾時世尊重說頌言聖不見妄法中間亦非實以妄即真故中間亦真實若離於妄法而有相生者此還即是妄如翳未清淨復次大慧非幻無有相似見一切法如幻大慧白佛言世尊為種種幻相計着言一切法如幻為異相計着若種種幻相計着言一切性如幻者世尊有性不如幻者所以者何謂色種種相非因世尊無有因色種種相現如幻世尊是故無種種幻相計着相似性如幻魏譯復次大慧汝不得言幻是無故一切諸法亦無如幻大慧言世尊為執着諸法如幻相故言諸法如幻為執着諸法顛倒相故言諸法如幻也世尊若執着諸法如幻相者世尊不得言一切法皆如幻相若執着諸法顛倒相故言如幻者不得言一切法如幻何以故世尊色有種種因相見故世尊無有異因色有諸相可見如幻是故世尊不得說言執着諸法一切如幻唐譯復次大慧見諸法非幻無有相似故說一切法如幻大慧言世尊為依執着種種幻相言一切法猶如幻耶為異依此執着顛倒相耶若依執着種種幻相言一切法猶如幻者世尊非一切法悉皆如幻何以故見種種色相不無因故世尊都無有因令種種色相顯現如幻是故世尊不可說言依於執着種種幻相言一切法與幻相似佛告大慧非種種幻相計着相似一切法如幻大慧然不實一切法速滅如電是則如幻大慧譬如電光剎那頃現現已即滅非愚夫現如是一切性自妄想自共相觀察無性非現色相計着魏譯佛告大慧非謂執着種種法相說言諸法一切如幻大慧諸法顛倒速滅如電故言如幻大慧一切諸法譬如電光即見即滅凡夫不見大慧一切諸法亦復如是以一切法自心分別同相異相以不能觀察故不如實見以妄執着色等法故唐譯佛言大慧不依執着種種幻相言一切法如幻大慧以一切法不實速滅如電故說如幻大慧譬如電光見已即滅世間凡愚悉皆現見一切諸法依自分別自共相現亦復如是以不能觀察無所有故而妄計着種種色相爾時世尊欲重宣此義而說偈言非幻無有譬說法性如幻不實速如電是故說如幻魏譯爾時世尊重說偈言非見色等法說言無幻法故不違上下我說一切法不見有本性如幻無生體唐譯爾時世尊重說頌言非幻無相似亦非有諸法不實速如電如幻應當知大慧復白佛言如世尊所說一切性無生及如幻將無世尊前後所說自相違耶說無生性如幻魏譯大慧復白佛言世尊如世尊說諸法不生復言如幻將無世尊前後所說自相違也以如來說一切諸法不如幻故唐譯爾時大慧菩薩摩訶薩復白佛言世尊如佛先說一切諸法皆悉無生又言如幻將非所說前後相違佛告大慧非我說無生性如幻前後相違過所以者何謂生無生覺自心現量有非有外性非性無生現大慧非我前後說相違過然壞外道因生故我說一切性無生大慧外道痴聚欲令有無有生非自妄想種種計着緣大慧我非有無有生是故我以無生說而說魏譯佛告大慧我說一切法不生如幻者不成前後有相違過何以故以諸一切愚痴凡夫不見生法及不生法不能覺知自心有無外法有無何以故以不能見不生法故大慧我如是說諸法前後無有相違大慧我遮外道建立因果義不相當故我說諸法不生大慧一切外道愚痴羣聚作如是說從於有無生一切法不說自心分別執着因緣而生大慧我說諸法亦有不生亦無不生是故大慧我說諸法不生不滅唐譯佛言大慧無有相違何以故我了於生即是無生唯是自心之所見故若有若無一切外法見其無性本不生故大慧為離外道因生義故我說諸法皆悉不生大慧外道羣聚共興惡見言從有無生一切法非自執着分別為緣大慧我說諸法非有無生故名無生大慧說性者為攝受生死故壞無見斷見故為我弟子攝受種種業受生處故以性聲說攝受生死魏譯大慧我說一切諸法有者護諸弟子令知二法何等為二一者攝取諸世間故二者為護諸斷見故何以故以依業故有種種身攝六道生是故我說言有諸法攝取世間唐譯大慧說諸法者為令弟子知依諸業攝受生死遮其無有斷滅見故大慧說幻性自性相為離性自性相故隨愚夫惡見相希望不知自心現量壞因所作生緣自性相計着說夢幻自性相一切法不令愚夫惡見希望計着自及他一切法如實處見作不正論大慧如實處見一切法者謂超自心現量魏譯大慧我說一切法如幻者為令一切愚痴凡夫畢竟能離自相同相故以諸凡夫痴心執着墮於邪見以不能知但是自心虗妄見故令離執着因緣生法是故我說一切諸法如幻如夢無有實體何以故若不如是說者愚痴凡夫執邪見心欺誑自身及於他身離如實見一切法故大慧云何住如實見謂入自心見諸法故唐譯大慧說諸法相如幻者令離諸法自性相故為諸凡愚墮惡見欲不知諸法唯心所現為令遠離執着因緣生起之相說一切法如幻如夢彼諸愚夫執着惡見欺誑自他不能明見一切諸法如實住處大慧見一切法如實處者謂能了達唯心所現爾時世尊欲重宣此義而說偈言無生作非性有性攝生死觀察如幻等於相不妄想魏譯爾時世尊重說偈言如汝言諸法一切不生者是則謗因果不生如實見我說有生法攝受諸世間見諸法同幻不取諸見相唐譯爾時世尊重說頌言無作故無生有法攝生死了達如幻等於相不分別復次大慧當說名句形身相善觀名句形身菩薩摩訶薩隨入義句形身疾得阿耨多羅三藐三菩提如是覺已覺一切眾生大慧名身者謂若依事立名是名名身句身者謂句有義身自性決定究竟是名句身形身者謂顯示名句是名形身又形身者謂長短高下又句身者謂徑跡如象馬人獸等所行徑跡得句身名大慧名及形者謂以名說無色四陰故說名自相現故說形是名名句形身說名句形身相分齊應當脩學魏譯復次佛告聖者大慧菩薩言大慧我今為諸菩薩摩訶薩說名句字身相以諸菩薩善知名句字身相故依名句字身相速得阿耨多羅三藐三菩提得菩提已為眾生說名句字相大慧菩薩白佛言善哉世尊唯願速說大慧何者名身謂依何等何等法作名名身事物名異義一大慧是名我說名身大慧何者是句身謂義事決定究竟見義故大慧是名我說句身大慧何者是字身謂文句畢竟故大慧復次名身者依何等法了別名句能了知自形相故大慧復次句身者謂句字畢竟故大慧復次名身者所謂諸字從名差別從阿字乃至呵字名為名身大慧復次字身者謂聲長短音韻高下名為字身大慧復次句身者謂巷路行跡如人象馬諸獸行跡等得名為句大慧復次名字者謂無色四陰依名而說大慧復次名字相者謂能了別名字相故大慧是名名句字身相大慧如是名句字相汝應當為人演說唐譯復次大慧我當說名句文身相諸菩薩摩訶薩善觀此相了達其義疾得阿耨多羅三藐三菩提復能開悟一切眾生大慧名身者謂依事立名名即是身是名名身句身者謂能顯義決定究竟是名句身文身者謂由於此能成名句是名文身復次大慧句身者謂句事究竟名身者謂諸字名各各差別如從阿字乃至呵字文身者謂長短高下復次句身者如足跡如衢巷中人畜等跡名謂非色四蘊以名說故文謂名之自相由文顯故是名名句文身此名句文身相汝應脩學爾時世尊欲重宣此義而說偈言名身與句身及形身差別凡夫愚計著如象溺深泥魏譯爾時世尊重說偈言名身與句身及字身差別凡夫癡計着如象溺深泥唐譯爾時世尊重說頌言名身與句身及字身差別凡愚所計着如象溺深泥復次大慧未來世智者以離一異俱不俱見相我所通義問無智者彼即答言此非正問謂色等常無常為異不異如是涅槃諸行相所相求那所求那造所造見所見塵及微塵脩與脩者如是比展轉相如是等問而言佛說無記止論非彼痴人之所能知謂聞慧不具故如來應供等正覺令彼離恐怖句故說言無記不為記說又止外道見論故而不為說魏譯復次大慧未來世中無智慧者以邪見心不知如實法故因問論自言智者有智者問如實之法離邪見相一異俱不俱而彼愚人作如是言是問非是非正念問謂色等法常無常為一為異如是涅槃有為諸行為一為異相中所有能見所見為一為異作者所作為一為異四大中色香味觸為一為異能見可見為一為異泥團微塵為一為異知者所知為一為異如是等上上次第相上上無記置答佛如是說是謂謗我大慧而我不說如是法者為遮外道邪見說故唐譯復次大慧未來世中有諸邪見惡思覺者離如實法以見一異俱不俱相問諸智者彼即答言此非正問謂色與無常為異為不異如是涅槃諸行相所相依所依造所造見所見地與微塵智與智者為異為不異如是等不可記事次第而問世尊說此當止記答愚夫無智非所能知佛欲令其離驚怖處不為記說大慧不記說者欲令外道永得出離作者見故大慧外道作如是說謂命即是身如是等無記論大慧彼諸外道愚痴於因作無記論非我所說大慧我所說者離攝所攝妄想不生云何止彼大慧若攝所攝計着者不知自心現量故止彼大慧如來應供等正覺以四種記論為眾生說法大慧止記論者我時時說為根未熟不為熟者魏譯何以故大慧外道等說謂身即命身異命異如是等法外道所說是無記法大慧外道迷於因果義故是故無記非我法中名無記也大慧我佛法中離能見可見虗妄之相無分別心是故我法中無有置答諸外道等執着可取能取不知但是自心見法為彼人故我說言有四種問法無記置答非我法中大慧諸佛如來應正遍知為諸眾生有四種說言置答者大慧為待時故說如是法為根未熟非為根熟是故我說置答之義唐譯大慧諸外道眾計有作者作如是說命即是身命異身異如是等說名無記論大慧外道癡惑說無記論非我教中大慧我教中說離能所取不起分別云何可止大慧若有執着能取所取不了唯是自心所見彼應可止大慧諸佛如來以四種記論為眾生說法大慧止記論者我別時說以根未熟且止說故復次大慧一切法離所作因緣不生無作者故一切法不生大慧何故一切性離自性以自覺觀時自共性相不可得故說一切法不生何故一切法不可持來不可持去以自共相欲持來無所來欲持去無所去是故一切法離持來去大慧何故一切諸法不滅謂性自性相無故一切法不可得故一切法不滅大慧何故一切法無常謂相起無常性是故說一切法無常大慧何故一切法常謂相起無生性無常常故說一切法常魏譯復次大慧一切諸法若離作者及因是故不生以無作者故是故我說諸法不生佛告大慧一切諸法無有體相大慧白佛言世尊何故一切諸法無實体相佛告大慧自智觀察一切諸法自相同相不見於法是故我說一切諸法無實體相佛告大慧一切諸法亦無取相大慧言世尊以何義故一切諸法亦無取相佛告大慧自相同相無法可取是故我說無法可取佛告大慧一切諸法亦無捨相大慧言世尊何故諸法亦無捨相佛告大慧觀察自相同相法無法可捨是故我說一切諸法亦無捨相佛告大慧諸法不滅大慧言世尊何故一切諸法不滅佛告大慧觀一切法自相同相無体相故是故我說諸法不滅佛告大慧諸法無常大慧言世尊何故一切諸法無常佛告大慧一切諸法常無常相常不生相是故我說諸法無常復次大慧我說一切諸法無常大慧言世尊何故一切諸法無常佛告大慧以相不生以不生體相是故常無常是故我說諸法無常唐譯復次大慧何故一切法不生以離能作所作無作者故何故一切法無自性以證智觀自相共相不可得故何故一切法無來去以自共相來無所從去無所至故何故一切法不滅謂一切法無性相故不可得故何故一切法無常謂諸相起無常性故何故一切法常謂諸相起即是不起無所有故無常性常是故我說一切法常爾時世尊欲重宣此義而說偈言記論有四種一向反詰問分別及止論以制諸外道有及非有生僧伽毗舍師一切悉無記彼如是顯示正覺所分別自性不可得以離於言說故說離自性魏譯爾時世尊重說偈言記論有四種直答及質答分別答置答以制諸外道數論與勝論言有非有生而說悉無記彼作如是說正智慧觀察自性不可得是故不可說及說無体相唐譯爾時世尊重說頌言一向反詰問分別與置答如是四種說摧伏諸外道數論與勝論言有非有生如是等諸說一切皆無記以智觀察時體性不可得以彼無可說故說無自性爾時大慧菩薩摩訶薩復白佛言世尊惟願為說諸須陀洹須陀洹趣差別通相若菩薩摩訶薩善解須陀洹趣差別通相及斯陀含阿那含阿羅漢方便相分別知已如是如是為眾生說法謂二無我相及二障淨度諸地相究竟通達得諸如來不思議究竟境界如眾色摩尼善能饒益一切眾生以一切法境界無盡身財攝養一切魏譯爾時聖者大慧菩薩摩訶薩白佛言世尊唯願世尊為我等說須陀洹等行差別相我及一切菩薩摩訶薩等善知須陀洹等修行相已如實知須陀洹斯陀含阿那含阿羅漢等如是如是為眾生說眾生聞已入二無我相淨二種障次第進取地地勝相得如來不可思議境界脩行得修行處已如如意寶隨眾生念受用境界身口意行故唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我說諸須陀洹須陀洹行差別相我及諸菩薩摩訶薩聞是義故於須陀洹斯陀含阿那含阿羅漢方便相皆得善巧如是而為眾生演說令其證得二無我法淨除二障於諸地相漸次通達獲於如來不可思議智慧境界如眾色摩尼普令眾生悉得饒益佛告大慧諦聽諦聽善思念之今為汝說大慧白佛言善哉世尊唯然聽受佛告大慧有三種須陀洹須陀洹果差別云何為三謂下中上下者極七有生中者三五有生而般涅槃上者即彼生而般涅槃魏譯佛告大慧言善哉善哉善哉大慧諦聽諦聽今為汝說大慧白佛言善哉世尊唯然聽受佛告大慧言大慧須陀洹有三種果差別大慧言何等三種佛告大慧謂下中上大慧何者須陀洹下謂三有中七反受生大慧何者為中謂三生五生入於涅槃大慧何者為上謂即一生入於涅槃唐譯佛言諦聽當為汝說大慧言唯佛言大慧諸須陀洹須陀洹果差別有三謂下中上大慧下者於諸有中極七反生中者三生五生上者即於此生而入涅槃此三種有三結下中上云何三結謂身見疑戒取是三結差別上上昇進得阿羅漢魏譯大慧是三種須陀洹有三種結謂下中上大慧何者三結謂身見疑戒取大慧彼三種結上上勝進得阿羅漢果唐譯大慧此三種人斷三種結謂身見疑戒禁取上上勝進得阿羅漢大慧身見有二種謂俱生及妄想如緣起妄想自性妄想譬如依緣起自性種種妄想自性計着生以彼非有非無非有無無實妄想相故愚夫妄想種種妄想自性相計着如熱時𦦨鹿渴水想是須陀洹妄想身見彼以人無我攝受無性斷除久遠無知計着魏譯大慧身見有二種何等為二一者俱生二者虗妄分別而生如因緣分別法故大慧譬如依諸因緣法相虗妄分別而生實相彼因緣法中非有非無以分別有無非實相故愚痴凡夫執着種種法相如諸禽獸見於陽𦦨取以為水大慧是名須陀洹分別身見何以故以無智故無始世來虗妄取相故大慧此身見垢見人無我乃能遠離唐譯大慧身見有二種謂俱生及分別如依緣起有妄計性大慧譬如依止緣起性故種種妄計執着性生彼法但是妄分別相非有非無非亦有亦無凡夫愚癡而橫執着猶如渴獸妄生水想此分別身見無智慧故久遠相應見人無我即時捨離大慧俱生者須陀洹身見自他身等四陰無色相故色生造及所造故展轉相因相故大種及色不集故須陀洹觀有無品不現身見則斷如是身見斷貪則不生是名身見相魏譯大慧何者須陀洹俱生身見所謂自身他身俱見彼二四陰無色色陰生時依於四大及四塵等彼此因緣和合生色而須陀洹知已能離有無邪見斷於身見斷身見已不生貪心大慧是名須陀洹身見之相唐譯大慧俱生身見以普觀察自他之身受等四蘊無色相故色由大種而得生故是諸大種互相因故色不集故如是觀已明見有無即時捨離捨身見故貪則不生是名身見相大慧疑相者謂得法善見相故及先二種身見妄想斷故疑法不生不於餘處起大師見為淨不淨是名疑相須陀洹斷魏譯大慧何者須陀洹疑相謂得證法善見相已先斷身見及於二見分別之心是故於諸法中不生疑心復不生心於餘尊者以為尊想為淨不淨故大慧是名須陀洹疑相唐譯大慧疑相者於所證法善見相故及先二種身見分別斷故於諸法中疑不得生亦不於餘生大師想為淨不淨是名疑相大慧戒取者云何須陀洹不取戒謂善見受生處苦相故是故不取大慧取者謂愚夫決定受習苦行為眾具樂故求受生彼則不取除回向自覺勝離妄想無漏法相行方便受持戒支是名須陀洹取戒相斷魏譯大慧何者須陀洹戒取相謂善見受生處苦相故是故不取戒相大慧戒取者謂諸凡夫持戒精進種種善行求樂境界生諸天中彼須陀洹不取是相而取自身內證回向進趣勝處離諸妄想修無漏戒分大慧是名須陀洹戒取相唐譯大慧何故須陀洹不取戒禁謂以明見生處苦相是故不取夫其取者謂諸凡愚於諸有中貪着世樂苦行持戒願生於彼須陀洹人不取是相唯求所證最勝無漏無分別法修行戒品是名戒禁取相須陀洹斷三結貪癡不生若須陀洹作是念此諸結我不成就者應有二過墮身見及諸結不斷大慧白佛言世尊世尊說眾多貪欲彼何者貪斷佛告大慧愛樂女人纏綿貪著種種方便身口惡業受現在樂種未來苦彼則不生所以者何得三昧正受樂故是故彼斷非趣涅槃貪斷魏譯大慧須陀洹斷三結煩惱離貪瞋癡若須陀洹生如是心此是三結我離三結者大慧是名見三法隨於身見彼若如是不離三結大慧是故須陀洹不生如是心大慧白佛言世尊世尊說眾多貪須陀洹離何等貪佛告大慧須陀洹遠離與諸女人和合不為現在樂種未來苦因遠離打摑鳴抱視大慧須陀洹不生如是貪心何以故以得三昧樂行故大慧須陀洹遠離如是等貪非離涅槃貪唐譯大慧須陀洹人捨三結故離貪瞋癡大慧若須陀洹作如是念我離諸結則有二過謂墮我見及諸結不斷大慧白言貪有多種捨何等貪佛告大慧捨於女色纏綿貪欲見此現樂生來苦故又得三昧殊勝樂故是故捨彼非涅槃貪大慧云何斯陀含相謂頓照色相妄想生相見相不生善見禪趣相故頓來此世盡苦際得涅槃是故名斯陀含魏譯大慧何者斯陀含果相謂一往見色相現前生心非虗妄分別想見以善見禪脩行相故一往來世間便斷苦盡入於涅槃是故名斯陀含唐譯大慧云何斯陀含果謂不了色相起色分別一往來已善脩禪行盡苦邊際而般涅槃是名斯陀含大慧云何阿那含謂過去未來現在色相性非性生見過患使妄想不生故及結斷故名阿那含魏譯大慧何者阿那含相謂於過去現在未來色相中生有無心以見使虗妄分別心諸結不生不來故名阿那含唐譯大慧云何阿那含果謂於過去現在色相起有無見分別過惡隨眠不起永捨諸結更不還來是名阿那含大慧阿羅漢者謂諸禪三昧解脫力明煩惱苦妄想非性故名阿羅漢魏譯大慧阿羅漢相謂不生分別思惟可思惟三昧解脫力通煩惱苦等分別心故名阿羅漢唐譯大慧阿羅漢者謂諸禪三昧解脫力通悉已成就煩惱諸諸苦分別永盡是名阿羅漢大慧白佛言世尊世尊說三種阿羅漢此說何等阿羅漢世尊為得寂靜一乘道為菩薩摩訶薩方便示現阿羅漢為佛化化佛告大慧得寂靜一乘道聲聞非餘餘者行菩薩行及佛化化巧方便本願故於大眾中示現受生為莊嚴佛眷屬故大慧於妄想處種種說法謂得果得禪禪者入禪悉遠離故示現得自心現量得果相說名得果復次大慧欲超禪無量無色界者當離自心現量相大慧受想正受超自心現量者不然何以故有心量故魏譯大慧菩薩白佛言世尊說三種阿羅漢此說何等羅漢名阿羅漢世尊為說得決定寂滅羅漢為發菩提願善根忘善根羅漢為化應化羅漢佛告大慧為說得決定寂滅聲聞羅漢非餘羅漢大慧餘羅漢者謂曾脩行菩薩行者復有應化佛所化羅漢本願善根方便力故現諸佛土生大眾中莊嚴諸佛大會眾故大慧分別去來說種種事遠離證果能思惟所思惟可思惟故以見自心為見所見說得果相復次大慧若欲遠離禪無量無色界者應當遠離自心見相遠離少想寂滅定三摩䟦提相故大慧若不如是彼菩薩心見諸法以唯心故唐譯大慧言世尊阿羅漢有三種謂一向趣寂退菩提願佛所變化此說何者佛言大慧此說趣寂非是其餘大慧餘二種人謂已曾發巧方便願及為莊嚴諸佛眾會於彼示生大慧於虗妄處說種種法所謂證果禪者及禪皆性離故自心所見得果相故復次大慧若欲超過諸禪無量無色界者應離自心所見諸相大慧想受滅三昧超自心所見境者不然不離心故爾時世尊欲重宣此義而說偈言諸禪四無量無色三摩提一切受想滅心量彼無有須陀槃那果往來及不還及與阿羅漢斯等心惑亂禪者禪及緣斷知見真諦此則妄想量若覺得解脫魏譯爾時世尊重說偈言諸禪四無量無色三摩提少想寂滅定一切心中無逆流脩無漏及於一往來往來及不還羅漢心迷沒思可思能思遠離見真諦唯是虗妄心能知得解脫唐譯爾時世尊重說頌言諸禪與無量無色三摩提及以想受滅唯心不可得預流一來果不還阿羅漢如是諸聖人悉依心妄有禪者禪所緣斷惑見真諦此皆是妄想了知即解脫復次大慧有二種覺謂觀察覺及妄想相攝受計著建立覺大慧觀察覺者謂若覺性自性相選擇離四句不可得是名觀察覺魏譯復次大慧有二種智何等為二一者觀察智二者虗妄分別取相住智大慧何者觀察智謂何等智觀察一切諸法體相離於四法無法可得是名觀察智唐譯復次大慧有二種覺智謂觀察智及取相分別執着建立智觀察智者謂觀一切法離四句不可得大慧彼四句者謂離一異俱不俱有無非有非無常無常是名四句大慧此四句離是名一切法大慧此四句觀察一切法應當脩學魏譯大慧何者四法謂一異俱不俱是名四法大慧若離四法一切法不可得大慧若欲觀察一切法者當依四法而觀諸法唐譯四句者謂一異俱不俱有非有常無常等我以諸法離此四句是故說言一切法離大慧如是觀法汝應脩學大慧云何妄想相攝受計者建立覺謂妄想相攝受計著堅濕煖動不實妄想相四大種宗因相譬喻計着不實建立而建立是名妄想相攝受計着建立覺是名二種覺相若菩薩摩訶薩成就此二覺相人法無我相究竟善知方便無所有覺觀察行地得初地入百三昧得差別三昧見百佛及百菩薩知前後際各百劫事光照百剎土知上上地相大願殊勝神力自在法雲灌頂當得如來自覺地善繫心十無盡句成熟眾生種種變化光明莊嚴得自覺聖樂三昧正受魏譯大慧妄想分別取相住智者所謂執着堅熱濕動虗妄分別四大相故執着建立因譬喻相故建立非實法以為實大慧是名虗妄分別執着取相住智大慧是名二種智相大慧諸菩薩摩訶薩畢竟知此二相進趣法無我相善知真實智行地知已即得初地得百三昧依三昧力見百佛見百菩薩能知過去未來各百劫事照百佛世界照百佛世界已善知諸地上上智相以本願力故能奮迅示現種種神通於法雲地中依法雨授位證如來內究竟法身智慧地依十無盡善根願轉為教化眾生種種應化自身示現種種光明以得自身修行證智三昧樂故唐譯云何取相分別執着建立智謂於堅濕煖動諸大種性取相執着虗妄分別以宗因喻而妄建立是名取相分別執着建立智是名二種覺智相菩薩摩訶薩知此智相即能通達人法無我以無相智於解行地善巧觀察入於初地得百三昧以勝三昧力見百佛百菩薩知前後際各百劫事光明照曜百佛世界善能了知上上地相以勝願力變現自在至法雲地而受灌頂入於佛地十無盡願成就眾生種種應現無有休息而恒安住自覺境界三昧勝樂復次大慧菩薩摩訶薩當善四大造色云何菩薩善四大造色大慧菩薩摩訶薩作是覺彼真諦者四大不生於彼四大不生作如是觀察觀察已覺名相妄想分齊自心現分齊外性非性是名心現妄想分齊謂三界觀彼四大造色性離四句通淨離我我所知實相自相分段住無生自相成魏譯復次大慧菩薩摩訶薩應善知四大及四塵相大慧云何菩薩善知四大及四塵相大慧菩薩摩訶薩應如是脩行所言實者謂無四大處觀察四大本來不生如是觀已復作是念言觀察者唯自心見虗妄覺知以見外塵無有實物唯是名字分別心見所謂三界離於四大及四塵相見如是已離四種見見清淨法離我我所住於自相如實法中大慧住自相如實法中者謂住建立諸法無生自相法中唐譯復次大慧菩薩摩訶薩當善了知大種造色云何了知大慧菩薩摩訶薩應如是觀彼諸大種真實不生以諸三界但是分別唯心所見無有外物如是觀時大種所造悉皆性離超過四句無我我所住如實處成無生相大慧彼四大種云何生造色謂津潤妄想大種生內外水界堪能妄想大種生內外火界飄動妄想大種生內外風界斷截色妄想大種生內外地界色及虗空俱計著邪諦五陰集聚四大造色生魏譯大慧於四大中云何有四塵大慧謂妄想分別桑輭濕潤生內外水大大慧妄想分別煖增長力生內外火大大慧妄想分別輕轉動相生內外風大大慧妄想分別所有堅相生內外地大大慧妄想分別內外共虗空生內外相以執着虗妄內外邪見五陰聚落四大及四塵生故唐譯大慧彼諸大種云何造色大慧謂虗妄分別津潤大種成內外水界炎盛大種成內外火界飄動大種成內外風界色分段大種成內外地界離於虗空由執着邪諦五蘊聚集大種造色生大慧識者因樂種種迹境界故餘趣相續大慧地等四大及造色等有四大緣非彼四大緣所以者何謂性形相處所作方便無性大種不生大慧性形相處所作方便和合生非無形是故四大造色相外道妄想非我魏譯佛告大慧識能執着種種境界樂求異道取彼境界故大慧四大有因謂色香味觸大慧四大無因何以故謂地自体形相長短不生四大相故大慧依形相大小上下容貌而生諸法不離形相大小長短而有法故是故大慧外道虗妄分別四大及四塵非我法中如此分別唐譯大慧識者以執着種種言說境界為因起故於餘趣中相續受生大慧地等造色有大種因非四大種為大種因何以故謂若有法有形相者則是所作非無形者大慧此大種造色相外道分別非是我說復次大慧當說諸陰自性相云何諸陰自性相謂五陰云何五謂色受想行識彼四陰非色謂受想行識大慧色者四大及造色各各異相大慧非無色有四數如虗空譬如虗空過數相離於數而妄想言一虗空大慧如是陰過數相離於數離性非性離四句數相者愚夫言說非聖賢也魏譯復次大慧我為汝說五陰體相大慧何者五陰相謂色受想行識大慧色依四大生四大彼此不同相大慧無色相法同如虗空云何得成四種數相大慧譬如虗空離於數相而虗妄分別此是虗空大慧陰之數相離於諸相離有無相離於四相愚痴凡夫說諸數相非謂聖人唐譯復次大慧我今當說五蘊体相謂色受想行識大慧色謂四大及所造色此各異相受等非色大慧非色諸蘊猶如虗空無有四數大慧譬如虗空超過數相然分別言此是虗空非色諸蘊亦復如是離諸數相離有無等四種句故數相者愚夫所說非諸聖者大慧聖者如幻種種色像離異不異施設又如夢影士夫身離異不異故大慧聖智趣同陰妄想現是名諸陰自性相汝當除滅滅已說寂靜法斷一切佛剎諸外道見大慧說寂靜時法無我見淨及入不動地入不動地已無量三昧自在及得意生身得如幻三昧通達究竟力明自在救攝饒益一切眾生猶如大地載育眾生菩薩摩訶薩普濟眾生亦復如是魏譯大慧我說諸相如幻種種形相離一二相依假名說如夢鏡像不離所依大慧如聖人智修行分別見五陰虗妄大慧是名五陰無五陰体相大慧汝今應離如是虗妄分別之相離如是已為諸菩薩說離諸法相寂靜之法為遮外道諸見之相大慧說寂靜法得證清淨無我之相入遠行地入遠行地已得無量三昧自在如意生身故以得諸法如幻三昧故以得自在神通力脩行進趣故隨一切眾生自在用如大地故大慧譬如大地一切眾生隨意而用大慧菩薩摩訶薩隨眾生用亦復如是唐譯諸聖但說如幻所作唯假施設離異不異如夢如像無別所有不了聖智所行境故見有諸蘊分別現前是名諸蘊自性相大慧如是分別汝應捨離捨離此已說寂靜法斷一切剎諸外道見淨法無我入遠行地成就無量自在三昧獲意生身如幻三昧力通自在皆悉具足猶如大地普益羣生復次大慧諸外道有四種涅槃云何為四謂性自性非性涅槃種種相性非性涅槃自相自性非性覺涅槃諸陰自共相相續流注斷涅槃是名諸外道四種涅槃非我所說法大慧我所說者妄想識滅名為涅槃魏譯復次大慧外道說有四種涅槃何等為四一者自体涅槃二者種種相有無涅槃三者自覺体有無涅槃四者諸陰自相同相斷相續体涅槃大慧是名外道四種涅槃非我所說大慧我所說者見虗妄境界分別識滅名為涅槃唐譯復次大慧涅槃有四種何等為四謂諸法自性無性涅槃種種相性無性涅槃覺自相性無性涅槃斷諸蘊自共相流注涅槃大慧此四涅槃是外道義非我所說大慧我所說者分別爾炎識滅名為涅槃大慧白佛言世尊不建立八識耶佛言建立大慧白佛言若建立者云何離意識非七識佛告大慧彼因及彼攀緣故七識不生意識者境界分段計着生習氣長養藏識意俱我我所計着思惟因緣生不壞身相藏識因攀緣自心現境界計着心聚生展轉相因譬如海浪自心現境界風吹若生若滅亦如是是故意識滅七識亦滅魏譯大慧白佛言世尊世尊可不說八種識耶佛告大慧我說八種識大慧言若世尊說八種識者何故但言意識轉滅不言七識轉滅佛告大慧以依彼念觀有故轉識滅七識亦滅復次大慧意識執着取境界生生已種種熏習增長阿黎耶識共意識故離我我所相着虗妄空而生分別大慧彼二種識無差別相以依阿黎耶識因觀自心見境妄想執着生種種心猶如束竹迭共為因如大海波以自心見境界風吹而有生滅是故大慧意識轉滅七種識轉滅唐譯大慧言世尊豈不建立八種識耶佛言建立大慧言若建立者云何但說意識滅非七識滅佛言大慧以彼為因及所緣故七識得生大慧意識分別境界起執着時生諸習氣長養藏識由是意俱我我所執思量隨轉無別体相藏識為因為所緣故執着自心所現境界心聚生起展轉為因大慧譬如海浪自心所現境界風吹而有起滅是故意識滅時七識亦滅爾時世尊欲重宣此義而說偈言我不涅槃性所作及與相妄想爾𦦨識此滅我涅槃彼因彼攀緣意趣等成身與因者是心為識之所依如水大流盡波浪則不起如是意識滅種種識不生魏譯爾時世尊重說偈言我不取涅槃亦不捨作相轉滅虗妄心故言得涅槃依彼因及念意識諸境界識與心作因為識之所依如水流枯竭波浪則不起如是意識滅種種識不生唐譯爾時世尊重說頌言我不以自性及以於作相分別境識滅如是說涅槃意識為心因心為意境界因及所緣故諸識依止生如大瀑流盡波浪則無起如是意識滅種種識不生復次大慧今當說妄想自性分別通相若妄想自性分別通相善分別汝及餘菩薩摩訶薩離妄想到自覺聖外道通趣善見覺攝所攝妄想斷緣起種種相妄想自性行不復妄想魏譯復次大慧我為汝說虗妄分別法体差別之相汝及諸菩薩摩訶薩善分別知虗妄法体差別之相離分別所分別法善知自身內脩行法遠離外道能取可取境界遠離種種虗妄分別因緣法体相遠離已不復分別虗妄之相唐譯復次大慧我今當說妄計自性差別相令汝及諸菩薩摩訶薩善知此義超諸妄想證聖智境知外道法遠離能取所取分別於依他起種種相中不更取着妄所計相大慧云何妄想自性分別通相謂言說妄想所說事妄想相妄想利妄想自性妄想因妄想見妄想成妄想生妄想不生妄想相續妄想縛不縛妄想是名妄想自性分別通相魏譯大慧何者虗妄分別法體差別之相大慧虗妄分別自体差別相有十二種何等為十二一者言語分別二者可知分別三者相分別四者義分別五者自体分別六者因分別七者見分別八者建立分別九者生分別十者不生分別十一者和合分別十二者縛不縛分別大慧是名分別自体相差別法相唐譯大慧云何妄計自性差別相所謂言說分別所說分別相分別財分別自性分別因分別見分別理分別生分別不生分別相屬分別縛解分別大慧此是妄計自性差別相大慧云何言說妄想謂種種妙音歌詠之聲美樂計着是名言說妄想魏譯大慧言語分別者謂樂着種種言語美妙音聲大慧是名言語分別唐譯云何言說分別謂執着種種美妙音詞是名言說分別大慧云何所說事妄想謂有所說事自性聖智所知依彼而生言說妄想是名所說事妄想魏譯大慧可知分別者謂作是思惟應有前法實事之相聖人脩行知依彼法生於言語如是分別大慧是名可知分別唐譯云何所說分別謂執有所說事是聖智所說境依此起說是名所說分別大慧云何相妄想謂即彼所說事如鹿渴想種種計着而計着謂堅濕煖動相一切性妄想是名相妄想魏譯大慧相分別者謂即彼可知境界中熱濕動堅種種相執以為實如空陽𦦨諸禽獸見生於水想大慧是名相分別唐譯云何相分別謂即於彼所說事中如渴獸想分別執着堅濕煖動等一切諸相是名相分別大慧云何利妄想謂樂種種金銀珍寶是名利妄想魏譯大慧義分別者謂樂金銀等種種實境界大慧是名義分別唐譯云何財分別謂取着種種金銀等寶而起言說是名財分別大慧云何自性妄想謂自性持此如是不異惡見妄想是名自性妄想魏譯大慧自体分別者謂專念有法自體形相此法如是如是不異非正見見分別大慧是名自体分別唐譯云何自性分別謂以惡見如是分別此自性決定非餘是名自性分別大慧云何因妄想謂若因若緣有無分別因相生是名因妄想魏譯因分別者謂何等何等因何等何等緣有無了別因相生了別想大慧是名因分別唐譯云何因分別謂於因緣分別有無以此因相而能生故是名因分別大慧云何見妄想謂有無一異俱不俱惡見外道妄想計着妄想是名見妄想魏譯大慧見分別者謂有無一異俱不俱邪見外道執着分別大慧是名見分別唐譯云何見分別謂諸外道惡見執着有無一異俱不俱等是名見分別大慧云何成妄想謂我我所想成決定論是名成妄想魏譯大慧建立分別者謂取我我所相說虗妄法大慧是名建立分別唐譯云何理分別謂有執着我我所相而起言說是名理分別大慧云何生妄想謂緣有無性生計着是名生妄想魏譯大慧生分別者謂依眾緣有無法中生執着心大慧是名生分別唐譯云何生分別謂計諸法若有若無從緣而生是名生分別大慧云何不生妄想謂一切性本無生無種因緣生無因身是名不生妄想魏譯大慧不生分別者謂一切法本來不生以本無故依因緣有而無因果大慧是名不生分別唐譯云何不生分別謂計着一切法本來不生未有諸緣而先有體不從因起是名不生分別大慧云何相續妄想謂彼俱相續如金縷是名相續妄想魏譯大慧和合分別者謂何等何等法和合如金縷共何等何等法和合如金縷和合大慧是名和合分別唐譯云何相屬分別謂此與彼遞相繫屬如針與線是名相續分別大慧云何縛不縛妄想謂縛不縛因緣計著如士夫方便若縛若解是名縛不縛妄想魏譯大慧縛不縛分別者謂縛因執着如所縛大慧如人方便結繩作結結已還解大慧是名縛不縛分別唐譯云何縛解分別謂執因能縛而有所縛如人以繩方便力故縛已復解是名縛解分別於此妄想自性分別通相一切愚夫計着有無魏譯大慧是名虗妄分別法體差別之相以此虗妄分別法體差別之相一切凡夫執着有無故執着法相種種因緣唐譯大慧此是妄計性差別相一切凡愚於中執着若有若無大慧計着緣起而計着者種種妄想計着自性如幻示現種種之身凡夫妄想見種種異幻大慧幻與種種非異非不異若異者幻非種種因若不異者幻與種種無差別而見差別是故非異非不異是故大慧汝及餘菩薩摩訶薩如幻緣妄想自性異不異有無莫計着魏譯是故大慧分別法體差別之相見種種法執着為實如依於幻見種種事凡夫分別知異於幻有如是法大慧我於種種法中不異幻說亦非不異何以故若幻異於種種法者不應因幻而生種種若幻即是種種法者不應異見此是幻此是種種而見差別是故我說不異非不異是故大慧汝及諸菩薩摩訶薩莫分別幻有實無實唐譯大慧於緣起中執着種種妄計自性如依於幻見種種物凡愚分別見異於幻大慧幻與種種非異非不異若異者應幻非種種因若一者幻與種種應無差別然見差別是故非異非不異大慧汝及諸菩薩摩訶薩於幻有無不應生着爾時世尊欲重宣此義而說偈言心縛於境界覺想智隨轉無所有及勝平等智慧生妄想自性有於緣起則無妄想或攝受緣起非妄想種種支分生如幻則不成彼相有種種妄想則不成魏譯爾時世尊重說偈言心依境界縛知覺隨境生於寂靜勝處生平等智慧妄想分別有於緣法則無取虗妄迷亂不知他力生種種緣生法即是幻不實彼有種種想妄分別不成唐譯爾時世尊重說頌言心為境所縛覺想智隨轉無有最勝處平等智慧生在妄計是有於緣起則無妄計迷惑取緣起離分別種種支分生如幻不成就雖現種種相妄分別則無彼相則是過皆從心縛生妄想無所知於緣起妄想此諸妄想性即是彼緣起妄想有種種於緣起妄想魏譯彼想則是過皆從心縛生愚痴人無智分別因緣法此諸妄想体即是緣起法妄想有種種眾緣中分別唐譯彼相則是過皆從心縛生妄計者不了分別緣起法此諸妄計性皆即是緣起妄計有種種緣起中分別世諦第一義第三無因生妄想說世諦斷則聖境界魏譯世諦第一義第三無因生妄想說世諦斷則聖境界唐譯世俗第一義第三無因生妄計是世俗斷則聖境界譬如脩行事於一種種現於彼無種種妄想相如是譬如種種翳妄想眾色現翳無色非色緣起不覺然譬如鍊真金遠離諸垢穢虗空無雲翳妄想淨亦然魏譯譬如脩行者一事見種種彼法無種種分別想如是如目種種翳妄想見眾色翳無色非色無智取法爾如真金離垢如水離泥濁如虗空離雲真淨法亦爾唐譯如脩觀行者於一種種現於彼無種種妄計相如是如目種種翳妄想見眾色彼無色非色不了緣起然如金離塵垢如水離泥濁如虗空無雲妄想淨如是無有妄想性及有彼緣起建立及誹謗悉由妄想壞妄想若無性而有緣起性無性而有性有性無性生依因於妄想而得彼緣起相名常相隨而生諸妄想究竟不成就則度諸妄想然後智清淨是名第一義魏譯無有妄想法因緣法亦無取有及謗無分別觀者見妄想若無實因緣法若實離因應生法實法生實法因虗妄名法見諸因緣生相名不相離如是生虗妄虗妄本無實則度諸妄想然後知清淨是名第一義唐譯無有妄計性而有於緣起建立及誹謗斯由分別境若無妄計性而有緣起者無法而有法有法從無生依因於妄計而得有緣起相名常相隨而生於妄計以緣起依妄究竟不成就是時現清淨名為第一義妄想有十二緣起有六種自覺知爾𦦨彼有無差別五法為真實自性有三種脩行分別此不越於如如魏譯妄想有十種緣法有六種內身證境界彼無有差別五法為真實及三種亦爾脩行者行此不離於真如唐譯妄計有十二緣起有六種自證真如境彼無有差別五法為真實三自性亦爾脩行者觀此不越於真如眾相及緣起彼名起妄想彼諸妄想相從彼緣起生覺慧善觀察無緣無妄想成已無有性云何妄想覺彼妄想自性建立二自性妄想種種現清淨聖境界妄想如畫色緣起計妄想若異妄想者則依外道論妄想說所想因見和合生離二妄想者如是則為成魏譯眾想及因緣名分別彼法彼諸妄想相從彼因緣生真實智善觀無緣無妄想第一義無物云何智分別若真實有法遠離於有無若離於有無云何有二法分別二法體二種法體有虗妄見種種清淨聖境界見妄想種種因緣中分別若異分別者則墮於外道妄想說妄想因見和合生離二種妄想即是真實法唐譯依於緣起相妄計種種名彼諸妄計相皆因緣起有智慧善觀察無緣無妄計真實中無物云何起分別圓成若是有此則離有無既已離有無云何有二性妄計有二性二性是安立分別見種種清淨聖所行妄計種種相緣起中分別若異此分別則墮外道論以諸妄見故妄計於妄計離此二計者則為真實法大慧菩薩摩訶薩復白佛言世尊惟願為說自覺聖智相及一乘若自覺聖智相及一乘我及餘菩薩善自覺聖智相及一乘不由於他通達佛法魏譯爾時大慧菩薩摩訶薩復白佛言世尊唯願為說自身內證聖智脩行相及一乘法不由於他遊行一切諸佛國土通達佛法唐譯大慧菩薩摩訶薩復白佛言世尊唯願為說自證聖智行相及一乘行相我及諸菩薩摩訶薩得此善巧於佛法中不由他悟佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧前聖所知性相傳授妄想無性菩薩摩訶薩獨一靜處自覺觀察不由於他離見妄想上上升進入如來地是名自覺聖智相魏譯佛告聖者大慧菩薩言善哉善哉善哉大慧諦聽諦聽當為汝說大慧言善哉世尊唯然受教佛告大慧菩薩摩訶薩離阿含名字法諸論師所說分別法相在寂靜處獨坐思惟自內智慧觀察諸法不隨他教離種種見虗妄之相當勤脩行入如來地上上證智大慧是名自身內證聖智脩行之相唐譯佛言諦聽當為汝說大慧言唯佛言大慧菩薩摩訶薩依諸聖教無有分別獨處間靜觀察自覺不由他悟離分別見上上升進入如來地如是脩行名自證聖智行相大慧云何一乘相謂得一乘道覺我說一乘云何得一乘道覺謂攝所攝妄想如實處不生妄想是名一乘覺大慧一乘覺者非餘外道聲聞緣覺梵天王等之所能得唯除如來以是故說名一乘魏譯大慧更有三界中脩一乘相大慧何者一乘相大慧如實覺知一乘道故我說名一乘大慧何者如實覺知一乘道相謂不分別可取能取境界不生如是諸法相住以不分別一切諸法故大慧是名如實覺知一乘道相大慧如是覺知一乘道相一切外道聲聞辟支佛梵天等未曾得知唯除於我大慧是故我說名一乘道相唐譯云何名一乘行相謂得證知一乘道故云何名為知一乘道謂離能取所取分別如實而住大慧此一乘道唯除如來非外道二乘梵天王等之所能得大慧白佛言世尊何故說三乘而不說一乘佛告大慧不自般涅槃法故不說一切聲聞緣覺一乘以一切聲聞緣覺如來調伏授寂靜方便而得解脫非自己力是故不說一乘復次大慧煩惱障業習氣不斷故不說一切聲聞緣覺一乘不覺法無我不離分段死故說三乘魏譯大慧白佛言世尊世尊何因說於三乘不說一乘佛告大慧聲聞緣覺不能自知證於涅槃是故我說唯一乘道大慧以一切聲聞辟支佛隨受佛教厭離世間自不能得解脫是故我說唯一乘道大慧聲聞辟支佛未證法無我未得不可思議變易生是故我為諸聲聞故說一乘道唐譯大慧白佛言世尊何故說有三乘不說一乘佛言大慧聲聞緣覺無自般涅槃法故我說一乘以彼但依如來所說調伏遠離如是脩行而得解脫非自所得又彼未能除滅智障及業習氣未覺法無我未名不思議變易死是故我說以為三乘大慧彼諸一切起煩惱過習氣斷及覺法無我彼一切起煩惱過習氣斷三昧樂味着非性無漏界覺覺已復入出世間上上無漏界滿足眾具當得如來不思議自在法身魏譯大慧聲聞辟支佛若離一切諸過熏習得證法無我爾時離於諸過三昧無漏醉法覺已脩行出世間無漏界中一切功德脩行已得不可思議自在法身唐譯若彼能除一切過習覺法無我是時乃離三昧所醉於無漏界而得覺悟既覺悟已於出世上上無漏界中脩諸功德普使滿足獲不思議自在法身爾時世尊欲重宣此義而說偈言諸天及梵乘聲聞緣覺乘諸佛如來乘我說此諸乘乃至有心轉諸乘非究竟若彼心滅盡無乘及乘者無有乘建立我說為一乘魏譯爾時世尊重說偈言天乘及梵乘聲聞緣覺乘諸佛如來乘我說此諸乘以心有生滅諸乘非究竟若彼心滅盡無乘及乘者無有乘差別我說為一乘唐譯爾時世尊重說頌言天乘及梵乘聲聞緣覺乘諸佛如來乘諸乘我所說乃至有心起諸乘未究竟彼心轉滅已無乘及乘者無有乘建立我說為一乘引導眾生故分別說諸乘解脫有三種及與法無我煩惱智慧等解脫則遠離譬如海浮木常隨波浪轉聲聞愚亦然相風所飄蕩彼起煩惱滅餘習煩惱愚魏譯引導眾生故分別說諸乘解脫有三種及二無我法不離二種障遠離真解脫譬如海浮木當隨波浪轉諸聲聞亦然相風所漂蕩離諸隨煩惱熏習煩惱縛唐譯為攝愚夫故說諸乘差別解脫有三種及以法無我謂離諸煩惱平等智解脫譬如海中木常隨波浪轉聲聞心亦然相風所漂激雖滅起煩惱猶被習氣縛味着三昧樂安住無漏界無有究竟趣亦復不退還得諸三昧身乃至劫不覺譬如昏醉人酒消然後覺彼覺法亦然得佛無上身魏譯味着三昧樂安住無漏界無有究竟趣亦復不退還得諸三昧身無量劫不覺譬如惛醉人酒消然後寤得佛無上體是我真法身唐譯三昧酒所醉住於無漏界彼非究竟趣亦復不退轉以得三昧身乃至劫不覺譬如惛醉人酒消然後悟聲聞亦如是覺後當成佛
