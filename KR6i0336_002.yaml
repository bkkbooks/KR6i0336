說魏譯大慧愚癡凡夫亦復如是惡見所害邪見迷意無智妄稱一切智說唐譯大慧愚癡凡夫惡見所噬邪見迷醉無智妄稱一切智說大慧若復諸餘沙門婆羅門見離自性浮雲火輪乾闥婆城無生幻𦦨水月及夢內外心現妄想無始虗僞不離自心妄想因緣滅盡離妄想說所說觀所觀受用建立身之藏識於識境界攝受及攝受者不相應無所有境界離生住滅自心起隨入分別魏譯大慧若復有沙門婆羅門見諸法離自性故如雲火輪乾闥婆城不生不滅故如幻陽𦦨水中月故如夢內外心依無始世來虗妄分別戲論而現故離自心虗妄分別可見因緣故離滅盡妄想說所說法故離身資生持用法故離阿梨耶識取境界相應故入寂靜境界故離生住滅法故如是思惟觀察自心以為生故唐譯大慧復有沙門婆羅門觀一切法皆無自性如空中雲如旋火輪如乾闥婆城如幻如𦦨如水中月如夢所見不離自心由無始來虗妄見故取以為外作是觀已斷分別緣亦離妄心所取名義知身及物并所住處一切皆是藏識境界無能所取及生住滅如是思惟恆住不捨大慧彼菩薩不久當得生死涅槃平等大悲巧方便無開發方便大慧彼於一切衆生界皆悉如幻不勤因緣遠離內外境界心外無所見次第隨入無相處次第隨入從地至地三昧境界魏譯大慧如是菩薩不久當得世間涅槃平等之心大慧汝巧方便開發方便觀察一切諸衆生界皆悉如幻如鏡中像故無因緣起遠離內外境界故自心見外境界故次第隨入無相處故次第隨入從地至地三昧境界故唐譯大慧此菩薩摩訶薩不久當得生死涅槃二種平等大悲方便無功用行觀諸衆生如幻如影從緣無起知一切境界離心無得行無相道漸升諸地住三昧境解三界如幻分別觀察當得如幻三昧度自心現無所有得住般若波羅蜜捨離彼生所作方便金剛喻三摩提隨入如來身隨入如如化神通自在慈悲方便具足莊嚴等入一切佛剎外道入處離心意意識是菩薩漸次轉身得如來身魏譯信三界自心幻故大慧如是修行者當得如幻三昧故入自心寂靜境界故到彼岸境界故離作者生法故得金剛三昧故入如來身故入如來化身故入諸力通自在大慈大悲莊嚴身故入一切佛國土故入一切衆生所樂故離心意意識境界故轉身得妙身故大慧諸菩薩摩訶薩如是修行者必得如來無上妙身故唐譯了達三界皆唯自心得如幻定絶衆影像成就智慧證無生法入金剛喻三昧當得佛身恆住如如起諸變化力通自在大慧方便以為嚴飾遊衆佛國離諸外道及心意識轉依次第成如來身大慧是故欲得如來隨入身者當遠離陰界入心因緣所作方便生住滅妄想虗僞唯心直進觀察無始虗僞過妄想習氣因三有思惟無所有佛地無生到自覺聖趣自心自在到無開發行如隨衆色摩尼隨入衆生微細之心而以化身隨心量度諸地漸次相續建立是故大慧自悉檀善應當修學魏譯大慧菩薩欲證如來身者當遠離陰界入心因緣和合法故遠離生住滅虗妄分別戲論故諸法惟心當如是知見三界因無始世來虗妄分別戲論而有故觀如來地寂靜不生故進趣內身聖行故大慧汝當不久得心自在無功用行究竟故如衆色隨摩尼寶化身入諸衆生微細心故以入隨心地故令諸衆生次第入地故是故大慧諸菩薩摩訶薩應當善知諸菩薩修自行內法故唐譯大慧菩薩摩訶薩欲得佛身應當遠離蘊界處心因緣所作生住滅法戲論分別但住心量觀察三有無始時來妄習所起思惟佛地無相無生自證聖法得心自在無功用行如如意寶隨宜現身令達唯心漸入諸地是故大慧菩薩摩訶薩於自悉檀應善修學爾時大慧菩薩復白佛言世尊所說心意意識五法自性相一切諸佛菩薩所行自心見等所緣境界不和合顯示一切說成真實相一切佛語心為楞伽國摩羅耶山海中住處諸大菩薩說如來所歎海浪藏識境界法身魏譯爾時聖者大慧菩薩摩訶薩復白佛言世尊惟願為諸菩薩摩訶薩說心意意識五法自體相等法門諸佛菩薩修行之處遠離自心邪見境界和合故能破一切言語譬喻體相故一切諸佛所說法心為楞伽城摩羅耶山大海中諸菩薩說觀察阿黎耶識大海波境界說法身如來所說法故唐譯爾時大慧菩薩摩訶薩復白佛言世尊唯願為我說心意意識五法自性相衆妙法門此是一切諸佛菩薩入自心境離所行相稱真實義諸佛教心唯願如來為此山中諸菩薩衆隨順過去諸佛演說藏識海浪法身境界爾時世尊告大慧菩薩言四因緣故眼識轉何等為四謂自心現攝受不覺無始虗僞過色習氣計著識性自性欲見種種色相大慧是名四種因緣水流處藏識轉識浪生魏譯爾時佛告聖者大慧菩薩摩訶薩言大慧有四因緣眼識生何等為四一者不覺自內身取境界故二者無始世來虗妄分別色境界熏習執著戲論故三者識自性體如是故四者樂見種種色相故大慧是名四種因緣於阿黎耶識海起大湧波能生轉識唐譯爾時世尊告大慧菩薩摩訶薩言有四種因緣眼識轉何等為四所謂不覺自心現而執取故無始時來取著於色虗妄習氣故識本性如是故樂見種種諸色相故大慧以此四緣阿賴耶識如瀑流水生轉識浪大慧如眼識一切諸根微塵毛孔俱生隨次境界生亦復如是譬如明鏡現衆色像猶如猛風吹大海水魏譯大慧如眼識起識一切諸根毛孔一時轉識生如鏡中像多少一時復有隨因緣次第生大慧猶如猛風吹境心海唐譯如眼識餘亦如是於一切諸根微塵毛孔眼等轉識或頓生譬如明鏡現衆色像或漸生猶如猛風吹大海水外境界風飄蕩心海識浪不斷因所作相異不異合業生相深入計著不能了知色等自性故五識身轉大慧即彼五識身俱因差別分段相知當知是意識因魏譯而識波生不斷因事相故遞共不相離故業體相使縛故不覺色體故而五識身轉故大慧不離彼五識因了別識相名為意識共彼因常轉故唐譯心海亦是境界風吹起諸識浪相續不絶大慧因所作相非一非異業與生相相繫深縛不能了知色等自性五識身轉大慧與五識俱或因了別差別境相有意識生彼身轉彼不作是念我展轉相因自心現妄想計著轉而彼各各壞相俱轉分別境界分段差別謂彼轉魏譯大慧五識及心識不作是念我遞共為因自心見虗妄分別取諸境界而彼各各不異相俱現分別境界如是彼識微細生滅唐譯然彼諸識不作是念我等同時展轉為因而於自心所現境界分別執著俱時而起無差別相各了自境如修行者入禪三昧微細習氣轉而不覺知而作是念識滅然後入禪正受實不識滅而入正受以習氣種子不滅故不滅以境界轉攝受不具故滅魏譯以入修行三昧者不覺不知微細熏習而修行者作是念我滅諸識入三昧而修行者不滅諸識入三昧大慧熏習種子心不滅取外境界諸識滅唐譯大慧諸修行者入於三昧以習力微起而不覺知但作是念我滅諸識入於三昧實不滅識而入三昧以彼不滅習氣種故但不取諸境名為識滅大慧如是微細藏識究竟邊際除諸如來及住地菩薩諸聲聞緣覺外道修行所得三昧智慧之力一切不能測量決了魏譯大慧如是微細阿黎耶識行惟除佛如來入地諸菩薩摩訶薩諸餘聲聞辟支佛外道修行者不能知故入三昧智力亦不能覺唐譯大慧如是藏識行相微細唯除諸佛及住地菩薩其餘一切二乘外道定慧之力皆不能知餘地相智慧巧便分別決斷句義最勝無邊善根成熟離自心現妄想虗僞宴坐山林下中上修能見自心妄想流注無量剎土諸佛灌頂得自在力神通三昧諸善知識佛子眷屬彼心意意識自心所現自性境界虗妄之想生死有海業愛無知如是等因悉已超度是故大慧諸修行者應當親近最勝知識魏譯以其不知諸地相故以不能知智慧方便差別善決定故以不能覺諸佛如來集諸善根故以不能知自心現境界分別戲論故以不能入種種稠林阿黎耶識窟故大慧依下中上如實修行者乃能分別見自心中虗妄見故能於無量國土為諸如來授位故得無量自在力神通三昧故依善知識佛子眷屬而能得見心意意識自心自體境界故分別生死大海以業愛無知以為因有故大慧是故如實修行者應推覔親近善知識故唐譯唯有修行如實行者以智慧力了諸地相善達句義無邊佛所廣集善根不妄分別自心所見能知之耳大慧諸修行人宴處山林上中下修能見自心分別流注得諸三昧自在力通諸佛灌頂菩薩圍繞知心意意識所行境界超愛業無明生死大海是故汝等應當親近諸佛菩薩如實修行大善知識爾時世尊欲重宣此義而說偈言譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絶時藏識海常住境界風所動種種諸識浪騰躍而轉生青赤種種色珂乳及石蜜淡味衆花果日月與光明非異非不異海水起波浪七識亦如是心俱和合生魏譯爾時世尊而說偈言譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絶時黎耶識亦爾境界風吹動種種諸識浪騰躍而轉生青赤鹽珂乳味及於石蜜衆華與果實如日月光明非異非不異海水起波浪七識亦如是心俱和合生唐譯爾時世尊重說偈言譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絶時藏識海常住境界風所動種種諸識浪騰躍而轉生青赤等諸色鹽貝乳石蜜花果日月光非異非不異意等七種識應知亦如是如海洪波浪心俱和合生譬如海水變種種波浪轉七識亦如是心俱和合生謂彼藏識處種種諸識轉謂以彼意識思惟諸相義不壞相有八無相亦無相譬如海波浪是則無差別諸識心如是異亦不可得魏譯譬如海水動種種波浪轉黎耶識亦爾種種諸識生心意及意識為諸相故說諸識無別相非見所見相譬如海水波是則無差別諸識心如是異亦不可得唐譯譬如海水動種種波浪轉藏識亦如是種種諸識生心意及意識為識相故說八識無別相無能相所相譬如海波浪是則無差別諸識心如是異亦不可得心名採集業意名廣採集諸識識所識現等境說五魏譯心能集諸業意能觀集境識能了所識五識現分別唐譯心能積集業意能廣積集了別故名識對現境說五爾時大慧菩薩以偈問曰青赤諸色像衆生發諸識如浪種種法云何惟願說魏譯爾時聖者大慧菩薩摩訶薩以偈問佛青赤諸色像自識如是見水波相對法何故如是說唐譯爾時大慧菩薩摩訶薩以頌問曰青赤諸色像衆生識顯現如浪種種法云何願佛說爾時世尊以偈答曰青赤諸雜色波浪悉無有採集業說心開悟諸凡夫魏譯爾時世尊以偈答曰青赤諸雜色波中悉皆無說轉識心中為凡夫相說唐譯爾時世尊以頌答曰青赤諸色像浪中不可得言心起衆相開悟諸凡夫彼業悉無有自心所攝離所攝無所攝與彼波浪同魏譯彼業悉皆無自心離可取可取及能取與彼波浪同唐譯而彼本無起自心所取離能取及所取與彼波浪同受用建立身是衆生現識於彼現諸業譬如水波浪魏譯身資生住持衆生惟識見是故現轉識水波浪相似唐譯身資財安住衆生識所現是故見此起與浪無差別爾時大慧菩薩復說偈言大海波浪性鼓躍可分別藏與業如是何故不覺知魏譯大海波浪動鼓躍可分別阿黎耶識轉何故不覺知唐譯爾時大慧復說頌言大海波浪性鼓躍可分別藏識如是起何故不覺知爾時世尊以偈答曰凡夫無智慧藏識如巨海業相猶波浪依彼譬類通魏譯凡夫無智慧黎耶識如海波浪轉對法是故譬喻說唐譯爾時世尊以頌答曰阿賴耶如海轉識同波浪為凡夫無智譬喻廣開演爾時大慧菩薩復說偈言日出光等照下中上衆生如來照世間為愚說真實已分部諸法何故不說實魏譯爾時聖者大慧菩薩摩訶薩復說偈言日出光等照下中上衆生如來出世間為凡夫說實佛得究竟法何故不說實唐譯爾時大慧復說頌言譬如日光出上下等皆照世間燈亦然應為愚說實已能開示法何不顯真實爾時世尊以偈答曰若說真實者彼心無真實譬如海波浪鏡中像及夢一切俱時現心境界亦然魏譯爾時世尊以偈答曰若說真實者彼心無真實譬如海波浪鏡中像及夢俱時而得現心境界亦然唐譯爾時世尊以頌答曰若說真實者彼心無真實譬如海波浪鏡中像及夢俱時而顯現心境界亦然境界不具故次第業轉生識者識所識意者意謂然五則以顯現無有定次第魏譯境界不具故是故次第現識者識所識意者然不然五則以現見定中無如是唐譯境界不具故次第而轉生識以能了知意復意謂然五識了現境無有定次第譬如工畫師及與畫弟子布彩圖衆形我說亦如是彩色本無文非筆亦非素為悅衆生故綺錯繪衆像魏譯譬如巧畫師及畫師弟子布彩圖衆像我說法亦爾彩色本無文非筆亦非器為衆生說故綺錯畫衆像唐譯譬如工畫師及畫師弟子布彩圖衆像我說亦如是彩色中無文非筆亦非素為悅衆生故綺煥成衆像言說別施行真實離名字分別應初業修行示真實真實自悟處覺想所覺離此為佛子說魏譯言說離真實真實離名字我得真實處如實內身知離覺所覺相解如實為說此為佛子說唐譯言說則變異真實離文字我所住實法為諸修行說真實自證處能所分別離此為佛子說愚者廣分別種種皆如幻雖見無真實如是種種說隨事別施設所說非所應於彼為非說魏譯愚者異分別種種皆如幻惟見非真實如是種種說隨事實不實為此人故說於彼為非說唐譯愚夫別開演種種皆如幻所見不可得如是種種說隨事而變異所說非所應於彼為非說彼彼諸病人良醫隨處方如來為衆生隨心應量說妄想非境界聲聞亦非分哀憫者所說自覺之境界魏譯彼彼諸病人良醫隨處藥如來為衆生惟心應器說妄想非境界聲聞亦非分諸如來世尊自覺境界說唐譯譬如衆病人良醫隨授藥如來為衆生隨心應量說外道非境界聲聞亦復然世間依怙者證智所行處復次大慧若菩薩摩訶薩欲知自心現量攝受及攝受者妄想境界當離羣聚習俗睡眠初中後夜常自覺悟修行方便當離惡見經論言說及諸聲聞緣覺乘相當通達自心現妄想之相魏譯復次大慧若菩薩摩訶薩欲知自心離虗妄分別能取可取境界相者當離憒閙離睡眠蓋初夜後夜常自覺悟修行方便離諸外道一切戲論離聲聞緣覺乘相當通達自心現見虗妄分別之相唐譯復次大慧菩薩摩訶薩若欲了知能取所取分別境界皆是自心之所現者當離憒閙昏滯睡眠初中後夜勤加修習遠離曾聞外道邪論及二乘法通達自心分別之相復次大慧菩薩摩訶薩建立智慧相住已於上聖智三相當勤修學何等為聖智三相當勤修學所謂無所有相一切諸佛自願處相自覺聖智究竟之相修行得此已能捨跛驢心智慧相得最勝子第八之地則於彼上三相修生大慧無所有相者謂聲聞緣覺及外道相彼修習生大慧自願處相者謂諸先佛自願處修生大慧自覺聖智究竟相者一切法相無所計著得如幻三昧身諸佛地處進趣行生大慧是名聖智三相若成就此聖智三相者能到自覺聖智究竟境界是故大慧聖智三相當勤修學魏譯復次大慧菩薩摩訶薩建立住持智慧心相者於上聖智三相當勤修學大慧何等為上聖智三相所謂無所有相一切諸佛自願住持相內身聖智自覺知相修行此已能捨跛驢智慧之相得勝子第八地三相修行大慧何者無所有相謂觀聲聞緣覺外道相大慧何者一切諸佛自願住持相謂諸佛本自作願住持諸法大慧何者內身聖智自覺知相一切法相無所執著得如幻三昧身諸佛地處進趣修行大慧是名上聖智三相若成就此三相者能到自覺聖智境界是故大慧諸菩薩摩訶薩求上聖智三相者當如是學唐譯復次大慧菩薩摩訶薩住智慧心所住相已於上聖智三相當勤修學何者為三所謂無影像相一切諸佛願持相自證聖智所趣相謂修行者獲此相已即捨跛驢智慧心相入菩薩第八地於此三相修行不捨大慧無影像相者謂由慣習一切二乘外道相故而得生起一切諸佛願持相者謂由諸佛自本願力所加持故而得生起自證聖智所趣相者謂由不取一切法相成就如幻諸三昧身趣佛地智故而得生起大慧是名上聖智三種相若得此相即到自證聖智所行之處汝及諸菩薩摩訶薩應勤修學
