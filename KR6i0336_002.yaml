body:
  text: 宋天竺三藏求那跋陀羅初譯魏天竺三藏菩提留支再譯唐于闐國三藏實叉難陀後譯明臨濟正宗中都沙門員珂會譯一切佛語心品第一之上如是我聞一時佛住南海濱楞伽山頂種種寶華以為莊嚴與大比丘僧及大菩薩衆俱從彼種種異佛剎來是諸菩薩摩訶薩無量三昧自在之力神通游戲大慧菩薩摩訶薩而為上首一切諸佛手灌其頂自心現境界善解其義種種衆生種種心色無量度門隨類普現於五法自性識二種無我究竟通達魏譯如是我聞一時婆伽婆住大海畔摩羅耶山頂上楞伽城中彼山種種寶性所成諸寶間錯光明赫焰如百千日照曜金山復有無量華園香樹皆寶香林微風吹擊搖枝動葉百千妙香一時流布百千妙音一時俱發重巖屈曲處處皆有仙堂靈室龕窟無數衆寶所成內外明徹日月光輝不能復現皆是古昔諸仙賢聖思如實法得道之處與大比丘僧及大菩薩衆皆從種種他方佛土俱來集會是諸菩薩具足無量自在三昧神通之力奮迅遊化大慧菩薩摩訶薩而為上首一切諸佛手灌其頂而授佛位自心為境善解其義種種衆生種種心色隨種種心種種異念無量度門隨所應度隨所應見而為普現善知五法自性識二種無我究竟通達唐譯如是我聞一時佛住大海濱摩羅耶山頂楞伽城中與大比丘衆及大菩薩衆俱皆從種種諸佛國土而來此會其諸菩薩摩訶薩遊戲無量自在三昧神通諸力大慧菩薩摩訶薩為其上首一切諸佛手灌其頂善知境界自心現義隨衆生心現種種形方便調伏悉已通達五法三性諸識無我爾時大慧菩薩與摩帝菩薩俱遊一切諸佛剎土承佛神力從座而起偏袒右肩右膝著地合掌恭敬以偈讚佛魏譯爾時聖者大慧菩薩與諸一切大慧菩薩俱遊一切諸佛國土承佛神力從座而起更整衣服右膝著地合掌恭敬以偈讚佛唐譯爾時大慧菩薩與摩帝菩薩俱遊一切諸佛國土承佛神力從座而起偏袒右肩右膝著地向佛合掌曲躬恭敬而說頌言世間離生滅猶如虗空華智不得有無而興大悲心一切法如幻遠離於心識智不得有無而興大悲心遠離於斷常世間恆如夢智不得有無而興大悲心魏譯世間離生滅猶如虗空華有無不可得佛慧大悲觀一切法如幻遠離心意識有無不可得佛慧大悲觀遠離於斷常世間猶如夢有無不可得佛慧大悲觀唐譯世間離生滅譬如虗空華智不得有無而興大悲心一切法如幻遠離於心識智不得有無而興大悲心遠離於斷常世間恆如夢智不得有無而興大悲心知人法無我煩惱及爾𦦨常清淨無相而興大悲心魏譯二無我清淨煩惱障智障有無不可得佛慧大悲觀唐譯知人法無我煩惱及爾𦦨常清淨無相而興大悲心一切無涅槃無有涅槃佛無有佛涅槃遠離覺所覺若有若無有是二悉俱離魏譯佛不入不滅涅槃亦不住離覺所覺法有無二俱離唐譯佛不住涅槃涅槃不住佛遠離覺所覺若有若非有牟尼寂靜觀是則遠離生是名為不取今世後世靜魏譯若如是觀佛寂靜離生滅彼人今後世離垢無染取唐譯法身如幻夢云何可稱讚知無性無生乃名稱讚佛佛無根境相不見名見佛云何於牟尼而能有讚毀若見於牟尼寂靜遠離生是人今後世離著無所取爾時大慧菩薩偈讚佛已自說姓名我名為大慧通達於大乘今以百八義仰咨尊中上魏譯爾時大慧菩薩摩訶薩如法偈讚佛已自說姓名我名為大慧願通達大乘今以百八問仰咨無上尊唐譯爾時大慧菩薩摩訶薩偈讚佛已自說姓名我名為大慧通達於大乘今以百八義仰咨尊中上世間解之士聞彼所說偈觀察一切衆告諸佛子言汝等諸佛子今皆恣所問我當為汝說自覺之境界魏譯最勝世間解聞彼大慧問觀察諸衆生告諸佛子言汝等諸佛子及大慧咨問我當為汝說自覺之境界唐譯時世間解聞是語已普觀衆會而作是言汝等諸佛子今皆恣所問我當為汝說自證之境界爾時大慧菩薩摩訶薩承佛所聽頂禮佛足合掌恭敬以偈問曰云何淨其念云何念增長云何見癡惑云何惑增長何故剎土化相及諸外道云何無受次何故名無受魏譯爾時聖者大慧菩薩摩訶薩聞佛聽問頂禮佛足合掌恭敬以偈問曰云何淨諸覺何因而有覺何因見迷惑何因有迷惑何因有國土化相諸外道寂靜及次第唐譯爾時大慧菩薩摩訶薩蒙佛許已頂禮佛足以偈問曰云何起計度云何淨計度云何起迷惑云何淨迷惑云何剎土化相及諸外道及無影次第何故名佛子解脫至何所誰縛誰解脫何等禪境界云何有三乘唯願為解說緣起何所生云何作所作云何俱異說云何為增長云何無色定及與滅正受云何為想滅何因從定覺云何所作生進去及持身云何現分別云何生諸地魏譯云何名佛子解脫至何所誰縛何因脫禪者觀何法何因有三乘何因緣生法何因作所作何因俱異說何因無而現何因無色定及與滅盡定何因想滅定何因從定覺云何因生果何因身去住何因觀所見何因生諸地唐譯云何名佛子解脫至何所誰縛誰能解云何禪境界何故有三乘彼以何緣生何作何能作誰說二俱異云何諸有起云何無色定及與滅盡定云何為想滅云何從定覺云何所作生進去及持身云何見諸物云何入諸地破三有者誰何處身云何往生何所至云何最勝子何因得神通及自在三昧云何三昧心最勝為我說魏譯破三有者誰何身至何所云何處而住云何諸佛子何因得神通及自在三昧何因得定心最勝為我說唐譯誰能破三有何處身云何生復住何處云何有佛子云何得神通自在及三昧三昧心何相願佛為我說云何名為藏云何意及識云何生與滅云何見已還云何為種性非種及心量云何建立相及與非我義云何無衆生云何世俗說魏譯何因為藏識何因意及識何因見諸法何因斷所見云何性非性云何心無法何因說法相云何名無我何因無衆生何因有世諦唐譯云何名藏識云何名意識云何起諸見云何退諸見云何性非性云何唯是心何因建立相云何成無我云何無衆生云何隨俗說云何為斷見及常見不生云何佛外道其相不相違云何當來世種種諸異部云何空何因云何剎那壞魏譯何因不見常何因不見斷云何佛外道二相不相違何因當來世種種諸異部云何名為空何因念不住唐譯云何得不起常見及斷見云何佛外道其相不相違何故當來世種種諸異部云何為性空云何剎那滅云何胎藏生云何世不動何因如夢幻及揵闥婆城世間熱時𦦨及與水月光何因說覺支及與菩提分云何國土亂云何作有見魏譯何因有胎藏何因世不動云何如幻夢說如犍闥婆陽𦦨水中月世尊為我說云何說覺支何因菩提分何因國亂動何因作有見唐譯胎藏云何起云何世不動云何諸世間如幻亦如夢乾城及陽𦦨乃至水中月云何菩提分覺分從何起云何國土亂何故見諸有云何不生滅世如虗空華云何覺世間云何說離字離妄想者誰云何虗空譬如實有幾種幾波羅蜜心何因度諸地誰至無所受魏譯何因不生滅何因如空華何因覺世間何因無字說云何無分別何因如虗空真如有幾種何名心幾岸何因地次第真如無次第唐譯云何知世法云何離文字云何如空華不生亦不滅真如有幾種諸度心有幾云何如虗空云何離分別云何地次第云何得無影何等二無我云何爾焰淨諸智有幾種幾戒衆生性誰生諸寶性摩尼真珠等誰生諸語言衆生種種性魏譯何因二無我何因境界淨幾種智幾戒何因衆生生誰作諸寶性金摩尼珠等誰生於語言衆生種種異唐譯何者二無我云何所知淨聖智有幾種戒衆生亦然摩尼等諸寶斯並云何出誰起於語言衆生及諸物明處及伎術誰之所顯示伽陀有幾種長頌及短句成為有幾種云何名為論云何生飲食及生諸愛欲云何名為王轉輪及小王云何守護國諸天有幾種云何名為地星宿及日月解脫修行者是各有幾種弟子有幾種云何阿闍梨佛復有幾種復有幾種生魏譯五明處伎術誰能如是說伽陀有幾種云何長短句法復有幾種解義復有幾何因飲食種何因生愛欲云何名為王轉輪及小王何因護國土諸天有幾種何因而有地何因星日月解脫有幾種行者有幾種弟子有幾種阿闍梨幾種如來有幾種本生有幾種唐譯明處與伎術誰之所顯示伽陀有幾種長行句亦然道理幾不同解釋幾差別飲食是誰作愛欲云何起云何轉輪王及以諸小王云何王守護天衆幾種別地日月星宿斯等並是何解脫有幾種修行師復幾弟子幾差別云何阿闍梨如來有幾種本生事亦然魔及諸異學彼各有幾種自性及與心彼復各幾種云何施設量唯願最勝說云何空風雲云何念聰明云何為林樹云何為蔓草云何象馬鹿云何而捕取云何為卑陋何因而卑陋云何六節攝云何一闡提男女及不男斯皆云何生魏譯摩羅有幾種異學有幾種自性有幾種心復有幾種云何施假名世尊為我說何因有風雲何因有黠慧何因有樹林世尊為我說何因象馬鹿何因人捕取何因為矬陋世尊為我說何因有六時何因成闡提男女及不男為我說其生唐譯衆魔及異學如是各有幾自性幾種異心有幾種別云何唯假設願佛為開演云何為風雲念智何因有藤樹等行列此並誰能作云何象馬獸何因而捕取云何卑陋人願佛為我說云何六時攝云何一闡提男女及不男此並云何生云何修行退云何修行生禪師以何法建立何等人衆生生諸趣何相何像類魏譯何因修行退何因修行進教何等人修令住何等法諸衆生去來何相何像類唐譯云何修行退云何修行進瑜伽師有幾令人住其中衆生生諸趣何形何色相云何為財富云何致財富云何為釋種何因有釋種云何甘蔗種無上尊願說云何長苦仙彼云何教授如來云何於一切時剎現種種名色類最勝子圍繞云何不食肉云何制斷肉食肉諸種類何因故食肉魏譯世尊為我說何因致財富云何為釋種何因有釋種何因甘蔗種何因長壽仙長壽仙何親云何彼教授世尊如虗空為我分別說何因佛世尊一切時剎現種種名色類佛子衆圍繞何因不食肉云何制斷肉食肉諸種類何因故食肉唐譯富饒大自在此復何因得云何釋迦種云何甘蔗種仙人長苦行是誰之教授何因佛世尊一切剎中現異名諸色類佛子衆圍繞何因不食肉何因令斷肉食肉諸衆生以何因故食云何日月形須彌及蓮華師子勝相剎側住覆世界如因陀羅網或悉諸珍寶箜篌細腰鼓狀種種諸華或離日月光如是等無量魏譯何因日月形須彌及蓮華師子形勝相國土為我說亂側覆世界如因陀羅網一切寶國土何因為我說如箜篌琵琶鼓種種華形離日月光土何因為我說唐譯何故諸國土猶如日月形須彌及蓮華卍字師子像何故諸國土如因陀羅網覆住或側住一切寶所成何故諸國土無垢日月光或如花果形箜篌細腰鼓云何為化佛云何報生佛云何如如佛云何智慧佛云何於欲界不成等正覺何故色究竟離欲得菩提善逝般涅槃誰當持正法天師住久如正法幾時住悉檀及與見各復有幾種毗尼比丘分云何何因緣彼諸最勝子緣覺及聲聞何因百變易云何百無受魏譯何等為化佛何等為報佛何等如智佛何因為我說云何於欲界不成等正覺云何色究竟離於中得道如來般涅槃何人持正法世尊住久如正法幾時住如來立幾法各見有幾種毗尼及比丘世尊為我說何因百變易何因百寂靜聲聞辟支佛世尊為我說唐譯云何變化佛云何為報佛真如智慧佛願皆為我說云何於欲界不成等正覺何故色究竟離染得菩提如來滅度後誰當持正法世尊住久如正法幾時住悉檀有幾種諸