body:
  text: 宋天竺三藏求那跋陀羅初譯魏天竺三藏菩提留支再譯唐于闐國三藏實叉難陀後譯明臨濟正宗中都沙門員珂會譯一切佛語心品第四爾時大慧菩薩白佛言世尊惟願為說三藐三佛陀我及餘菩薩摩訶薩善於如來自性自覺覺他佛告大慧恣所欲問我當為汝隨所問說大慧白佛言世尊如來應供等正覺為作耶為不作耶為事耶為因耶為相耶為所相耶為說耶為所說耶為覺耶為所覺耶如是等辭句為異為不異魏譯爾時聖者大慧菩薩白佛言世尊如來應正遍知唯願演說自身所證內覺知法以何等法名為法身我及一切諸菩薩等善知如來法身之相自身及他俱入無疑佛告大慧菩薩言善哉善哉善哉大慧汝有所疑隨意所問為汝分別大慧白佛言善哉世尊唯然受教即白佛言世尊如來應正遍知法身者為作法耶非作法耶為是因耶為是果耶為能見耶為所見耶為是說耶為可說耶為是智耶智所覺耶如是等辭句如來法身為異耶為不異耶唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我說如來應正等覺自覺性令我及諸菩薩摩訶薩而得善巧自悟悟他佛言大慧如汝所問當為汝說大慧言唯世尊如來應正等覺為作非作為果為因為相所相為說所說為覺所覺如是等為異不異佛告大慧如來應供等正覺於如是等辭句非事非因所以者何俱有過故大慧若如來是事者或作或無常無常故一切事應是如來我及諸佛皆所不欲若非所作者無所得故方便則空同於兔角槃大之子以無所有故大慧若無事無因者則非有非無若非有非無則出於四句四句者是世間言說若出四句者則不墮四句不墮四句故智者所取一切如來句義亦如是慧者當知魏譯佛告大慧如來應正遍知法身之相如是辭句等非作法非不作法非因非果何以故以二邊有過故大慧若言如來是作法者是則無常若無常者一切作法應是如來而佛如來應正遍知不許此法大慧若如來法身非作法者則是無身言有修行無量功德一切行者則是虗妄大慧若不作者應同兔角石女兒等以無作因亦無身故大慧若法非因非果非有非無而彼法體離四種相大慧彼四種法名世間言說大慧若法不離於四種法者彼法但有名字如石女兒大慧石女兒等唯是名字章句之法說同四法若墮四法者則智者不取如是一切問如來句智者應知唐譯佛言大慧如來應正等覺非作非非作非果非因非相非所相非說非所說非覺非所覺何以故俱有過故大慧若如來是作則是無常若是無常一切作法應是如來我及諸佛皆不忍可若非作法則無體性所修方便悉空無益同於兔角石女之子非作因成故若非因非果則非有非無若非有非無則超過四句言四句者但隨世間而有言說若超過四句唯有言說則如石女兒大慧石女兒者唯有言說不墮四句以不墮故不可度量諸有智者應如是知如來所有一切句義如我所說一切法無我當知此義無我性是無我一切法有自性無他性如牛馬大慧譬如非牛馬性非馬牛性其實非有非無彼非無自性如是大慧一切諸法非無自相有自相但非無我愚夫之所能知以妄想故如是一切法空無生無自性當如是知魏譯佛復告大慧我說一切諸法無我汝當諦聽無我之義夫無我者內身無我是故無我大慧一切諸法自身為有他身為無如似牛馬大慧譬如牛身非是馬身馬亦非牛是故不得言有言無而彼自體非是無耶大慧一切諸法亦復如是非無體相有自體相愚癡凡夫不知諸法無我體相以分別心非不分別心大慧如是一切法空一切法不生一切法無體相亦爾唐譯大慧如我所說諸法無我以諸法中無有我性故說無我非是無有諸法自性如來句義應知亦然大慧譬如牛無馬性馬無牛性非無自性一切諸法亦復如是無有自相而非有即有非諸凡愚之所能知何以故不知以分別故一切法空一切法無生一切法無自性悉亦如是如是如來與陰非異非不異若不異陰者應是無常若異者方便則空若二者應有異如牛角相似故不異長短差別故有異一切法亦如是大慧如牛右角異左角左角異右角如是長短種種色各各異大慧如來於陰界入非異非不異魏譯大慧如來法身亦復如是於五陰中非一非異大慧如來法身五陰一者則是無常以五陰是所作法故大慧如來法身五陰異者則有二法不同體相如牛二角相似不異見有別體長短似異大慧若如是一切諸法應無異相而有異相如牛左角異右角右角異左角如是長短相待各別如色種種彼此差別大慧如是如來法身之相於五陰中不可說一不可說異唐譯大慧如來與蘊非異非不異若不異者應是無常五蘊諸法是所作故若異者如牛二角有異不異互相似故不異長短別故有異如牛右角異左左角異右長短不同色相各別然亦不異如於蘊於界處等一切法亦如是如是如來解脫非異非不異如是如來以解脫名說若如來異解脫者應色相成色相成故應無常若不異者修行者得相應無分別而修行者見分別是故非異非不異魏譯於解脫中不可說一不可說異於涅槃中不可說一不可說異如是依解脫故說名如來法身之相大慧若如來法身異解脫者則同色相則是無常若如來法身不異解脫者則無能證所證差別大慧而修行者則見能證及於所證是故非一唐譯大慧如來者依解脫說如來解脫非異非不異若異者如來便與色相相應色相相應即是無常若不異者修行者見應無差別然有差別故非不異如是智及爾焰非異非不異大慧智及爾焰非異非不異者非常非無常非作非所作非有為非無為非覺非所覺非相非所相非陰非異陰非說非所說非一非異非俱非不俱非一非異非俱非不俱故悉離一切量魏譯大慧如是知於可知境界非一非異大慧若法非常非無常非因非果非有為非無為非覺非不覺非能見非可見非離陰界入非即陰界入非名非境界非一非異非俱非不俱非相續非不相續過一切諸法唐譯如是智與所知非異非不異若非異非不異則非常非無常非作非所作非為非無為非覺非所覺非相非所相非蘊非異蘊非說非所說非一非異非俱非不俱以是義故超一切量離一切量則無言說無言說則無生無生則無滅無滅則寂滅寂滅則自性涅槃自性涅槃則無事無因無事無因則無攀緣無攀緣則出過一切虗僞出過一切虗僞則是如來如來則是三藐三佛陀大慧是名三藐三佛陀佛陀大慧三藐三佛陀佛陀者離一切根量魏譯若過諸法但有其名若但有名彼法不生以不生故彼法不滅以不滅故彼法則如虗空平等大慧虗空非因非果若法非因非果者彼法則為不可觀察不可觀察者彼法過諸一切戲論若過一切諸戲論者名如來法身大慧是名如來應正遍知法身之相以過一切諸根境界故唐譯超一切量故唯有言說唯有言說故則無有生無有生故則無有滅無有滅故則如虗空大慧虗空非作非所作非作非所作故遠離攀緣遠離攀緣故出過一切諸戲論法出過一切諸戲論法即是如來如來即是正等覺體正等覺者永離一切諸根境界爾時世尊欲重宣此義而說偈言悉離諸根量無事亦無因已離覺所覺亦離相所相陰緣等正覺一異莫能見若無有見者云何而分別非作非不作非事亦非因非陰非在陰亦非有餘雜亦非有諸性如彼妄想見當知亦非無此法法亦爾魏譯爾時世尊重說偈言離諸法及根非果亦非因已離覺所覺離能見可見諸緣及五陰佛不見一法若無有見法云何而分別非作非不作非因亦非果非陰非離陰亦不在餘處何等心分別分別不能見彼法非是無諸法法自爾唐譯爾時世尊重說頌言出過諸根量非果亦非因如是悉皆離相及所相等蘊緣與正覺一異莫能見既無有見者云何起分別非作非非作非因非非因非蘊非不蘊亦不離餘物非有一法體如彼分別見亦復非是無諸法性如是以有故有無以無故有有若無不應受若有不應想或於我非我言說量留連沉溺於二邊自壞壞世間解脫一切過正觀察我通是名為正觀不毀大導師魏譯先有故言無先無故言有是故不說無亦不得說有迷於我無我但著於音聲彼墮於二邊妄說壞世間離諸一切過則能見我法是名為正見不謗於諸佛唐譯待有故成無待無故成有無既不可取有亦不應說不了我無我但著於語言彼溺於二邊自壞壞世間若能見此法則離一切過是名為正觀不毀大導師爾時大慧菩薩復白佛言世尊如世尊說修多羅攝受不生不滅又世尊說不生不滅是如來異名云何世尊為無性故說不生不滅為是如來異名佛告大慧我說一切法不生不滅有無品不現大慧白佛言世尊若一切法不生者則攝受法不可得一切法不生故若名字中有法者惟願為說佛告大慧善哉善哉諦聽諦聽善思念之吾當為汝分別解說大慧白佛言唯然受教佛告大慧我說如來非無性亦非不生不滅攝一切法亦不待緣故不生不滅亦非無義魏譯爾時聖者大慧菩薩復白佛言世尊惟願世尊為我解說惟願善逝為我解說如來處處說言諸法不生不滅世尊復言不生不滅者名如來法身故言不生不滅世尊如來言不生不滅者為是無法故名不生不滅為是如來異名不生不滅而佛如來常說諸法不生不滅以離建立有無法故世尊若一切法不生者此不得言一切法以一切法不生故若依餘法有此名者世尊應為我說佛告大慧菩薩言善哉善哉善哉大慧諦聽諦聽當為汝說大慧菩薩白佛言善哉世尊唯然受教佛告大慧如來法身非是無物亦非一切法不生不滅亦不得言依因緣有亦非虗妄說不生不滅唐譯爾時大慧菩薩摩訶薩復白佛言世尊如佛經中分別攝取不生不滅言此即是如來異名世尊願為我說不生不滅此則無法云何說是如來異名如世尊說一切諸法不生不滅當知此則墮有無見世尊若法不生則不可取無有少法誰是如來唯願世尊為我宣說佛言諦聽當為汝說大慧我說如來非是無法亦非攝取不生不滅亦不待緣亦非無義大慧我說意生法身如來名號彼不生者一切外道聲聞緣覺七住菩薩非其境界大慧彼不生即如來異名大慧譬如因陀羅釋迦不蘭陀羅如是等諸物一一各有多名亦非多名而有多性亦非無自性魏譯大慧我常說言不生不滅者名意生身如來法身非諸外道聲聞辟支佛境界故住七地菩薩亦非境界大慧我言不生不滅者即如來異名大慧譬如釋提桓因帝釋王不蘭陀羅手爪身體地浮彌虗空無礙如是等種種名號名異義一不依多名言有多體帝釋等耶唐譯我說無生即是如來意生法身別異之名一切外道聲聞獨覺七地菩薩不了其義大慧譬如帝釋地及虗空乃至手足隨一一物各有多名非以名多而有多體亦非無體如是大慧我於此娑呵世界有三阿僧祇百千名號愚夫悉聞各說我名而不解我如來異名大慧或有衆生知我如來者有知一切智者有知佛者有知救世者有知自覺者有知導師者有知廣導者有知一切導者有知仙人者有知梵者有知毗紐者有知自在者有知勝者有知迦毗羅者有知真實邊者有知月者有知日者有知王者有知無生者有知無滅者有知空者有知如如者有知諦者有知實際者有知法性者有知涅槃者有知常者有知平等者有知不二者有知無相者有知解脫者有知道者有知意生者大慧如是等三阿僧祇百千名號不增不減此及餘世界皆悉知我如水中月不出不入魏譯大慧我亦如是於娑婆世界中三阿僧祇百千名號凡夫雖說而不知是如來異名大慧或有衆生知如來者有知自在者有知一切智者有知救世間