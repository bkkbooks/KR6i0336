既自損壞亦壞於他不能令人心得悟解若能善知一切法相文辭句義悉皆通達則能令自身受無相樂亦能令他安住大乘大慧攝受大乘者則攝受諸佛菩薩緣覺聲聞攝受諸佛菩薩緣覺聲聞者則攝受一切衆生攝受一切衆生者則攝受正法攝受正法者則佛種不斷佛種不斷者則能了知得殊勝入處知得殊勝入處菩薩摩訶薩常得化生建立大乘十自在力現衆色像通達衆生形類希望煩惱諸相如實說法如實者不異如實者不來不去相一切虗僞息是名如實大慧善男子善女人不應攝受隨說計著真實者離文字故魏譯大慧取大乘者即是攝受諸佛聲聞緣覺菩薩攝受諸佛聲聞緣覺菩薩者即是攝受一切衆生攝受一切衆生者即是攝受勝妙法藏攝受法藏者即不斷佛種不斷佛種者不斷一切勝妙生處以彼勝處諸菩薩等願生彼故置諸衆生大乘法中十自在力隨諸衆生形色諸使而能隨現說如實法大慧何者如實法如實法者不異不差不取不捨離諸戲論名如實法大慧善男子善女人不得執著文字音聲以一切法無文字故唐譯若能令他安住大乘則得一切諸佛聲聞緣覺及諸菩薩之所攝受若得諸佛聲聞緣覺及諸菩薩之所攝受則能攝受一切衆生若能攝受一切衆生則能攝受一切正法若能攝受一切正法則不斷佛種若不斷佛種則得勝妙處大慧菩薩摩訶薩生勝妙處欲令衆生安住大乘以十自在力現衆色像隨其所宜演真實法真實法者無異無別不來不去一切戲論悉皆息滅是故大慧善男子善女人不應如言執著於義何以故真實之法離文字故大慧如為愚夫以指指物愚夫觀指不得實義如是愚夫隨言說指攝受計著至竟不捨終不能得離言說指第一實義大慧譬如嬰兒應食熟食不應食生若食生者則令發狂不知次第方便熟故大慧如是不生不滅不方便修則為不善是故應當善修方便莫隨言說如視指端魏譯大慧譬如有人為示人物以指指示而彼愚人即執著指不取因指所示之物大慧愚癡凡夫亦復如是聞聲執著名字指故乃至沒命終不能捨文字之指取第一義故大慧譬如穀粟名凡夫食不舂不炊不可得食若其有人未作食者名為顛狂要須次第乃至炊熟方得成食大慧不生不滅亦復如是不修巧智方便行者不得具足莊嚴法身大慧執著名字言得義者如彼癡人不知舂炊噉文字穀不得義食以是義故當學於義莫著文字唐譯大慧譬如有人以指指物小兒觀指不觀於物愚癡凡夫亦復如是隨言說指而生執著乃至盡命終不能捨文字之指取第一義大慧譬如嬰兒應食熟食有人不解成熟方便而食生者則發狂亂不生不滅亦復如是不方便修則為不善是故宜應善修方便莫隨言說如觀指端是故大慧於真實義當方便修真實義者微妙寂靜是涅槃因言說者妄想合妄想者集生死大慧真實義者從多聞者得大慧多聞者謂善於義非善言說善義者不隨一切外道經論身自不隨亦不令他隨是則名曰大德多聞是故欲求義者當親近多聞所謂善義與此相違計著言說應當遠離魏譯大慧所言義者名為涅槃言名字者分別相縛生世間解大慧義者從於多聞人得大慧言多聞者謂義巧方便非聲巧方便大慧義方便者離於一切外道邪說亦不和雜如是說者自身不墮外道邪法亦不令他墮外道法大慧是名多聞有義方便大慧欲得義者應當親近多聞智者供養恭敬著名字者應當遠離不應親近唐譯大慧實義者微妙寂靜是涅槃因言說者與妄想合流轉生死大慧實義者從多聞得多聞者謂善於義非善言說善義者不隨一切外道惡見身自不隨亦令他不隨是則名曰於義多聞欲求義者應當親近與此相違著文字者宜速捨離爾時大慧菩薩復承佛威神而白佛言世尊世尊顯示不生不滅無有奇特所以者何一切外道因亦不生不滅世尊亦說虗空非數緣滅及涅槃界不生不滅世尊外道說因生諸世間世尊亦說無明愛業妄想為緣生諸世間彼因此緣名差別耳外物因緣亦如是世尊與外道論無有差別微塵勝妙自在衆生主等如是九物不生不滅世尊亦說一切性不生不滅有無不可得外道亦說四大不壞自性不生不滅四大常是四大乃至周流諸趣不捨自性世尊所說亦復如是是故我言無有奇特惟願世尊為說差別所以奇特勝諸外道若無差別者一切外道皆亦是佛以不生不滅故而世尊說一世界中多佛出世者無有是處如向所說一世界中應有多佛無差別故魏譯爾時大慧菩薩承諸佛力白佛言世尊如來世尊說一切法不生不滅非為奇特何以故一切外道亦說諸因不生不滅如來亦說虗空非數緣滅及涅槃界不生不滅世尊諸外道亦說依諸因緣生諸衆生如來亦說無明愛業分別因緣生諸世間若爾如來亦說因緣名字相異依外因緣能生諸法外道亦說依外因緣而生諸法是故如來與外道說無有差別世尊外道因微塵勝自在天梵天等共外九種因緣說言諸法不生不滅如來亦說一切諸法不生不滅有無不可得以諸四大不滅自相不生不滅隨佛如來種種異說而不離於外道所說而諸外道亦說諸大不離大體世尊諸外道分別諸大如來亦爾分別諸大世尊以是義故如來所說不異外道若不同者如來應說所有異相若有異相當知不同外道所說世尊若佛如來於自法中不說勝相者諸外道中亦應有佛以說諸法不生不滅如來常說一世界中而有多佛俱出世者無有是處如向所說一世界中應有多佛何以故所說有無因無差別故如佛所說言無虗謬云何世尊於自法中不說勝相唐譯爾時大慧菩薩摩訶薩承佛威力復白佛言世尊如來演說不生不滅非為奇特何以故一切外道亦說作者不生不滅世尊亦說虗空涅槃及非數滅不生不滅外道亦說作者因緣生於世間世尊亦說無明愛業生諸世間俱是因緣但名別耳外物因緣亦復如是是故佛說與外道說無有差別外道說言微塵勝妙自在衆生主等如是九物不生不滅世尊亦說一切諸法不生不滅若有若無皆不可得世尊大種不壞以其自相不生不滅周流諸趣不捨自性世尊分別雖稍變異一切無非外道已說是故佛法同於外道若有不同願佛為演有何所以佛說為勝若無別異外道即佛以其亦說不生滅故世尊常說一切世界中無有多佛如向所說是則應有佛告大慧我說不生不滅不同外道不生不滅所以者何彼諸外道有性自性得不生不變相我不如是墮有無品大慧我者離有無品離生滅非性非無性如種種幻夢現故非無性云何無性謂色無自性相攝受現不現故攝不攝故以是故一切性無性非無性但覺自心現量妄想不生安隱快樂世事永息魏譯佛告大慧言大慧我所說法不生不滅者不同外道不生不滅亦不同彼不生無常法何以故大慧諸外道說有實有體性不生不變相我不如是墮於有無朋黨聚中大慧我說離有無法離生住滅相非有非無見諸一切種種色像如幻如夢是故不得言其有無大慧云何不得言其有無謂色體相有見不見取不取故大慧是故我說一切諸法非有非無大慧以不覺知唯是自心分別生見一切世間諸法本來不生不滅唐譯佛言大慧我之所說不生不滅不同外道不生不滅不生無常論何以故外道所說有實性相不生不變我不如是墮有無品我所說法非有非無離生離滅云何非無如幻夢色種種見故云何非有色相自性非是有故見不見故取不取故是故我說一切諸法非有非無若覺唯是自心所見住於自性分別不生世間所作悉皆永息愚癡凡夫妄想作事非諸聖賢不實妄想如犍闥婆城及幻化人大慧如犍闥婆城及幻化人種種衆生商賈出入愚夫妄想謂真出入而實無有出者入者但彼妄想故如是大慧愚癡凡夫起不生不滅惑彼亦無有有為無為如幻人生其實無有若生若滅性無性無所有故一切法亦如是離於生滅愚癡凡夫墮不如實起生滅妄想非諸聖賢魏譯而諸凡夫生於分別非聖人耶大慧迷心分別不實義者譬如凡夫見犍闥婆城幻師所作種種幻人種種象馬見其入出虗妄分別作如是言此如是如是入如是如是出大慧而彼實處無人出入唯自心見迷惑分別生不生法亦復如是大慧而彼實處無此有為無為諸法如彼幻師所作幻事而彼幻師不生不滅大慧諸法有無亦無所為以離生滅故唯諸凡夫墮顛倒心分別生滅非謂聖人唐譯分別者是凡愚事非賢聖耳大慧妄心分別不實境界如乾闥婆城幻所作人大慧譬如小兒見乾闥婆城及以幻人商賈入出迷心分別言有實事凡愚所見生與不生有為無為悉亦如是如幻人生如幻人滅幻人其實不生不滅諸法亦爾離於生滅大慧凡夫虗妄起生滅見非諸聖人不如實者不爾如性自性妄想亦不異若異妄想者計著一切性自性不見寂靜不見寂靜者終不離妄想是故大慧無相見勝非相見相見者受生因故不勝大慧無相者妄想不生不起不滅我說涅槃大慧涅槃者如真實義見離先妄想心心數法逮得如來自覺聖智我說是涅槃魏譯大慧顛倒者如心分別此法如是如是而彼法不如是如是亦非顛倒分別顛倒者執著諸法是有是無非見寂靜故不見寂靜者不能遠離虗妄分別是故大慧見寂靜者名為勝相非見諸相名為勝相以不能斷生因相故大慧言無相者遠離一切諸分別心無生無相者是我所說名為涅槃大慧言涅槃者謂見諸法如實住處遠離分別心心數法依於次第如實修行於自內身聖智所證我說如是名為涅槃唐譯言虗妄者不如法性起顛倒見顛倒見者執法有性不見寂滅不見寂滅故不能遠離虗妄分別是故大慧無相見勝非是相見相是生因若無有相則無分別不生不滅則是涅槃大慧言涅槃者見如實處捨離分別心心所法獲於如來內證聖智我說此是寂滅涅槃爾時世尊欲重宣此義而說偈言滅除彼生論建立不生義我說如是法愚夫不能知一切法不生無性無所有犍闥婆幻夢有性者無因不生無自性何因空當說以離於和合覺知性不現是故空不生我說無自性謂一一和合性現而非有分析無和合非如外道見魏譯爾時世尊重說偈言為遮生諸法建立無生法我說法無因凡夫不能知一切法不生亦不得言無犍闥婆幻夢諸法無因有諸法空無相云何為我說離諸和合緣智慧不能見以空本不生是故說無體一一緣和合見物不可得和合不可得非外道所見唐譯爾時世尊重說頌言為除有生執成立無生義我說無因論非愚所能了一切法無生亦非是無法如乾城幻夢雖有而無因空無生無性云何為我說離諸和合緣智慧不能見以是故我說空無生無性一一緣和合雖現而非有分析無和合非如外道見夢幻及垂𩬊野馬犍闥婆世間種種事無因而相現折伏有因論申暢無生義申暢無生者法流永不斷熾然無因論恐怖諸外道魏譯夢幻及毛輪乾闥婆陽焰無因而妄見世間事亦爾降伏無因論能成無生義能成無生者我法不滅壞說無因諸論外道生驚怖唐譯幻夢及垂𩬊野馬與乾城無因而妄現世事皆如是折伏有因論申述無生旨無生義若存法眼恆不滅我說無因論外道咸驚怖爾時大慧以偈問曰云何何所因彼以何故生於何處和合而作無因論爾時世尊復以偈答觀察有為法非無因有因彼生滅論者所見從是滅魏譯云何何等人何因於何處生諸法無因非因非無因智者若能見能離生滅見無法生不生為無因緣相唐譯云何何所因復以何故生於何處和合而作無因論觀察有為法非因非無因彼生滅論者所見從是滅爾時大慧說偈問曰云何為無生為是無性耶為顧視諸緣有法名無生名不應無義惟為分別說魏譯若為法名字無義為我說唐譯為無故不生為待於衆緣為有名無義願為我宣說爾時世尊復以偈答非無性無生亦非顧諸緣非有性而名名亦非無義一切諸外道聲聞及緣覺七住非境界是名無生相魏譯非法有無生亦非待因緣非前法有名亦名不空說聲聞辟支佛外道非境界住在於七地彼處無生相唐譯非無法不生亦非以待緣非有物而名亦非名無義一切諸外道聲聞及緣覺七住非所行此是無生相遠離諸因緣亦離一切事唯有微心住想所想俱離其身隨轉變我說是無生魏譯離諸因緣法為遮諸因緣說建立唯心我說名無生諸法無因緣離分別分別離有無朋黨我說名無生心離於見法及離二法體轉身依正相我說名無生唐譯遠離諸因緣無有能作者唯心所建立我說是無生諸法非因生非無亦非有能所分別離我說是無生唯心無所見亦離於二性如是轉所依我說是無生無外性非性亦無心攝受斷除一切見我說是無生如是無自性空等應分別非空故說空無生故說空魏譯外非實無實亦非心所取幻夢及毛輪犍闥婆陽焰遠離於諸見是名無生相如是空等法諸文句應知非生及空空而無於生空唐譯外物有非有其心無所取一切見咸斷此是無生相空無性等句其義皆如是非以空故空無生故說空因緣數和合則有生有滅離諸因緣數無別有生滅捨離因緣數更無有異性若言一異者是外道妄想有無性不生非有亦非無除其數轉變是悉不可得魏譯有生及有滅諸因緣和合離於諸因緣不生亦不滅離因緣無法離和合無得外道妄分別而見有一異有無不生法有無不可得唯和合諸法而見有生滅唐譯因緣共集會是故有生滅分散於因緣生滅則無有若離諸因緣則更無有法一性及異性凡愚所分別有無不生法俱非亦復然唯除衆緣會於中見起滅但有諸俗數展轉為鈎鎖離彼因緣鎖生義不可得生無性不起離諸外道過但說緣鈎鎖凡愚不能了若離緣鈎鎖別有生性者是則無因論破壞鈎鎖義如鐙顯衆像鈎鎖現若然是則離鈎鎖別更有諸性魏譯但有於名字展轉為鈎鎖離彼因緣鎖生法不可得生法不見生離諸外道過但說緣鈎鎖諸凡夫不知若離緣鈎鎖更無有別法是則無因說破壞緣鎖義如燈顯衆像鈎鎖生亦然是則離鈎鎖別更有法生唐譯隨俗假言說因緣遞鈎鎖若離因緣鎖生義不可得我說唯鈎鎖生無故不生離諸外道過非凡愚所了若離緣鈎鎖別有生法者是則無因論破壞鈎鎖義如燈能照物鈎鎖現若然此則離鈎鎖別有於諸法無性無有生如虗空自性若離於鈎鎖慧無所分別復有餘無生賢聖所得法彼生無生者是則無生忍魏譯生法本無體自性如虗空離鈎鎖求法愚人無所知復有餘無生聖人所得法彼生無生者是則無生忍唐譯無生則無性體相如虗空離鈎鎖求法愚夫所分別復有餘無生衆聖所得法彼生無生者是則無生忍若使諸世間觀察鈎鎖者一切離鈎鎖從是得三昧癡愛諸業等是則內鈎鎖鑽燧泥團輪種子等名外若使有他性而從因緣生彼非鈎鎖義是則不成就若生無自性彼為誰鈎鎖展轉相生故當知因緣義魏譯若見諸世間則是見鈎鎖一切皆鈎鎖是則心得定無明愛業等是則內鈎鎖攢抽泥團輪種子大鈎鎖若更有他法而從因緣生離於鈎鎖義彼不住聖教若生法是無彼為誰鈎鎖展轉相生故是名因緣義唐譯一切諸世間無非是鈎鎖若能如是解此人心得定無明與愛業是則內鈎鎖種子泥輪等如是名為外若言有他法而從因緣生離於鈎鎖義此則非教理生法若非有彼為誰因緣展轉而相生此是因緣義堅濕暖動法凡愚生妄想離數無異法是則說無性魏譯堅濕熱動法凡愚生分別離鎖更無法是故說無體唐譯堅濕暖動等凡愚所分別但緣無有法故說無自性如醫療衆病無有若干論以病差別故為設種種治我為彼衆生破壞諸煩惱知其根優劣為彼說度門非煩惱根異而有種種法唯說一乘法是則為大乘魏譯如醫療衆病依病出對治而論無差別病殊故方異我念諸衆生為煩惱過染知根力差別隨堪受為記我法無差別隨根病異說我惟一乘法八聖道清淨唐譯如醫療衆病其論無差別以病不同故方藥種種殊我為諸衆生滅除煩惱病知其根勝劣演說諸法門非煩惱根異而有種種法唯是一大乘清涼八支道爾時大慧菩薩摩訶薩復白佛言世尊一切外道皆起無常妄想世尊亦說一切行無常是生滅法此義云何為邪為正為有幾種無常魏譯爾時聖者大慧菩薩復白佛言世尊世尊說無常無常者一切外道亦說無常世尊如來依於名字章句說如是言諸行無常是生滅法世尊此法為是真實為是虗妄世尊復有幾種無常唐譯爾時大慧菩薩摩訶薩復白佛言世尊一切外道妄說無常世尊亦言諸行無常是生滅法未知此說是邪是正所言無常復有幾種佛告大慧一切外道有七種無常非我法也何等為七彼有說言作已而捨是名無常有說形處壞是名無常有說即色是無常有說色轉變中間是名無常無間自之散壞如乳酪等轉變中間不可見無常毀壞一切性轉有說性無常有說性無性無常有說一切法不生無常入一切法魏譯佛告聖者大慧菩薩言善哉善哉善哉大慧一切外道虗妄分別說八種無常何等為八一者發起所作而不作是名無常何者名為發起謂生法不生法常法無常法名為發起無常二者形相休息名為無常三者色等即是無常四者色轉變故異異無常諸法相續自然而滅如乳酪轉變於一切法不見其轉亦不見滅名為無常五者復有餘外道等以無物故名為無常六者有法無法而悉無常以一切法本不生故名為無常以無常法彼中和合是故無常七者復有餘外道等本無後有名為無常唐譯佛言大慧外道說有七種無常非是我法何等為七謂有說始起即捨是名無常生已不生無常性故有說形處變壞是名無常有說色即無常有說色之變異是名無常一切諸法相續不斷能令變異自然歸滅猶如乳酪前後變異雖不可見然在法中壞一切法有說物無常有說物無物無常有說不生無常遍住一切諸法之中大慧性無性無常者謂四大及所造自相壞四大自性不可得不生魏譯謂依諸大所生相滅不見不生離相續體名為無常唐譯其中物無物無常者謂能造所造其相滅壞大種自性本來無起彼不生無常者非常無常一切法有無不生分析乃至微塵不可見是不生義非生是名不生無常相若不覺此者墮一切外道生無常義魏譯八者不生無常謂為非常是故無常見諸法有無生不生乃至微塵觀察不見法生故言不生諸法非生大慧是名無生無常相而諸外道不知彼法所以不生是故分別諸法不生故言無常唐譯不生無常者謂常與無常有無等法如是一切皆無有起乃至分析至於微塵亦無所見以不起故說名無生此是不生無常相若不了此則墮外道生無常義大慧性無常者是自心妄想非常無常性所以者何謂無常自性不壞大慧此是一切性無性無常事除無常無有能令一切法性無性者如杖瓦石破壞諸物魏譯復次大慧外道分別無常之法言有於物彼諸外道自心虗妄分別無常常非無常以有物故何以故自體不滅故自體不滅者無常之體常不滅故大慧若無常法是有物者應生諸法以彼無常能作因故大慧若一切法不離無常者諸法有無一切應見何以故如杖木瓦石能破可壞之物悉皆破壞唐譯有物無常者謂於非常非無常處自生分別其義云何彼立無常自不滅壞能壞諸法若無無常壞一切法法終不滅成於無有如杖槌瓦石能壞於物而自不壞此亦如是現見各各不異是性無常事非作所作有差別此是無常此是事作所作無異者一切性常無因性大慧一切性無性有因非凡愚所知魏譯見彼種種異異相故是故無常因一切法無法亦非因亦非果大慧復有諸過以彼因果無差別故而不得言此是無常而彼是果以因果差別故故不得言一切法常以一切法無因故大慧諸法有因而諸凡夫不覺不知唐譯大慧現見無常與一切法無有能作所作差別云此是無常此是所作無差別故能作所作應俱是常不見有因能令諸法成於無故大慧諸法壞滅實亦有因但非凡愚之所能了非因不相似事生若生者一切性悉皆無常是不相似事作所作無有別異而悉見有異若性無常者墮作因性相若墮者一切性不究竟一切性作因相墮者自無常應無常無常無常故一切性不無常應是常魏譯異因不能生異果故大慧若異因能生異果者異因應生一切諸法若爾復更有過應因果差別而見差別大慧若其無常是有物者應同因體所作之事復更有過於一法中即應具足一切諸法以同一切所作因果業相無差別故復更有過自有無常無常有無常體故復更有過一切諸法無常應常故唐譯大慧異因不應生於異果若能生者一切異法應並相生彼法此法能生所生應無有別現見有別云何異因生於異果大慧若無常性是有法者應同所作自是無常自無常故所無常法皆應是常若無常入一切性者應墮三世彼過去色與壞俱未來不生色不生故現在色與壞相俱色者四大積集差別四大及造色自性不壞離異不異故一切外道一切四大不壞一切三有四大及造色在所知有生滅離四大造色一切外道於何所思惟性無常四大不生自性相不壞故魏譯復更有過若其無常同諸法者墮三世法大慧過去色同無常故已滅未來法未生以同色無常故不生現在有法不離於色以色與彼諸大相依五大依塵是故不滅以彼彼不相離故大慧一切外道不滅諸大三界依大依微塵等是故依彼法說生住滅大慧離於此法更無四大諸塵等法以彼外道虗妄分別離一切法更有無常是故外道說言諸大不生不滅以自體相常不滅故唐譯大慧若無常性住諸法中應同諸法墮於三世與過去色同時已滅未來不生現在俱壞一切外道計四大種體性不壞色者即是大種差別大種造色離異不異故其自性亦不壞滅大慧三有之中能造所造莫不皆是生住滅相豈更別有無常之性能生於物而不滅耶離始造無常者非四大復有異四大各各異相自相故非差別可得彼無差別斯等不更造二方便不作當知是無常魏譯是故彼說發起作事中間不作名為無常諸大更有發起諸大無彼彼異相同相不生滅法以見諸法不生滅故而於彼處生無常智唐譯始造即捨無常者非大種互造大種以各別故非自相造以無異故非復共造以乖離故當知非是始造無常彼形處壞無常者謂四大及造色不壞至竟不壞大慧竟者分析乃至微塵觀察壞四大及造色形處異見長短不可得非四大四大不壞形處壞現墮在數論魏譯大慧何者名為形相休息無常謂能造所造形相見形相異如長短非諸大滅而見諸大形相轉變彼人墮在僧佉法中唐譯形狀壞無常者此非能造及所造壞但形狀壞其義云何謂分析色乃至微塵但滅形狀長短等見不滅能造所造色體此見墮在數論之中色即無常者謂色即是無常彼則形處無常非四大若四大無常者非俗數言說世俗言說非性者則墮世論見一切性但有言說不見自相生魏譯大慧復形相無常者謂何等人即色名無常彼人見於形相無常而非諸大是無常法若諸大無常則諸世間一切不得論說世事若論世事墮盧伽耶陀邪見朋黨以說一切諸法唯名復見諸法自體相生唐譯色即是無常者謂此即是形狀無常非大種性若大種性亦無常者則無世事無世事者當知則墮盧迦耶見以見一切法自相生唯有言說故轉變無常者謂色異性現非四大如金作莊嚴具轉變現非金性壞但莊嚴具處所壞如是餘性轉變等亦如是魏譯大慧轉變無常者謂見諸色種種異相非諸大轉變譬如見金作莊嚴具形相轉變金體不異餘法轉變亦復如是唐譯轉變無常者謂色體變非諸大種譬如以金作莊嚴具嚴具有變而金無改此亦如是如是等種種外道無常見妄想火燒四大時自相不燒各各自相相壞者四大造色應斷魏譯大慧如是外道虗妄分別見法無常火不燒諸大自體不燒以彼諸大自體差別故大慧諸外道說若火能燒諸大者則諸大斷滅是故不燒唐譯大慧如是等種種外道虗妄分別見無常性彼作是說火不能燒諸大自相但各分散若能燒者能造所造則皆斷滅大慧我法起非常非無常所以者何謂外性不決定故唯說三有唯心不說種種相有生有滅四大合會差別四大及造色故妄想二種事攝所攝知二種妄想離外性無性二種見魏譯大慧我說大及諸塵非常非無常何以故我不說外境界有故我說三界但是自心不說種種諸相是有是故說言不生不滅惟是四大因緣和合非大及塵是實有法以虗妄心分別二種可取能取法如實能知二種分別是故離外有無見相唐譯大慧我說諸法非常無常何以故不取外法故三界唯心故不說諸相故大種性處種種差別不生不滅故非能造所造故能取所取二種體性一切皆從分別起故如實而知二取性故覺自心現量妄想者思想作行生非不作行離心性無性妄想世間出世間出世間上上一切法非常非無常不覺自心現量墮二邊惡見相續一切外道不覺自妄想此凡夫無有根本謂世間出世間出世間上上從說妄想生非凡愚所覺魏譯唯是自心分別作業而名為生而業不生以離有無分別心故大慧何故非常非不常以有世間及出世間上上諸法是故不得說言是常何故非無常以能覺知唯是自心分別見故是故非無常而諸外道墮在邪見執著二邊不知自心虗妄分別非諸聖人分別無常大慧一切諸法㹅有三種何等為三一者世間法相二者出世間法相三者出世間上上勝法相以依言語種種說法而諸凡夫不覺不知唐譯了達唯是自心現故離外有無二種見故離有無見則不分別能所造故大慧世間出世間及出世間上上諸法唯是自心非常非無常不能了達墮於外道二邊惡見大慧一切外道不能解了此三種法所有語言分別境界非諸凡愚之所能知爾時世尊欲重宣此義而說偈言遠離於所造及與形處異性與色無常外道愚妄想諸性無有壞大大自性住外道無常想沒在種種見彼諸外道等無若生若滅大大性自常何謂無常想一切唯心量二種心流轉攝受及所攝無有我我所梵天為樹根枝條普周遍如是我所說唯是彼心量魏譯爾時世尊重說偈言遠離於始造及與形相異無常名有物外道妄分別諸法無有滅諸大自性住墮於種種見外道說無常彼諸外道說諸法不生滅諸大體自常何等法無常一切世唯心而心見二境可取能取法我我所法無三界上下法我說皆是心離於諸心法更無有可得唐譯爾時世尊重說頌言始造即便捨形狀有轉變色物等無常外道妄分別諸法無壞滅諸大自性住外道種種見如是說無常彼諸外道衆皆說不生滅諸大性自常誰是無常法能取及所取二種從心現一切唯是心無有我我所梵天等諸法我說唯是心若離於心者一切不可得爾時大慧菩薩復白佛言世尊惟願為說一切菩薩聲聞緣覺滅正受次第相續若善於滅正受次第相續相者我及餘菩薩終不妄捨滅正受樂門不墮一切聲聞緣覺外道愚癡魏譯爾時聖者大慧菩薩摩訶薩復白佛言世尊唯願世尊為我說諸一切菩薩聲聞辟支佛入滅盡定次第相我及一切諸菩薩等若得善知入滅盡定次第之相巧方便者不墮聲聞辟支佛三昧三摩跋提滅盡定樂不墮聲聞辟支佛外道迷惑之法唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我說一切聲聞緣覺入滅次第相續相令我及諸菩薩摩訶薩善知此已於滅盡三昧樂心無所惑不墮二乘及諸外道錯亂之中佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言世尊惟願為說佛告大慧六地菩薩摩訶薩及聲聞緣覺入滅正受等七地菩薩摩訶薩念念正受離一切性自性相正受非聲聞緣覺諸聲聞緣覺墮有行覺攝所攝相滅正受是故七地非念正受得一切法無差別相非分得種種相性覺一切法善不善性相正受是故七地無善念正受大慧八地菩薩及聲聞緣覺心意意識妄想相滅魏譯佛告聖者大慧菩薩言善哉善哉善哉大慧諦聽諦聽當為汝說大慧菩薩白佛言善哉世尊唯然受教佛告大慧菩薩從初地乃至六地入滅盡定聲聞辟支佛亦入滅盡定大慧諸菩薩摩訶薩於七地中念念入滅盡定以諸菩薩悉能遠離一切諸法有無相故大慧聲聞辟支佛不能念念入滅盡定以聲聞辟支佛緣有為行入滅盡定墮在可取能取境界是故聲聞辟支佛不能入七地中念念滅盡定以聲聞辟支佛生驚怖想恐墮諸法無異相故以覺諸法種種異相有法無法善不善法同相異相而入滅盡定是故聲聞辟支佛不能入七地中念念滅盡定以無善巧方便智故大慧七地菩薩轉滅聲聞辟支佛心意意識故唐譯佛言諦聽當為汝說大慧菩薩摩訶薩至於六地及聲聞緣覺入於滅定七地菩薩念念恆入離一切法自性相故非諸二乘二乘有作墮能所取不得諸法無差別相了善不善自相共相入於滅定是故不能念念恆入大慧八地菩薩聲聞緣覺心意意識分別想滅初地乃至七地菩薩摩訶薩觀三界心意意識量離我我所自妄想修墮外性種種相愚夫二種自心攝所攝向無知不覺無始過惡虗僞習氣所熏魏譯大慧初地乃至六地菩薩摩訶薩見於三界但是自心心意意識離我我所法唯是自心分別不墮外法種種諸相唯是凡夫內心愚癡墮於二邊見於可取能取之法以無知故而不覺知無始世來身口及意妄想煩惱戲論熏習而生諸法唐譯始從初地乃至六地觀察三界一切唯是心意意識自分別起離我我所不見外法種種諸相凡愚不知由無始來過惡熏習於自心內變作能取所取之相而生執著大慧八地菩薩摩訶薩聲聞緣覺涅槃菩薩者三昧覺所持是故三昧門樂不般涅槃若不持者如來地不滿足棄捨一切有為衆生事故佛種則應斷諸佛世尊為示如來不可思議無量功德聲聞緣覺三昧門得樂所牽故作涅槃想魏譯大慧於八地中一切菩薩聲聞辟支佛入涅槃想大慧諸菩薩摩訶薩承己自心三昧佛力不入三昧樂門墮涅槃而住以不滿足如來地若彼菩薩住三昧分者休息度脫一切衆生斷如來種滅如來家為示如來不可思議諸境界故是故不入涅槃大慧聲聞辟支佛墮三昧樂門法是故聲聞辟支佛生涅槃想唐譯大慧八地菩薩所得三昧同諸聲聞緣覺涅槃以諸佛力所加持故於三昧門不入涅槃若不持者便不化度一切衆生不能滿足如來之地亦則斷絶如來種性是故諸佛為說如來不可思議諸大功德令其究竟不入涅槃聲聞緣覺著三昧樂是故於中生涅槃想大慧我分部七地善修心意意識相善修我我所攝受人法無我生滅自共相善四無礙決定力三昧門地次第相續入道品法魏譯大慧諸菩薩摩訶薩從初地來乃至七地具巧方便觀察心意意識之想遠離我我所取相之法觀察我空法空觀察同相異相善解四無礙巧方便義自在決定入於諸地菩提分法唐譯大慧七地菩薩善能觀察心意意識我我所執生法無我若生若滅自相共相四無礙辨善巧決定於三昧門而得自在漸入諸地具菩提分法不令菩薩摩訶薩不覺自共相不善七地墮外道邪徑故立地次第大慧彼實無有若生若滅除自心現量所謂地次第相續及三界種種行愚夫所不覺愚夫所不覺者謂我及諸佛說地次第相續及說三界種種行魏譯大慧我若不說諸菩薩摩訶薩同相異相法者一切菩薩不如實知諸地次第恐墮外道邪見等法故我次第說諸地相大慧若人次第入諸地者不墮餘道我說諸地次第相者唯自心見諸地次第及三界中種種行相而諸凡夫不覺不知以諸凡夫不覺知故是故我及一切諸佛說於諸地次第之相及建立三界種種行相唐譯大慧我恐諸菩薩不善了知自相共相不知諸地相續次第墮於外道諸惡見中故如是說大慧彼實無有若生若滅諸地次第三界往來一切皆是自心所見而諸凡愚不能了知以不知故我及諸佛為如是說復次大慧聲聞緣覺第八菩薩地滅三昧門樂醉所醉不善自心現量自共相習氣所障墮人法無我法攝受見妄想涅槃想非寂滅智慧覺魏譯復次大慧聲聞辟支佛於第八菩薩地中樂著寂滅三昧樂門醉故不能善知唯自心見墮自相同相熏習障礙故墮人無我法無我見過故以分別心名為涅槃而不能知諸法寂靜唐譯大慧聲聞緣覺至於菩薩第八地中為三昧樂之所昏醉未能善了唯心所見自共相習纏覆其心著二無我生涅槃覺非寂滅慧大慧菩薩者見滅三昧門樂本願哀憫大悲成就知分別十無盡句不妄想涅槃想彼已涅槃妄想不生故離攝所攝妄想覺了自心現量一切諸法妄想不生不墮心意意識外性自性相計著妄想非佛法因不生隨智慧生得如來自覺地魏譯大慧諸菩薩摩訶薩以見寂靜三昧樂門憶念本願大慈悲心度諸衆生知十無盡如實行智是故不即入於涅槃大慧諸菩薩摩訶薩遠離虗妄分別之心遠離能取可取境界名入涅槃以如實智知一切諸法唯是自心是故不生分別之心是故菩薩不取心意意識不著外法實有之相而非不為佛法修行依根本智展轉修行為於自身求佛如來證地智故唐譯大慧諸菩薩摩訶薩見於寂滅三昧樂門即便憶念本願大悲具足修行十無盡句是故不即入於涅槃以入涅槃不生果故離能所取故了達唯心故於一切法無分別故不墮心意及以意識外法性相執著中故然非不起佛法正因隨智慧行如是起故得於如來自證地故如人夢中方便度水未度而覺覺已思惟為正為邪非正非邪餘無始見聞覺識因想種種習氣種種形處墮有無想心意意識夢現魏譯大慧如人睡夢度大海水起大方便欲度自身未度中間忽然便窹作是思惟此為是實為是虗妄彼復思惟如是之相非實非虗唯是我本虗妄分別不實境界熏習因故見種種色形相顛倒不離有無意識熏習於夢中見唐譯大慧如人夢中方便度河未度便覺覺已思惟向之所見為是真實為是虗妄覆自念言非實非妄如是但是見聞覺知曾所更事分別習氣離有無念意識夢中之所現耳大慧如是菩薩摩訶薩於第八菩薩地見妄想生從初地轉進至第七地見一切法如幻等方便度攝所攝心妄想行已作佛法方便未得者令得大慧此是菩薩涅槃方便不壞離心意意識得無生法忍大慧於第一義無次第相續說無所有妄想寂滅法魏譯大慧菩薩摩訶薩亦復如是於八地中見分別心初地七地諸法同相如夢如幻平等無差離諸功用可取能取分別之心見心心數法為於未得上上佛法修行者令得故菩薩摩訶薩修行勝法名為涅槃非滅諸法名為涅槃菩薩摩訶薩遠離心意意識分別相故得無生法忍大慧第一義中亦無次第無次第行諸法寂靜亦如虗空唐譯大慧菩薩摩訶薩亦復如是始從初地而至七地乃至增進入於第八得無分別見一切法皆如幻等離能所取見心心所廣大力用勤修佛法未證令證離心意意識妄分別想獲無生忍此是菩薩所得涅槃非滅壞也大慧第一義中無有次第亦無相續遠離一切境界分別此則名為寂滅之法魏譯大慧菩薩白佛言世尊世尊說聲聞辟支佛入第八菩薩地寂滅樂門如來復說聲聞辟支佛不知但是自心分別復說諸聲聞得人無我而不得法無我空若如是說聲聞辟支佛尚未能證初地之法何況八地寂滅樂門佛告大慧我今為汝分別宣說大慧聲聞有三種言入八地寂滅樂門者此是先修菩薩行者墮聲聞地還依本心修菩薩行同入八地寂滅樂門非增上慢寂滅聲聞以彼不能入菩薩行未曾覺知三界唯心未曾修行菩薩諸法未曾修行諸波羅密十地之行是故決定寂滅聲聞不能證彼菩薩所行寂滅樂門爾時世尊欲重宣此義而說偈言心量無所有此住及佛地去來及現在三世諸佛說心量地第七無所有第八二地名為住佛地名最勝自覺智及淨此則是我地自在最勝處清淨妙莊嚴照曜如盛火光明悉遍至熾焰不壞目周輪化三有化現在三有或有先時化於彼演說乘皆是如來地十地則為初初則為八地第九則為七七亦復為八第二為第三第四為第五第三為第六無所有何次魏譯爾時世尊重說偈言唯心無所有諸行及佛地去來現在佛三世說如是七地為心地無所有八地二地名為行餘地名我地內身證及淨此名為我地自在最勝處阿迦尼吒天照曜如火焰出妙諸光明種種美可樂化作於三界化現三界色或有在先化彼處說諸乘是我自在地十地為初地初地為八地九地為七地七地為八地二地為三地四地為五地三地為六地寂滅有何次決定諸聲聞不行菩薩行同入八地者是本菩薩行唐譯爾時世尊重說頌言諸住及佛地唯心無影像此是去來今諸佛之所說七地是有心八地無影像此二地名住餘則我所得自證及清淨此則是我地摩醯最勝處色究竟莊嚴譬如大火聚光焰熾然發化現於三有悅意而清涼或有現變化或有先時化於彼說諸乘皆是如來地十地則為初初則為八地第九則為七第七復為八第二為第三第四為第五第三為第六無相有何次爾時大慧菩薩復白佛言世尊如來應供等正覺為常為無常佛告大慧如來應供等正覺非常非無常謂二俱有過若常者有作主過常者一切外道說作者無所作是故如來常非常非作常有過故若如來無常者有作無常過陰所相相無性陰壞則應斷而如來不斷魏譯爾時聖者大慧菩薩摩訶薩白佛言世尊如來應正遍知為是常耶為無常耶佛告聖者大慧菩薩言大慧如來應正遍知非常非無常何以故二邊有過故大慧有無二邊應有過失大慧若言如來是常法者則同常因大慧以諸外道說言微塵諸因常故非是作法大慧是故不得言如來常以非作法而言常故大慧亦不得言如來無常言無常者即是同於有為作法五陰可見能見法無五陰滅故五陰滅者諸佛如來亦應同滅而佛如來非斷絶法唐譯爾時大慧菩薩摩訶薩復白佛言世尊如來應正等覺為常為無常佛言大慧如來應正等覺非常非無常何以故俱有過故云何有過大慧若如來常者有能作過一切外道說能作常若無常者有所作過同於諸蘊為相所相畢竟無有然佛如來實非斷滅大慧一切所作皆無常如瓶衣等一切皆無常過一切智衆具方便應無義以所作故一切所作皆應是如來無差別因性故是故大慧如來非常非無常魏譯大慧凡作法者皆是無常如瓶衣車屋及席氎等皆是作法是故無常大慧若言一切皆無常者一切智一切智人一切功德亦應無常以同一切作法相故又復有過若言一切皆無常者諸佛如來應是作法而佛如來非是作法以無更說有勝因故是故我言如來非常亦非無常唐譯大慧一切所作如瓶衣等皆是無常是則如來有無常過所修福智悉空無益又諸作法應是如來無異因故是故如來非常非無常復次大慧如來非如虗空常如虗空常者自覺聖智衆具無義過大慧譬如虗空非常非無常離常無常一異俱不俱常無常過故不可說是故如來非常復次大慧若如來無生常者如兔馬等角以無生常過故方便無義以無生常過故如來非常復次大慧更有餘事知如來常所以者何謂無間所得智常故如來常魏譯復次大慧如來非常何以故虗空之性亦無修行諸功德故大慧譬如虗空非常非無常何以故以離常無常故以不墮一異俱不俱有無非有非無常無常非常非無常是故離於一切諸過不可得說復次大慧亦不得言如來是常何以故若言常者同於兔馬駝驢龜蛇蠅魚等角是故不得言如來常復次大慧亦不得言如來是常恐墮不生常故是故不得言如來常復次大慧更有餘法依彼法故得言如來世尊是常何以故依內證智證常法故是故得言如來是常大慧諸佛如來內證智法常恆清涼不變唐譯復次大慧如來非常若是常者應如虗空不待因成大慧譬如虗空非常非無常何以故以離常無常若一若異俱不俱等諸過失故復次大慧如來非常若是常者則是不生同於兔馬魚蛇等角復次大慧以別義故亦得言常何以故謂以現智證常法故證智是常如來亦常大慧若如來出世若不出世法畢定住聲聞緣覺諸佛如來無間住不住虗空亦非愚夫之所覺知大慧如來所得智是般若所熏非心意意識彼諸陰界入處所熏大慧一切三有皆是不實妄想所生如來不從不實虗妄想生大慧以二法故有常無常非不二不二者寂靜一切法無二生相故魏譯大慧諸佛如來應正遍知若出於世不出於世法性常如是法體常如是法軌則常如是以彼法性一切聲聞辟支佛等亦不曾聞亦不曾見如是法體非虗空中毛道凡夫不覺不知大慧諸佛如來內證智者依彼得名大慧以依如實智慧修行得名為佛非心意意識無明五陰熏習得名大慧一切三界不實妄想分別戲論得名大慧不實分別二種法者而得名為常與無常而佛如來不墮二法不墮能取可取二邊如來寂靜二法不生故唐譯大慧諸佛如來所證法性法住法位如來出世若不出世常住不易在於一切二乘外道所得法中非是空無然非凡愚之所能知大慧夫如來者以清淨慧內證法性而得其名非以心意意識蘊界處法妄習得名一切三界皆從虗妄分別而生如來不從妄分別生大慧若有於二有常無常如來無二證一切法無生相故是故如來應供等正覺非常非無常大慧乃至言說分別生則有常無常過分別覺滅者則離愚夫常無常見不寂靜慧者永離常無常非常無常熏魏譯是故大慧諸佛如來應正遍知不得言是常與無常大慧凡所言語而得說言常與無常遠離一切分別盡者不得言取常無常法是故我遮一切凡夫不得分別常與無常以得真實寂靜法者得盡分別不生分別唐譯是故非常亦非無常大慧乃至少有言說分別生即有常無常過是故應除二分別覺勿令少在爾時世尊欲重宣此義而說偈言衆具無義者生常無常過若無分別覺永離常無常從其所立宗則有衆雜義等觀自心量言說不可得魏譯爾時世尊重說偈言離於常無常非常非無常若見如是佛彼不墮惡道若說常無常諸功德虗妄無智者分別遮說常無常所有立法者皆有諸過失若能見唯心彼不墮諸過唐譯爾時世尊重說頌言遠離常無常而現常無常恆如是觀佛不生於惡見若常無常者所集皆無益為除分別覺不說常無常乃至有所立一切皆錯亂若見唯自心是則無違諍
