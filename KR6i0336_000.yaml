front:
  text: 楞伽會譯序此經凡四譯今存者三其一則劉宋求那䟦陀羅譯成四卷曰楞伽阿䟦多羅寶經其二則元魏菩提流支譯成十卷曰入楞伽經其三則唐實叉難陀與復禮等譯成七卷曰大乘入楞伽經盖先佛所說微妙第一真實了義故謂之佛語心品達磨西來以授二祖曰吾有楞伽經四卷可以印心盖宋本也以故其傳獨顯然文字簡古難讀昔法親布衲謂正受禪師曰此聖智境界非麤心者可入子欲入之當有方便正受進曰願聞其說衲曰子試取魏唐二譯十七卷置於宋譯四卷之左右證其神觀參考妍味則可以入是經矣正受如其言盖彌月而疑閡氷釋嗟嗟此會譯之不可已也荊山上人圓珂少遊玉芝聚禪師之門深究楞嚴宗旨已讀楞伽博探三譯妙契心要遂謀諸聚師欲會其句編之未果晚偕陸司空光祖結夏山中商及初願司空謂不若依泐師註本節編之庶無謬戾上人首肯遂成是編首刊宋譯而魏唐附其下名曰楞伽會譯今歲春開講於郡城之天寧寺時余以在告得間預聽席遂募檀信授之剞劂以為天寧常住達磨有言此經五百年後翻為名相之學讀會譯者當直了自心慎勿得指迷月而墮祖師之先見則上人之法施其宏也哉旹明萬曆八年庚辰春佛成道日馮夢禎熏沐和南譔
