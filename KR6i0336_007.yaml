body:
  text: 明臨濟正宗中都沙門員珂會譯一切佛語心品第三之下爾時大慧菩薩復白佛言世尊惟願為說一切法相續義解脫義若善分別一切法相續不相續相我及諸菩薩善解一切相續巧方便不墮如所說義計著相續善於一切諸法相續不相續相及離言說文字妄想覺遊行一切諸佛剎土無量大衆力自在通㹅持之印種種變化光明照耀覺慧善入十無盡句無方便行猶如日月摩尼四大於一切地離自妄想相見見一切法如幻夢等入佛地身於一切衆生界隨其所應而為說法而引導之悉令安住一切諸法如幻夢等離有無品及生滅妄想異言說義其身轉勝魏譯爾時大慧菩薩摩訶薩復白佛言世尊惟願如來應正遍知善說一切諸法相續不相續相惟願善逝說一切法相續不相續相我及一切諸菩薩衆善解諸法相續不相續相善巧方便知已不墮執著諸法相續不相續相離一切法相續不相續言說文字妄想已得力自在神通遊化十方一切諸佛國土大衆之中陀羅尼門善印所印十盡句善縛所縛種種變化光明照耀譬如四大日月摩尼自然而行衆生受用遠離諸地唯自心見分別之相示一切法如幻如夢示入依止諸佛之地於衆生界隨其所應而為說法攝取令住一切諸法如幻如夢離於有無一切朋黨生滅妄想異言說義轉身自在住勝處住唐譯爾時大慧菩薩復白佛言世尊惟願如來為我解說於一切法深密義及解義相令我及諸菩薩摩訶薩善知此法不墮如言取義深密執著離文字語言虗妄分別普入一切諸佛國土力通自在㹅持所印覺慧善住十無盡願以無功用種種變現光明照耀如日月摩尼地水火風住於諸地離分別見知一切法如幻如夢入如來位普化衆生令知諸法虗妄不實離有無品斷生滅執不著言說令轉所依佛告大慧善哉善哉諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧無量一切諸法如所說義計著相續所謂相計著相續緣計著相續性非性計著相續生不生妄想計著相續滅不滅妄想計著相續乘非乘妄想計著相續有為無為妄想計著相續地地自相妄想計著相續自妄想無間妄想計著相續有無品外道依妄想計著相續三乘一乘無間妄想計著相續魏譯佛告聖者大慧菩薩言善哉善哉善哉大慧諦聽諦聽當為汝說大慧白佛言善哉世尊唯然受教佛告大慧一切諸法相續不相續相者謂如相執著相續緣執著相續有無執著相續分別生不生執著相續分別滅不滅執著相續分別乘非乘執著相續分別有為無為執著相續分別地地相執著相續分別自分別執著相續分別有無入外道朋黨執著相續聲聞執著義相續唐譯佛言諦聽當為汝說大慧於一切法如言取義執著深密其數無量所謂相執著緣執著有非有執著生非生執著滅非滅執著乘非乘執著為無為執著地地自相執著自分別現證執著外道宗有無品執著三乘一乘執著復次大慧此及餘凡愚衆生自妄想相續以此相續故凡愚妄想如蠶作繭以妄想絲自纏纏他有無有相續相計著魏譯大慧如是愚癡凡夫無量異心分別相續依此相續愚癡分別如蠶作繭依自心見分別綖相續樂於和合自纏纏他執著有無和合相續唐譯大慧此等密執有無量種皆是凡愚自分別執而密執著此諸分別如蠶作繭以妄想絲自纏纏他執著有無欲樂堅密復次大慧彼中亦無相續及不相續相見一切法寂靜妄想不生故菩薩摩訶薩見一切法寂靜復次大慧覺外性非性自心現相無所有隨順觀察自心現量有無一切性無相見相續寂靜故於一切法無相續不相續相復次大慧彼中無有若縛若解餘墮不如實覺知有縛有解所以者何謂於一切法有無有無衆生可得故魏譯大慧然無相續無相續相以見諸法寂靜故大慧以諸菩薩見一切法無分別相是故名見一切菩薩寂靜法門復次大慧如實能知外一切法離於有無如實覺知自心見相以入無相自心相故大慧以見分別有無法故名為相續以見諸法寂靜故名無相續無相續無相續諸法相大慧無縛無脫墮於二見自心分別有縛有脫何以故以不能知諸法有無故唐譯大慧此中實無密非密相以菩薩摩訶薩見一切法住寂靜故無分別故若了諸法唯心所見無有外物皆同無相隨順觀察於若有若無分別密執悉見寂靜是故無有密非密相大慧此中無縛亦無有解不了實者見縛解耳何以故一切諸法若有若無求其體性不可得故復次大慧愚夫有三相續謂貪恚癡及愛未來有喜愛俱以此相續故有趣相續彼相續者續五趣大慧相續斷者無有相續不相續相復次大慧三和合緣作方便計著識相續無間生方便計著則有相續三和合緣識斷見三解脫一切相續不生魏譯復次大慧愚癡凡夫有三種相續何等為三謂貪瞋癡及愛樂生以此相續故有後生大慧相續者衆生相續生於五道大慧斷相續者無相續無相續相復次大慧執著因緣相續故生於三有以諸識展轉相續不斷見三解脫門轉滅執著三有因識名斷相續唐譯復次大慧愚癡凡夫有三種密縛謂貪恚癡及愛來生與貪喜俱以此密縛令諸衆生續生五趣密縛若斷是則無有密非密相復次大慧若有執著三和合緣諸識密縛次第而起有執著故則有密縛若見三解脫離三和合識一切諸密皆悉不生爾時世尊欲重宣此義而說偈言不真實妄想是說相續相若知彼真實相續網則斷於諸性無知隨言說攝受譬如彼蠶蟲結網而自纏愚夫妄想縛相續不觀察魏譯爾時世尊重說偈言不實妄分別名為相續相能如實知彼相續網則斷若取聲為實如蠶繭自縛自心妄想縛凡夫不能知唐譯爾時世尊重說頌言不實妄分別是名為密相若能如實知諸密網皆斷凡愚不能了隨言而取義譬如蠶處繭妄想自纏縛大慧復白佛言如世尊所說以彼彼妄想妄想彼彼性非有彼自性但妄想自性耳世尊若但妄想自性非性自性相待者非為世尊如是說煩惱清淨無性過耶一切法妄想自性非性故魏譯大慧菩薩復白佛言如世尊說以何等何等分別心分別何等何等法而彼彼法無彼如是如是體相唯自心分別世尊若唯自心分別非彼法相者如世尊說一切諸法應無染淨何以故如來說言一切諸法妄分別見無實體故唐譯爾時大慧菩薩摩訶薩復白佛言世尊如世尊說由種種心分別諸法非諸法有自性此但妄計耳世尊若但妄計無諸法者染淨諸法將無悉壞佛告大慧如是如是如汝所說大慧非如愚夫性自性妄想真實此妄想自性非有性自性相然魏譯佛告大慧如是如是如汝所說大慧而諸一切愚癡凡夫分別諸法而彼諸法無如是相虗妄分別以為實有大慧彼是凡夫虗妄分別諸法體相虗妄覺知非如實見唐譯佛言大慧如是如是如汝所說一切凡愚分別諸法而諸法性非如是有此但妄執無有性相大慧如聖智有性自性聖知聖見聖慧眼如是性自性知大慧白佛言若使如聖以聖知聖見聖慧眼非天眼非肉眼性自性如是知非如愚夫妄想世尊云何愚夫離是妄想不覺聖性事故世尊彼亦非顛倒非不顛倒所以者何謂不覺聖事性自性故不見離有無相故魏譯大慧如聖人知一切諸法自體性相依聖人智依聖人見依聖慧眼是如實知諸法自體相大慧菩薩言世尊世尊如諸聖人等依聖智依聖見依聖慧眼非肉眼天眼覺知一切諸法體相無如是相非如凡夫虗妄分別世尊云何愚癡凡夫轉虗妄相佛告大慧能如實覺知聖人境界轉虗妄識世尊彼癡凡夫非顛倒見非不顛倒見何以故以不能見聖人境界如實法體故以見轉變有無相故唐譯然諸聖者以聖慧眼如實知見有諸法自性大慧白言若諸聖人以聖慧眼見有諸法性非天眼肉眼不同凡愚之所分別云何凡愚得離分別不能覺了諸聖法故世尊彼非顛倒非不顛倒何以故不見聖人所見法故聖眼遠離有無相故世尊聖亦不如是見如事妄想不以自相境界為境界故世尊彼亦性自性相妄想自性如是現不說因無因故謂墮性相見故異境界非如彼等如是無窮過世尊不覺性自性相故世尊亦非妄想自性因性自性相彼云何妄想非妄想如實知妄想魏譯大慧白佛言世尊一切聖人亦有分別一切種種諸事無如是相以自心見境界相故世尊彼諸聖人見有法體分別法相以世尊不說有因不說無因何以故以墮有法相故餘人見境不如是見世尊如是說者有無窮過何以故以不覺知所有法相無自體相故世尊非因分別有法體相而有諸法世尊彼云何分別不如彼分別應如彼分別唐譯聖亦不如凡所分別如是得故非自所行境界相故彼亦見有諸法性相如妄執性而顯現故不說有因及無因故墮於諸法性相見故世尊其餘境界既不同此如是則成無窮之失孰能於法了知性相世尊諸法性相不因分別云何而言以分別故而有諸法世尊妄想異自性相異世尊不相似因妄想自性相彼云何各各不妄想而愚夫不如實知然為衆生離妄想故說如妄想相不如實有世尊何故遮衆生有無有見事自性計著聖智所行境界計著墮有見說空法非性而說聖智自性事魏譯世尊分別相異相自體相異相世尊而彼二種因不相似彼彼分別法體相異云何凡夫如此分別此因不成如彼所見世尊說言我為斷諸一切衆生虗妄分別心故作如是說如彼凡夫虗妄分別無如是法世尊何故遮諸衆生有無見事而執著實法聖智境界世尊復令一切衆生墮無見處何以故以言諸法寂靜無相聖智法體如是無相故唐譯世尊分別相異諸法相異因不相似云何諸法而由分別復以何故凡愚分別不如是有而作是言為令衆生捨分別故說如分別所見法相無如是法世尊何故令諸衆生離有無見所執著法而復執著聖智境界墮於有見何以故不說寂靜空無之法而說聖智自性事故佛告大慧非我說空法非性亦不墮有見說聖智自性事然為令衆生離恐怖句故衆生無始以來計著性自性相聖智事自性計著相見說空法大慧我不說性自性相大慧但我住自得如實空法離惑亂相見離自心現性非性見得三解脫如實印所印於性自性得緣自覺觀察住離有無事見相魏譯佛告大慧我不說言一切諸法寂靜無相亦不說言諸法悉無亦不令其墮於無見亦令不著一切聖人境界如是何以故我為衆生離驚怖處故以諸衆生無始世來執著實有諸法體相是故我說聖人知法體相實有復說諸法寂靜無相大慧我不說言法體有無我說自身如實證法以聞我法修行寂靜諸法無相得見真如無相境界入自心見法遠離見外諸法有無得三解脫門得已以如實印善印諸法自身內證智慧觀察離有無見唐譯佛言大慧我非不說寂靜空法墮於有見何以故已說聖智自性事故我為衆生無始時來計著於有於寂靜法以聖事說令其聞已不生恐怖能如實證寂靜空法離惑亂相入唯識理知其所見無有外法悟三脫門獲如實印見法自性了聖境界遠離有無一切諸著復次大慧一切法不生者菩薩摩訶薩不應立是宗所以者何謂宗一切性非性故及彼因生相故說一切法不生宗彼宗則壞彼宗一切法不生彼宗壞者以宗有待而生故又彼宗不生入一切法故不壞相不生故立一切法不生宗者彼說則壞大慧有無不生宗彼宗入一切性有無相不可得大慧若使彼宗不生一切性不生而立宗如是彼宗壞以有無性相不生故不應立宗五分論多過故展轉因異相故及為作故不應立宗分謂一切法不生如是一切法空如是一切法無自性不應立宗魏譯復次大慧菩薩不應建立諸法不生何以故以建立法同諸法有若不爾者同諸法無復次大慧建立諸法有故說一切法於建立法中同何以故以彼建立不同一切法不生是故建立說一切法是言自破何以故以建立中無彼建立若不爾者彼建立亦不生以同諸法無差別相故是故建立諸法不生名為自破以彼建立三法五法和合有故離於建立有無不生大慧彼建立入諸法中不見有無法故大慧若彼建立諸法不生而作是言一切不生大慧如是說者建立則破何以故離於建立有無相不可得故大慧是故不應建立諸法不生大慧以彼建立同彼一切不生法體是故不應建立諸法不生以有多過故大慧復有不應建立諸法不生何以故以三法五法彼彼因不同故大慧復有不應建立諸法不生何以故三法五法作有為無常故是故不應建立一切諸法不生如是不應建立一切法空一切諸法無實體相唐譯復次大慧菩薩摩訶薩不應成立一切諸法皆悉不生何以故一切法本無有故及彼宗因生相故復次大慧一切法不生此言自壞何以故彼宗有待而生故又彼宗即入一切法中不生相亦不生故又彼宗諸分而成故又彼宗有無法皆不生此宗即入一切法中有無相亦不生故是故一切法不生此宗自壞不應如是立諸分多過故展轉因異相故如不生一切法空無自性亦如是大慧然菩薩摩訶薩說一切法如幻夢現不現相故及見覺過故當說一切法如幻夢性除為愚夫離恐怖句故大慧愚夫墮有無見莫令彼恐怖遠離摩訶衍魏譯大慧而諸菩薩為衆生說一切諸法如幻如夢以見不見相故以諸法相迷惑見智故是故應說如幻如夢除遮一切愚癡凡夫離驚怖處大慧以諸凡夫墮在有無邪見中故以凡夫聞如幻如夢生驚怖故諸凡夫聞生驚怖已遠離大乘唐譯大慧菩薩摩訶薩應說一切法如幻如夢見不見故一切皆是惑亂相故除為愚夫而生恐怖大慧凡夫愚癡墮有無見莫令於彼而生驚恐遠離大乘爾時世尊欲重宣此義而說偈言無自性無說無事無相續彼愚夫妄想如死尸惡覺一切法不生非彼外道宗至竟無所生性緣所成就一切法不生慧者不作想彼宗因生故覺者悉除滅魏譯爾時世尊重說偈言無自體無識無阿黎耶識愚癡妄分別邪見如死尸一切法不生餘見識不成諸法畢不生因緣不能成一切法不生莫建如是法因不同不成是故建立壞唐譯爾時世尊重說頌言無自性無說無事無依處凡愚妄分別惡覺如死尸一切法不生外道所成立以彼所有生非緣所成故一切法不生智者不分別彼宗因生故此覺則便壞譬如翳目視妄見垂𩬊相計著性亦然愚夫邪妄想施設於三有無有事自性施設事自性思惟起妄想相事設言教意亂極震掉佛子能超出遠離諸妄想魏譯譬如目有翳虗妄見毛輪分別於有無凡夫虗妄見三有唯假名無有實法體執假名為實凡夫起分別相事及假名心意所受用佛子能遠離住寂境界行唐譯譬如目有翳妄想見毛輪諸法亦如是凡愚妄分別三有唯假名無有實法體由此假施設分別妄計度假名諸事相動亂於心識佛子悉超過遊行無分別非水水想受斯從渴愛生愚夫如是惑聖見則不然聖人見清淨三脫三昧生遠離於生滅遊行無所有修行無所有亦無性非性性非性平等從是生聖果魏譯無水取水相諸獸癡妄心凡夫見法爾聖人則不然聖人見清淨三脫三昧生遠離於生滅得無障寂靜修行無所有亦復不見無有無法平等是故生聖果唐譯無水取水相斯由渴愛起凡愚見法爾諸聖則不然聖人見清淨生於三解脫遠離於生滅常行無相境修行無相境亦復無有無有無悉平等是故生聖果云何性非性云何為平等謂彼心不知內外極漂動若能壞彼者心則平等見魏譯有無法云何云何成平等以心不能見內外法無常若能滅彼法見心成平等唐譯云何法有無云何成平等若心不了法內外斯動亂了已則平等亂相爾時滅爾時大慧菩薩復白佛言世尊如世尊說如攀緣事智慧不得是施設量建立施設所攝受非性攝受亦非性以無攝故智則不生唯施設名耳魏譯爾時聖者大慧菩薩白佛言世尊如世尊說智慧觀察不能見前境界諸法爾時善知唯是內心心意意識如實覺知無法可取亦無能取是故智亦不能分別而取唐譯爾時大慧菩薩摩訶薩復白佛言世尊如佛所說若知境界但是假名都不可得則無所取無所取故亦無能取能取所取二俱無故不起分別說名為智云何世尊為不覺性自相共相異不異故智不得耶為自相共相種種性自性相隱蔽故智不得耶為山巖石壁地水火風障故智不得耶為極遠極近故智不得耶為老小盲冥諸根不具故智不得耶世尊若不覺自共相異不異智不得者不應說智應說無智以有事不得故若復種種自共相性自性相隱蔽故智不得者彼亦無智非是智世尊有爾𦦨故智生非無性會爾焰故名為智若山巖石壁地水火風極遠極近老小盲冥諸根不具智不得者此亦非智應是無智以有事不可得故魏譯世尊若言智慧不能取者為見諸法自相同相異異法相種種異法體不同故智不能知為見諸法種種體相不可異故智不能知為是山岩石壁墻幕樹林草木地水火風之所障故智不能知為是極遠極近處故智不能知為是老小為是盲冥諸根不具智不能知世尊若一切法異異法相異異法體自相同相種種不同故智不能知者世尊若爾彼智非智何以故不能知前實境界故世尊若一切法種種體相自相同相不見異故智不能知者若爾彼智不得言智何以故實有境界不能知故世尊有前境界如實能見名之為智若為山岩石壁墻幕樹林草木地水火風極遠極近老小盲冥諸根不具不能知見者彼智無智有實境界而不知故唐譯世尊何故彼智不得於境為不能了一切諸法自相共相一異義故言不得耶為以諸法自相共相種種不同更相隱蔽而不得耶為山岩石壁簾幔帷障之所覆隔而不得耶為極遠極近老小盲冥諸根不具而不得耶若不了諸法自相共相一異義故言不得者此不名智應是無智以有境界而不知故若以諸法自相共相種種不同更相隱蔽而不得者此亦非智以知於境說名為智非不知故若山巖石壁簾幔帷障之所覆隔極遠極近老小盲冥而不知者彼亦非智以有境界智不具足而不知故佛告大慧不如是無智應是智非非智我不如是隱覆說攀緣事智慧不得是施設量建立覺自心現量有無有外性非性知而事不得不得故智於爾焰不生順三解脫智亦不得非妄想者無始性非性虗僞習智作如是知是知彼不知魏譯佛告大慧如汝所說言無智者是義不然何以故有實智故大慧我不依汝如是之說境界是無唯自心見我說不覺唯是自心見諸外物以為有無是故智慧不見境界智不見者不行於心是故我說入三解脫門智亦不見而諸凡夫無始世來虗妄分別依戲論熏習熏彼心故如是分別唐譯佛言大慧此實是智非如是說我之所說非隱覆說我言境界唯是假名不可得者以了但是自心所見外法有無智慧於中畢竟無得以無得故爾焰不起入三脫門智體亦忘非如一切覺想凡夫無始以來戲論熏習故於外事處所相性無性妄想不斷自心現量建立說我我所相攝受計著不覺自心現量於智爾焰而起妄想妄想故外性非性觀察不得依於斷見魏譯見外境界形相有無為離如是虗妄心故說一切法唯自心見執著我我所故不能覺知但是自心虗妄分別是智是境界分別是智是境界故觀察外法不見有無墮於斷見唐譯計著外法若有若無種種形相如是而知名為不知不了諸法唯心所見著我我所分別境智不知外法是有是無其心住於斷見中故為令捨離如是分別說一切法唯心建立爾時世尊欲重宣此義而說偈言有諸攀緣事智慧不觀察此無智非智是妄想者說於不異相性智慧不觀察障礙及遠近是名為邪智老小諸根冥而智慧不生而實有爾焰是亦說邪智魏譯爾時世尊重說偈言有諸境界事智慧不能見彼無智非智虗妄見者說言諸法無量是智不能知障礙及遠近是妄智非智老小諸根冥不能生智慧而實有境界彼智非實智唐譯爾時世尊重說頌言若有於所緣智慧不觀見彼無智非智是名妄計著無邊相互隱障礙及遠近智慧不能見是名為邪智老小諸根冥而實有境界不能生智慧是名為邪智復次大慧愚癡凡夫無始虗僞惡邪妄想之所回轉回轉時自宗通及說通不善了知著自心現外性相故著方便說於自宗四句清淨通相不善分別大慧白佛言誠如尊教惟願世尊為我分別說通及宗通我及餘菩薩摩訶薩善於二通來世凡夫聲聞緣覺不得其短魏譯復次大慧愚癡凡夫依無始身戲論煩惱分別煩惱幻化之身建立自法執著自心見外境界執著名字章句言說而不能知建立正法不修正行離四種句清淨之法大慧菩薩言如是如是如是世尊如世尊說世尊為我說所說法建立法相我及一切諸菩薩等於未來世善知建立說法之相不迷外道邪見聲聞辟支佛不正見法唐譯復次大慧愚癡凡夫無始虗僞惡邪分別之所幻惑不了如實及言說法計心外相著方便說不能修習清淨真實離四句法大慧白言如是如是誠如尊教願為我說如實之法及言說法令我及諸菩薩摩訶薩於此二法而得善巧非外道二乘之所能入佛告大慧善哉善哉諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧三世如來有二種法通謂說通及自宗通說通者謂隨衆生心之所應為說種種衆具契經是名說通自宗通者謂修行者離自心現種種妄想謂不墮一異俱不俱品超度一切心意意識自覺聖境界離因成見相一切外道聲聞緣覺墮二邊者所不能知我說是名自宗通法大慧是名自宗通及說通相汝及餘菩薩摩訶薩應當修學魏譯佛告大慧菩薩言善哉善哉善哉大慧諦聽諦聽我為汝說大慧言善哉世尊唯然受教佛告大慧有二種過去未來現在如來應正遍知所說法何等為二一者建立說法相二者建立如實法相大慧何者建立說法相謂種種功德修多羅優波提舍隨衆生信心而為說法大慧是名建立說法相大慧何者建立如實法相謂依何等法而修正行遠離自心虗妄分別諸法相故不墮一異俱不俱朋黨聚中離心意意識內證聖智所行境界離諸因緣相應見相離一切外道邪見離諸一切聲聞辟支佛見離於有無二朋黨見大慧是名建立如實法相大慧汝及諸菩薩應當修學唐譯佛言諦聽當為汝說大慧三世如來有二種法謂言說法及如實法言說法者謂隨衆生心為說種種諸方便教如實法者謂修行者於心所現離諸分別不墮一異俱不俱品超度一切心意意識於自覺聖智所行境界離諸因緣相應見相一切外道聲聞緣覺墮二邊者所不能知是名如實法此二種法汝及諸菩薩摩訶薩當善修學爾時世尊欲重宣此義而說偈言我謂二種通宗通及言說說者授童蒙宗為修行者魏譯爾時世尊重說偈言我建立二種說法如實法依名字說法為實修行者唐譯爾時世尊重說頌言我說二種法言教及如實教法示凡夫實為修行者爾時大慧菩薩白佛言世尊如世尊一時說言世間諸論種種辨說慎勿習近若習近者攝受貪欲不攝受法世尊何故作如是說佛告大慧世間言論種種句味因緣譬喻採集莊嚴誘引誑惑愚癡凡夫不入真實自通不覺一切法妄想顛倒墮於二邊凡愚癡惑而自破壞諸趣相續不得解脫不能覺知自心現量不離外性自性妄想計著是故世間言論種種辨說不脫生老病死憂悲苦惱誑惑迷亂魏譯爾時聖者大慧菩薩復白佛言世尊如來應正遍知一時說言盧伽耶陀種種辨說若有親近供養彼人攝受欲食不攝法食世尊何故說言盧伽耶陀種種辨說親近供養攝受欲食不攝法食佛告大慧盧伽耶陀種種辨才巧妙辭句迷惑世間不依如法說不依如義說但隨世間愚癡凡夫情所樂故說世俗事但有巧辭言章美妙失於正義大慧是名盧伽耶陀種種辨才樂說之過大慧盧伽耶陀如是辨才但攝世間愚癡凡夫非入如實法相說法自不覺知一切法故墮於二邊邪見聚中自失正道亦令他失是故不能離於諸趣以不能見唯是自心分別執著外法有相是故不離虗妄分別大慧是故我說盧伽耶陀雖有種種巧妙辨才樂說諸法失正理故不得出離生老病死憂悲苦惱一切苦聚以依種種名字章句譬喻巧說迷誑人故唐譯爾時大慧菩薩摩訶薩復白佛言世尊如來一時說盧伽耶陀呪術詞論但能攝取世間財利不得法利不應親近承事供養世尊何故作如是說佛言大慧盧伽耶陀所有詞論但飾文句誑惑凡愚隨順世間虗妄言說不如於義不稱於理不能證入真實境界不能覺了一切諸法恆墮二邊自失正道亦令他失輪回諸趣永不出離何以故不了諸法唯心所見執著外境增分別故是故我說世論文句因喻莊嚴但誑愚夫不能解脫生老病死憂悲等患大慧釋提桓因廣解衆論自造聲論彼世論者有一弟子持龍形像詣釋天宮建立論宗要壞帝釋千輻之輪隨我不如斷一一頭以謝所屈作是要已即以釋法摧伏帝釋釋墮負處即壞其車還來人間如是大慧世間言論因譬莊嚴乃至畜生亦能以種種句味惑彼諸天及阿修羅著生滅見而況於人是故大慧世間言論應當遠離以能招致苦生因故慎勿習近魏譯大慧釋提桓因廣解諸論自造聲論彼盧伽耶陀有一弟子證世間通詣帝釋天宮建立論法而作是言憍尸迦我共汝說與汝論義若不如者要受屈伏令諸一切天人知見即共立要我若勝汝要當打汝千輻輪碎我若不如從頭至足節節分解以謝於汝作是要已盧伽耶陀弟子現作龍身共釋提桓因論義以其論法即能勝彼釋提桓因令其屈伏即於天中打千輻輪車碎如微塵還下人間大慧盧伽耶陀婆羅門如是種種譬喻相應乃至現畜生身依種種名字迷惑世間天人阿修羅以諸世間一切衆生執著生滅法故何況於人大慧以是義故應當遠離盧伽耶陀婆羅門以因彼說能生苦聚故是故不應親近供養恭敬咨請盧伽耶陀婆羅門唐譯大慧釋提桓因廣解衆論自造諸論彼世論者有一弟子現作龍身詣釋天宮而立論宗作是要言憍尸迦我共汝論汝若不如我當破汝千輻之輪我若不如斷一一頭以謝所屈說是語已即以論法摧伏帝釋壞千輻輪還來人間大慧世間言論因喻莊嚴乃至能現畜生之形以妙文詞迷惑諸天及阿修羅令其執著生滅等見而況於人是故大慧不應親近承事供養以彼能作生苦因故大慧世論者唯說身覺境界而已大慧彼世論者乃有百千但於後時後五百年當破壞結集惡覺因見盛故惡弟子受如是大慧世論破壞結集種種句味因譬莊嚴說外道事著自因緣無有自通大慧彼諸外道無自通論於餘世論廣說無量百千事門無有自通亦不自知愚癡世論魏譯大慧盧伽耶陀婆羅門所說之法但見現前身智境界依世名字說諸邪法大慧盧伽耶陀婆羅門所造之論有百千偈後世末世分為多部各各異名依自心見因所造故大慧盧伽耶陀婆羅門無有弟子能受其論是故後世分為多部種種異名大慧諸外道等內心無有如實解故依種種因種種異解隨自心造而為人說執著自在因等故大慧一切外道所造論中無如是法唯是一切盧伽耶陀種種因門說百千萬法而彼不知是盧伽耶陀唐譯大慧世論唯說身覺境界大慧彼世論有百千字句後末世中惡見乖離邪衆崩散分成多部各執自因大慧非餘外道能立教法唯盧迦耶以百千句廣說無量差別因相非如實理亦不自知是惑世法爾時大慧白佛言世尊若外道世論種種句味因譬莊嚴無有自通自事計著者世尊亦說世論為種種異方諸來會衆天人阿修羅廣說無量種種句味亦非自通耶亦入一切外道智慧言說數耶佛告大慧我不說世論亦無來去唯說不來不去大慧來者趣聚會生去者散壞不來不去者是不生不滅我所說義不墮世論妄想數中所以者何謂不計著外性非性自心現處二邊妄想所不能轉相境非性覺自心現則自心現妄想不生妄想不生者空無相無作入三脫門名為解脫魏譯大慧菩薩白佛言世尊若一切外道唯說盧伽耶陀依於世間種種名字章句譬喻執著諸因者世尊十方一切國土衆生天人阿修羅集如來所如來亦以世間種種名字章句譬喻說法不說自身內智證法若爾亦同一切外道所說不異佛告大慧我不說於盧伽耶陀亦不說言諸法不來不去大慧我說諸法不來不去大慧何者名來大慧所言來者名為生聚以和合生故大慧何者名去大慧所言去者名之為滅大慧我說不去不來名為不生大慧我說不同諸外道法何以故以不執著外物有無唯建立說於自心見故不住二處不行分別諸相境界故以如實知自心見故不生自心分別見故以不分別一切相者而能入空無相無願三解脫門名為解脫唐譯爾時大慧白言世尊若盧迦耶所造之論種種文字因喻莊嚴執著自宗非如實法名外道者世尊亦說世間之事謂以種種文句言詞廣說十方一切國土天人等衆而來集會非是自智所證之法世尊亦同外道說耶佛言大慧我非世說亦無來去我說諸法不來不去大慧來者集生去者壞滅不來不去此則名為不生不滅大慧我之所說不同外道墮分別中何以故外法有無無所著故了唯自心不見二取不行根境不生分別入空無相無願之門而解脫故大慧我念一時於一處住有世論婆羅門來詣我所不請空間便問我言瞿曇一切所作耶我時報言婆羅門一切所作是初世論彼復問言一切非所作耶我