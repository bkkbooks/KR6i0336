亦世論婆羅門乃至少有心識流動分別外境皆是世論大慧爾時彼婆羅門復問我言頗有非是世論者不一切外道所有詞論種種文句因喻莊嚴莫不皆從我法中出我報言有非汝所許非世不許非不說種種文句義理相應非不相應彼復問言豈有世許非世論耶我答言有但非於汝及以一切外道能知何以故以於外法虗妄分別生執著故若能了達有無等法一切皆是自心所見不生分別不取外境於自處住自處住者是不起義不起於何不起分別此是我法非汝有也婆羅門略而言之隨何處中心識往來死生求戀若受若見若觸若住取種種相和合相續於受於因而生計著皆汝世論非是我法大慧世論婆羅門作如是問我如是答不問於我自宗實法默然而去作是念言沙門瞿曇無可尊重說一切法無生無想無因無緣唯是自心分別所見若能了此分別不生大慧此即是汝向所問我何故說習近世論種種辨說攝受貪欲不攝受法大慧白佛言世尊攝受貪欲及法有何句義佛告大慧善哉善哉汝乃能為未來衆生思惟咨問如是句義諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧所謂貪者若取若捨若觸若味繫著外塵墮二邊見復生苦陰生老病死憂悲苦惱如是諸患皆從愛起斯由習近世論及世論者我及諸佛說名為貪是名攝受貪欲不攝受法魏譯大慧汝今問我何故盧伽耶陀種種辨說親近供養恭敬彼人但攝欲味不攝法味大慧白佛言世尊何者名食句義何者名法句義佛告大慧善哉善哉善哉大慧汝能為於未來衆生咨問如來如是二義善哉大慧諦聽諦聽我為汝說大慧白佛言善哉世尊唯然受教佛告大慧何者為食謂食味觸味樂求方便巧諂著味執著外境如是等法名異義一以不能入無二境界法門義故復次大慧名為食者依於邪見生陰有支不離生老病死憂悲苦惱愛生於有如是等法名之為食是故我及一切諸佛說彼親近供養盧伽耶陀婆羅門者名得食味不得法味唐譯大慧汝今亦復問我是義何故親近諸世論者唯得財利不得法利大慧白言所言財法是何等義佛言善哉汝乃能為未來衆生思惟是義諦聽諦聽當為汝說大慧所言財者可觸可受可取可味令著外境墮在二邊增長貪愛生老病死憂悲苦惱我及諸佛說名財利親近世論之所獲得大慧云何攝受法謂善覺知自心現量見人無我及法無我相妄想不生善知上上地離心意意識一切諸佛智慧灌頂具足攝受十無盡句於一切法無開發自在是名為法所謂不墮一切見一切虗僞一切妄想一切性一切二邊大慧多有外道癡人墮於二邊若常若斷非黠慧者受無因論則起常見外因壞因緣非性則起斷見大慧我不見生住滅故說名為法大慧是名貪欲及法汝及餘菩薩摩訶薩應當修學魏譯大慧何者為法味謂如實能知二種無我以見人無我法無我相是故不生分別之相如實能知諸地上上智故爾時能離心意意識入諸佛智受位之地攝取一切諸句盡處如實能知一切諸佛自在之處名為法味不墮一切邪見戲論分別二邊大慧外道說法多令衆生墮於二邊不令智者墮於二邊何以故大慧諸外道等多說斷常以無因故墮於常見見因滅故墮於斷見大慧我說如實見不著生滅是故我說名為法味大慧是名我說食味法味大慧汝及諸菩薩摩訶薩當學此法唐譯云何法利謂了法是心見二無我不取於相無有分別善知諸地離心意識一切諸佛所共灌頂具足受行十無盡願於一切法悉得自在是名法利以是不墮一切諸見戲論分別常斷二邊大慧外道世論令諸癡人墮在二邊謂常及斷受無因論則起常見以因壞滅則生斷見我說不見生住滅者名得法利是名財法二差別相汝及諸菩薩摩訶薩應勤觀察爾時世尊欲重宣此義而說偈言一切世間論外道虗妄說妄見作所作彼則無自宗唯我一自宗離於作所作為諸弟子說遠離諸世論心量不可見不觀察二心攝所攝非性斷常二俱離乃至心流轉是則為世論妄想不轉者是人見自心來者謂事生去者事不現明了知去來妄想不復生有常及無常所作無所作此世他世等斯皆世論通魏譯爾時世尊重說偈言我攝取衆生依戒降諸惡智慧滅邪見三解脫增長外道虗妄說皆是世俗論以邪見因果無正見立論我立建立法離虗妄因見為諸弟子說離於世俗法唯心無外法以無二邊心能取可取法離於斷常見但心所行處皆是世俗論若能觀自心不見諸虗妄來者見因生去者見果滅如實知去來不分別虗妄常無常及作不作彼此物如是等諸法皆是世俗論唐譯爾時世尊重說頌言調伏攝衆生以戒降諸惡智慧滅諸見解脫得增長外道虗妄說皆是世俗論橫計作所作不能自成立唯我一自宗不著於能所為諸弟子說令離於世論能取所取法唯心無所有二種皆心現斷常不可得乃至心流動是則為世論分別不起者是人見自心來者見事生去者事不現明了知來去不起於分別有常及無常所作無所作此世他世等皆是世論法爾時大慧菩薩復白佛言世尊所言涅槃者說何等法名為涅槃而諸外道各起妄想佛告大慧諦聽諦聽善思念之當為汝說如諸外道妄想涅槃非彼妄想隨順涅槃大慧白佛言唯然受教佛告大慧或有外道陰界入滅境界離欲見法無常心心法品不生不念去來現在境界諸受陰盡如燈火滅如種子壞妄想不生斯等於此作涅槃想大慧非以見壞名為涅槃魏譯爾時聖者大慧菩薩白佛言世尊如來所言涅槃涅槃者以何等法名為涅槃而諸外道各各虗妄分別涅槃佛告大慧菩薩言善哉善哉善哉大慧諦聽諦聽當為汝說諸外道等虗妄分別涅槃之相如彼外道所分別者無是涅槃大慧白佛言善哉世尊唯然受教佛告大慧有諸外道厭諸境界見陰界入滅諸法無常心心數法不生現前以不憶念過去未來現在境界諸陰盡處如燈焰滅種壞風止不取諸相妄想分別名為涅槃大慧而彼外道見如是法生涅槃心非見滅故名為涅槃唐譯爾時大慧菩薩摩訶薩復白佛言世尊佛說涅槃說何等法以為涅槃而諸外道種種分別佛言大慧如諸外道分別涅槃皆不隨順涅槃之相諦聽諦聽當為汝說大慧或有外道言見法無常不貪境界蘊界處滅心心所法不現在前不念過現未來境界如燈盡如種敗如火滅諸取不起分別不生起涅槃想大慧非以見壞名為涅槃大慧或以從方至方名為解脫境界想滅猶如風止或復以覺所覺見壞名為解脫或見常無常作解脫想或見種種相想招致苦生因思惟是已不善覺知自心現量怖畏於相而見無相深生愛樂作涅槃想魏譯大慧或有外道從方至方名為涅槃大慧復有外道分別諸境如風是故分別名為涅槃大慧復有外道作如是說不見能見所見境界生滅名為涅槃復次大慧復有外道作如是說不見分別見常無常名為涅槃復次大慧復有外道作如是言分別見諸種種異相能生諸苦以自心見虗妄分別一切諸相怖畏諸相見於無相深心愛樂生涅槃想唐譯或謂至方名得涅槃境界想離猶如風止或謂不見能覺所覺名為涅槃或謂不起分別常無常見名得涅槃或有說言分別諸相發生於苦而不能知自心所現以不知故怖畏於相以求無相深生愛樂執為涅槃或有覺知內外諸法自相共相去來現在有性不壞作涅槃想或謂我人衆生壽命一切法壞作涅槃想或以外道惡燒智慧見自性及士夫彼二有間士夫所出名為自性如冥初比求那轉變求那是作者作涅槃想或謂福非福盡或謂諸煩惱盡或謂智慧或見自在是真實作死生者作涅槃想魏譯復次大慧復有外道見一切法自相同相不生滅想分別過去未來現在諸法是有名為涅槃復次大慧復有外道見我人衆生壽命壽者諸法不滅虗妄分別名為涅槃復次大慧有餘外道無智慧故分別所見自性人命轉變分別轉變名為涅槃復次大慧有餘外道說如是言罪盡故福德亦盡名為涅槃復次大慧有餘外道言煩惱盡依智故名為涅槃復次大慧有餘外道說如是言見自在天造作衆生虗妄分別名為涅槃唐譯或謂覺知內外諸法自相共相去來現在有性不壞作涅槃想或計我人衆生壽命及一切法無有壞滅作涅槃想復有外道無有智慧計有自性及以士夫求那轉變作一切物以為涅槃或有外道計福非福盡或計不由智慧諸煩惱盡或計自在是實作者以為涅槃或謂展轉相生生死更無餘因如是即是計著因而彼愚癡不能覺知以不知故作涅槃想或有外道言得真諦道作涅槃想或見功德功德所起和合一異俱不俱作涅槃想或見自性所起孔文彩種種雜寶及利刺等性見已作涅槃想魏譯復次大慧有餘外道言諸衆生迭共因生非餘因作如彼外道執著於因不知不覺愚癡暗鈍虗妄分別名為涅槃復次大慧有餘外道說證諦道虗妄分別名為涅槃復次大慧有餘外道作如是言有作所作而共和合見一異俱不俱虗妄分別名為涅槃復次大慧有餘外道言一切法自然而生猶如幻師出種種形像見種種寶棘刺等物自然而生虗妄分別名為涅槃唐譯或謂衆生展轉相生以此為因更無異因彼無智故不能覺了以不了故執為涅槃或計證於諦道虗妄分別以為涅槃或計求那與求那者而共和合一性異性俱及不俱執為涅槃或計諸物從自然生孔文彩棘針銛利生寶之處出種種寶如此等事是誰能作即執自然以為涅槃大慧或有覺二十五真實或王守護國受六德論作涅槃想或見時是作者時節世間如是覺者作涅槃想或謂性或謂非性或謂知性非性或見有覺與涅槃差別作涅槃想魏譯復次大慧有餘外道言諸萬物皆是時作覺知唯時虗妄分別名為涅槃復次大慧有餘外道言見有物見無物見有無物如是分別名為涅槃唐譯或謂能解二十五諦即得涅槃或有說言能受六分守護衆生斯得涅槃或有說言時生世間時即涅槃或執有物以為涅槃或計無物以為涅槃或有計著有物無物為涅槃者或計諸物與涅槃無別作涅槃想有如是比種種妄想外道所說不成所成智者所棄大慧如是一切悉墮二邊作涅槃想如是等外道涅槃妄想彼中都無若生若滅大慧彼一一外道涅槃彼等自論智慧觀察都無所立如彼妄想心意來去漂馳流動一切無有得涅槃者魏譯大慧復有諸外道等邪見覺觀而說諸論不與如實正法相應而諸智者遠離訶責大慧如是等外道皆墮二邊虗妄分別無實涅槃大慧一切外道如是虗妄分別涅槃無人住世間無人入涅槃何以故一切外道依自心論虗妄分別無如實智如彼外道自心分別無如是法去來搖動無有如是外道涅槃唐譯大慧彼諸外道虗妄計度不如於理智者所棄皆墮二邊作涅槃想於此無有若住若出彼諸外道皆依自宗而生妄覺違背於理無所成就唯令心意馳散往來一切無有得涅槃者大慧如我所說涅槃者謂善覺知自心現量不著外性離於四句見如實處不墮自心現妄想二邊攝所攝不可得一切度量不見所成愚於真實不應攝受棄捨彼已得自覺聖法知二無我離二煩惱淨除二障永離二死上上地如來地如影幻等諸深三昧離心意意識說名涅槃大慧汝及餘菩薩摩訶薩應當修學當疾遠離一切外道諸涅槃見魏譯復次大慧餘建立法智者說言如實見者唯是自心而不取著外諸境界離四種法見一切法如彼彼法住不見自心分別之相不墮二邊不見能取可取境界見世間建立一切不實迷如實法以不取諸法名之為實以自身內證聖智法如實而知二種無我離於二種諸煩惱垢清淨二障如實能知上上地相入如來地得如幻三昧遠離心意意識分別如是等見名為涅槃大慧汝及一切諸菩薩等應當遠離一切外道虗妄涅槃唐譯大慧復有異彼外道所說以一切智大師子吼說能了達唯心所現不取外境遠離四句住如實見不墮二邊離能所取不入諸量不著真實住於聖智所現證法悟二無我離二煩惱淨二種障轉修諸地入於佛地得如幻等諸大三昧永超心意及以意識名得涅槃汝及諸菩薩宜應遠離爾時世尊欲重宣此義而說偈言外道涅槃見各各起妄想斯從心想生無解脫方便愚於縛縛者遠離善方便外道解脫想解脫終不生衆智各異趣外道所見通彼悉無解脫愚癡妄想故魏譯爾時世尊重說偈言外道涅槃見各各起分別皆從心相生無解脫方便不離縛所縛遠離諸方便自生解脫想而實無解脫外道建立法衆智各異取彼悉無解脫愚癡妄分別唐譯爾時世尊重說頌言外道涅槃見各各異分別彼唯是妄想無解脫方便遠離諸方便不至無縛處妄生解脫想而實無解脫外道所成立衆智各異取彼悉無解脫愚癡妄分別一切癡外道妄見作所作有無有品論彼悉無解脫凡愚樂妄想不聞真實慧言語三苦本真實滅苦因譬如鏡中像雖現而非有於妄想心鏡愚夫見有二不識心及緣則起二妄想了心及境界妄想則不生心者即種種遠離相所相事現而無現如彼愚妄想魏譯一切癡外道妄見作所作是故無解脫以說有無法凡夫樂戲論不聞真實慧言語三界本如實智滅苦譬如鏡中像雖見而非有熏習鏡心見凡夫言有二不知唯心見是故分別二如實知但心分別則不生心名為種種離能見可見見相無可見凡夫妄分別唐譯一切癡外道妄見作所作悉著有無論是故無解脫凡愚樂分別不生真實慧言說三界本真實滅苦因譬如鏡中像雖現而非實習氣心鏡中凡愚見有二不了唯心現故起二分別若知但是心分別則不生心即是種種遠離相所相如愚所分別雖見而無見三有唯妄想外義悉無有妄想種種現凡愚不能了經經說妄想終不出於名若離於言說亦無有所說魏譯三有唯妄想外境界實無妄想見種種凡夫不能知經經說分別種種異名字離於言語法可說不可得唐譯三有唯分別外境悉無有妄想種種現凡愚不能覺經經說分別但是異名字若離於語言其義不可得
