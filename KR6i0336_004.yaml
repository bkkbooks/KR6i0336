body:
  text: 宋天竺三藏求那跋陀羅初譯魏天竺三藏菩提留支再譯唐于闐國三藏實叉難陀後譯明臨濟正宗中都沙門員珂會譯一切佛語心品第二之上爾時大慧菩薩摩訶薩白佛言世尊世尊修多羅説如來藏自性清淨轉三十二相入於一切衆生身中如大價寶垢衣所纏如來之藏常住不變亦復如是而陰界入垢衣所纏貪欲恚癡不實妄想塵勞所汙一切諸佛之所演説云何世尊同外道説我言有如來藏耶世尊外道亦説有常作者離於求那周遍不滅世尊説彼有我魏譯爾時聖者大慧菩薩摩訶薩白佛言世尊世尊如修多羅説如來藏自性清淨具三十二相在於一切衆生身中為貪嗔癡不實垢染陰界入衣之所纏裹如無價寶垢衣所纏如來世尊復説常恆清涼不變世尊若爾外道亦説我有神我常在不變如來亦説如來藏常乃至不變世尊外道亦説有常作者不依諸緣自然而有周遍不滅若如是者如來外道説無差別唐譯爾時大慧菩薩摩訶薩白佛言世尊修多羅中説如來藏本性清淨常恆不斷無有變易具三十二相在於一切衆生身中為蘊界處垢衣所纏貪恚癡等妄分別垢之所汙染如無價寶在垢衣中外道説我是常作者離於求那自在無滅世尊所説如來藏義豈不同於外道我耶佛告大慧我説如來藏不同外道所説之我大慧有時説空無相無願如實際法性法身涅槃離自性不生不滅本來寂靜自性涅槃如是等句説如來藏已如來應供等正覺為斷愚夫畏無我句故説離妄想無所有境界如來藏門大慧未來現在菩薩摩訶薩不應作我見計著魏譯佛告聖者大慧菩薩言大慧我説如來藏常不同外道所有神我大慧我説如來藏空實際涅槃不生不滅無相無願等文辭章句説名如來藏大慧如來應正遍知為諸一切愚癡凡夫聞説無我生於驚怖是故我説有如來藏而如來藏無所分別寂靜無相説名如來藏大慧未來現在諸菩薩等不應執著有我之相唐譯佛言大慧我説如來藏不同外道所説之我大慧如來應正等覺以性空實際涅槃不生無相無願等諸句義説如來藏為令愚夫離無我怖説無分別無影像處如來藏門未來現在諸菩薩摩訶薩不應於此執著於我譬如陶家於一泥聚以人工水木輪繩方便作種種器如來亦復如是於法無我離一切妄想相以種種智慧善巧方便或説如來藏或説無我以是因緣故説如來藏不同外道所説之我是名説如來藏開引計我諸外道故説如來藏令離不實我見妄想入三解脫門境界希望疾得阿耨多羅三藐三菩提是故如來應供等正覺作如是説如來之藏若不如是則同外道是故大慧為離外道見故當依無我如來之藏魏譯大慧譬如陶師依於泥聚微塵輪繩人工手木方便力故作種種器大慧如來世尊亦復如是彼法無我離諸一切分別之相智慧巧便説名如來藏或説無我或説實際及涅槃等種種名字章句示現如彼陶師作種種器是故大慧我説如來藏不同外道説有我相大慧我説如來藏者為諸外道執著於我攝取彼故説如來藏令彼外道離於神我妄想見心執著之處入三解脫門速得阿耨多羅三藐三菩提大慧以是義故諸佛如來應正遍知説如來藏是故我説有如來藏不同外道執著神我是故大慧為離一切外道邪見諸佛如來作如是説汝當修學如來無我相法唐譯大慧譬如陶師於泥聚中以人工水杖輪繩方便作種種器如來亦爾於遠離一切分別相無我法中以種種智慧方便善巧或説如來藏或説為無我種種名字各各差別大慧我説如來藏為攝著我諸外道衆令離妄見入三解脫速得證於阿耨多羅三藐三菩提是故諸佛説如來藏不同外道所説之我若欲離於外道見者應知無我如來藏義爾時世尊欲重宣此義而説偈言人相續陰緣與微塵勝自在作心量妄想魏譯爾時世尊重説偈言人我及於陰衆緣與微塵自性自在作惟心妄分別唐譯爾時世尊即説頌言士夫相續蘊衆緣及微塵勝自在作者此但心分別爾時大慧菩薩摩訶薩觀未來衆生復請世尊惟願為説修行無間如諸菩薩摩訶薩修行者大方便魏譯爾時聖者大慧菩薩觀察未來一切衆生復請佛言惟願世尊為諸菩薩説如實修行法彼諸菩薩聞説如實修行之法便得成就如實修行者唐譯爾時大慧菩薩摩訶薩普觀未來一切衆生復請佛言願為我説具修行法如諸菩薩摩訶薩成大修行佛告大慧菩薩摩訶薩成就四法得修行者大方便云何為四謂善分別自心現觀外性非性離生住滅見得自覺聖智善樂是名菩薩摩訶薩成就四法得修行者大方便魏譯佛告聖者大慧菩薩摩訶薩言大慧有四種法得名為大如實修行者何等為四一者善知自心現見故二者善解外有無故三者遠離生住滅故四者樂修內身證智故大慧菩薩成就如是四法得成就大如實修行者唐譯佛言大慧菩薩摩訶薩具四種法成大修行何者為四謂觀察自心所現故善知外法無性故遠離生住滅見故專求自證聖智故若諸菩薩成此四法則得名為大修行者云何菩薩摩訶薩善分別自心現謂如是觀三界唯心分齊離我我所無動搖離去來無始虗偽習氣所熏三界種種色行繫縛身財建立妄想隨入現是名菩薩摩訶薩善分別自心現魏譯大慧何者菩薩摩訶薩觀察三界但是一心作故離我我所故無動無覺故離取捨故從無始來虗妄執著三界熏習戲論心故種種色行常繫縛故身及資生器世界中六道虗妄現故大慧是名諸菩薩摩訶薩善知自心現見相唐譯大慧云何觀察自心所現謂觀三界唯是自心離我我所無動作無來去無始執著過習所熏三界種種色行名言繫縛身資所住分別隨入之所顯現菩薩摩訶薩如是觀察自心所現云何菩薩摩訶薩善觀外性非性謂𦦨夢等一切性無始虗偽妄想習因觀一切性自性菩薩摩訶薩作如是善觀外性非性是名菩薩摩訶薩善觀外性非性魏譯大慧云何菩薩善解外法有無之相所謂菩薩見一切法如陽𦦨如夢如毛輪故因無始來執著種種戲論分別妄想熏習故見一切法無體相求證聖智境界修行故大慧是名菩薩善解外法有無之相唐譯大慧云何觀察外法無性謂觀察一切法如陽焰如夢境如毛輪無始戲論種種執著虗妄惡習為其因故如是觀察一切法時即是專求自證聖智云何菩薩摩訶薩善離生住滅見謂如幻夢一切性自他俱性不生隨入自心分齊故見外性非性見識不生及緣不積聚見妄想緣生於三界內外一切法不可得見離自性生見悉滅知如幻等諸法自性得無生法忍得無生法忍已離生住滅見是名菩薩摩訶薩善分別離生住滅見魏譯大慧云何一切菩薩摩訶薩見遠離生住滅法謂觀諸法如幻如夢故一切諸法自他二種無故不生以隨自心現知見故以無外法故諸識不起觀諸因緣無積聚故見諸三界因緣有故不見內外一切諸法無實體故遠離生諸法不正見故入一切法如幻相故菩薩爾時名得初地無生法忍大慧是名菩薩摩訶薩遠離生住滅相唐譯大慧云何得離生住滅見所謂觀一切法如幻夢生自他及俱皆不生故隨自心量之所現故見外物無有故見諸識不起故及衆緣無積故分別因緣起三界故如是觀時若內若外一切諸法皆不可得知無體實遠離生見證如幻性是名菩薩摩訶薩遠離生住滅見云何菩薩摩訶薩得自覺聖智善樂謂得無生法忍住第八菩薩地得離心意意識五法自性二無我相得意生身魏譯遠離心意意識五法體相故得二無我如意意身乃至得第八不動地如意意身故唐譯即時逮得無生法忍住第八地了心意意識五法自性二無我境轉所依止獲意生身世尊意生身者何因緣佛告大慧意生身者譬如意去迅疾無礙故名意生譬如意去石壁無礙於彼異方無量由延因先所見憶念不忘自心流注不絶於身無障礙生大慧如是意生身得一時俱菩薩摩訶薩意生身如幻三昧力自在神通妙相莊嚴聖種類身一時俱生猶如意生無有障礙隨所憶念本願境界為成就衆生得自覺聖智善樂魏譯大慧菩薩白佛言世尊何故名為如意意身佛告大慧隨意速去如念即至無有障礙名如意身大慧言如意者於石壁山障無量百千萬億由旬念本所見種種境界自心中縛不能障礙自在而去大慧如意身者亦復如是得如幻三昧自在神力莊嚴其身進取一切聖智種類身無障礙隨意而去以念本願力境界故為化一切諸衆生故唐譯大慧言世尊以何因緣名意生身佛言大慧意生身者譬如意去速疾無礙名意生身大慧譬如心意於無量百千由旬之外憶先所見種種諸物念念相續疾詣於彼非是其身及山河石壁所能為礙意生身者亦復如是如幻三昧力通自在諸相莊嚴憶本成就衆生願故猶如意去生於一切諸聖衆中如是菩薩摩訶薩得無生法忍住第八菩薩地轉捨心意意識五法自性二無我相身及得意生身得自覺聖智善樂是名菩薩摩訶薩成就四法得修行者大方便當如是學魏譯即成就大如實修行者大慧汝應如是修學唐譯大慧是名菩薩具四種法成大修行汝應如是勤加修學爾時大慧菩薩摩訶薩復請世尊惟願為説一切諸法緣因之相以覺緣因相故我及諸菩薩離一切性有無妄見無妄想見漸次俱生魏譯爾時聖者大慧菩薩復請佛言世尊惟願世尊説一切法因緣之相知諸法因緣之相我及一切諸菩薩等善知離於有無不正等妄想分別諸法次第一時生過唐譯爾時大慧菩薩摩訶薩復請佛言願説一切法因緣相了達其義令我及諸菩薩摩訶薩離有無見不妄執諸法漸生頓生佛告大慧一切法二種緣相謂外及內外緣者謂泥團柱輪繩水木人工諸方便緣有瓶生如泥瓶縷疊草席種牙酥酪等方便緣生亦復如是是名外緣前後轉生魏譯佛告大慧菩薩言大慧一切諸法有於二種因緣集相所謂內外大慧外法因緣集相者所謂泥團輪柱輪繩人工方便緣故則有瓶生大慧如泥團等因緣生瓶如是縷氎草席種芽種等人功生酥生酪已生酥生酪已得醍醐大慧是名外法因緣集相從下上上應知唐譯佛言大慧一切法因緣生有二種謂內及外外者謂以泥團水杖輪繩人工等緣和合成瓶如泥瓶縷疊草席種芽酥酪悉亦如是是名外緣前後轉生云何內緣謂無明愛業等法得緣名從彼生陰界入法得緣所起名彼無差別而愚夫妄想是名內緣法魏譯大慧何者內法因緣集相大慧所謂無明業愛如是等法名內因緣集相大慧因無明等陰界入等而得名為因緣集相而諸凡夫虗妄分別各見別相唐譯內者謂無明愛業等生蘊界處法是為內緣起此但愚夫之所分別大慧彼因者有六種謂當有因相續因相因作因顯示因待因當有因者作因已內外法生相續因者作攀緣已內外法生陰種子等相因者作無間相續相生作因者作增上事如轉輪王顯示因者妄想事生已相現作所作如鐙照色等待因者滅時作相續斷不妄想性生魏譯大慧因有六種何等為六一者當因二者相續因三者相因四者作因五者了因六者相待因大慧當因者作因已能生內外法大慧相續因者能攀緣內外法陰種子等大慧相因者能生相續次第作事而不斷絶大慧作因者能作增上因如轉輪王大慧了因者妄想事生已能顯示如燈照色等大慧相待因者於滅時不見虗妄生法相續事斷絶故唐譯大慧因有六種謂當有因相屬因相因能作因顯了因觀待因大慧當有因者謂內外法作因生果相屬因者謂內外法作所緣生果蘊種子等相因者作無間相生相續果能作因者謂作增上而生於果如轉輪王顯了因者謂分別生能顯境相如燈照物觀待因者謂滅時相續斷無妄想生大慧彼自妄想相愚夫不漸次生不俱生所以者何若復俱生者作所作無分別不得因相故若漸次生者不得相我故漸次生不生如不生子無父名魏譯大慧如是諸法凡夫自心虗妄分別大慧是諸法非次第生非一時生何以故大慧若一切法一時生者因果不可差別以不見因果身相故若次第生者未得身相不得言次第生如未有子不得言父唐譯大慧此是愚夫自所分別非漸次生亦非頓生何以故大慧若頓生者則作與所作無有差別求其因相不可得故若漸生者求其體相亦不可得如未生子云何名父大慧漸次生相續方便不然但妄想耳因攀緣次第增上緣等生所生故大慧漸次生不生妄想自性計著相故漸次俱不生自心現受用故自相共相外性非性大慧漸次俱不生除自心現不覺妄想故相生是故因緣作事方便相當離漸次俱見魏譯大慧愚癡凡夫自心觀察次第相續不相應故作如是言因緣次第緣緣緣增上緣等能生諸法大慧如是次第諸法不生大慧虗妄分別取法體相一時次第俱亦不生復次大慧自心中見身及資生故大慧自相同相外法無法是故次第一時不生大慧但虗妄識生自心見故大慧汝當應離不正見因緣生事次第一時生法唐譯諸計度人言以因緣所緣緣無間緣增上緣等所生能生互相繫屬次第生者理不得成皆是妄情執著相故大慧漸次與頓皆悉不生但有心現身資等故外自共相皆無性故唯除識起自分別見大慧是故應離因緣所作和合相中漸頓生見爾時世尊欲重宣此義而説偈言一切都無生亦無因緣滅於彼生滅中而起因緣想非遮滅復生相續因緣起唯為斷凡愚癡惑妄想緣有無緣起法是悉無有生習氣所迷轉從是三有現魏譯爾時世尊重説偈言因緣無不生不生故不滅生滅因緣虗非生亦非滅為遮諸因緣愚人虗妄取有無緣不生故諸法不起以於三界中熏習迷惑心唐譯爾時世尊重説頌言一切法無生亦復無有滅於彼諸緣中分別生滅相非遮諸緣會如是滅復生但止於凡愚妄情之所著緣中法有無是悉無有生習氣迷轉心從是生有現真實無生緣亦復無有滅觀一切有為猶如虗空華攝受及所攝捨離惑亂見非已生當生亦復無因緣一切無所有斯皆是言説魏譯因緣本自無不生亦不滅見諸有為法石女虗空華轉可取能取不生惑妄見現本皆不生緣本亦不有如是等諸法自體是空無亦無有住處為世間説有唐譯本來無有生亦復無有滅觀一切有為譬如虗空華離能取所取一切迷惑見無能生所生亦復無因緣但隨世俗故而説有生滅爾時大慧菩薩摩訶薩復白佛言世尊惟願為説言説妄想相心經世尊我及餘菩薩摩訶薩若善知言説妄想相心經則能通達言説所説二種義疾得阿耨多羅三藐三菩提以言説所説二種趣淨一切衆生魏譯爾時聖者大慧菩薩復白佛言世尊惟願世尊為我説名分別言語相心法門我及一切諸菩薩等若得善知名分別言語相心法門則能通達言説及義二種之法速得阿耨多羅三藐三菩提得菩提已言説及義能令一切衆生得清淨解唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我説言説分別相心法門我及諸菩薩摩訶薩善知此故通達能説所説二義疾得阿耨多羅三藐三菩提令一切衆生於二義中而得清淨佛告大慧諦聽諦聽善思念之當為汝説大慧白佛言善哉世尊唯然受教佛告大慧有四種言説妄想相謂相言説夢言説過妄想計著言説無始妄想言説相言説者從自妄想色相計著生夢言説者先所經境界隨憶念生從覺已境界無性生過妄想計著言説者先怨所作業隨憶念生無始妄想言説者無始虗偽計著過自種習氣生是名四種言説妄想相魏譯佛告聖者大慧菩薩言善哉大慧諦聽諦聽當為汝説大慧菩薩言善哉世尊唯然受教佛告大慧菩薩言大慧有四種妄想言説何等為四一者相言説二者夢言説三者妄執言説四者無始言説大慧相言説者所謂執著色等諸相而生大慧夢言説者念本受用虗妄境界依境界夢覺已知依虗妄境界不實而生大慧執著言説者念本所聞所作業生大慧無始言説者從無始來執著戲論煩惱種子熏習而生大慧我言四種言説虗妄執著者我已説竟唐譯佛言大慧有四種言説分別相所謂相言説夢言説計著過惡言説無始妄想言説大慧相言説者所謂執著自分別色相生夢言説者謂夢先所經境界覺已憶念依不實境生計著過惡言説者謂憶念怨讎先所作業生無始妄想言説者以無始戲論妄執習氣生是為四爾時大慧菩薩摩訶薩復以此義勸請世尊惟願更説言説妄想所現境界世尊何處何故云何何因衆生妄想言説生魏譯爾時聖者大慧菩薩復以此義勸請如來而白佛言世尊惟願為我重説四種虗妄執著言語之相衆生言語何處出云何出何因出唐譯大慧復言世尊願更為説言語分別所行之相何處何因云何而起佛告大慧頭胸喉鼻唇舌齗齒和合出音聲大慧白佛言世尊言説妄想為異為不異佛告大慧言説妄想非異非不異所以者何謂彼因生相故大慧若言説妄想異者妄想不應是因若不異者語不顯義而有顯示是故非異非不異魏譯佛告大慧菩薩言大慧從頭胸喉鼻唇舌齗齒轉故和合出聲大慧菩薩白佛言世尊口中言語虗妄法相為異為不異佛告大慧言大慧言語虗妄非異非不異何以故大慧因彼虗妄法相生言語故大慧若言語異者應無因生大慧若不異者言説不能了前境界大慧説彼言語能了前境是故非異非不異唐譯佛言大慧依頭胸喉鼻唇齶齒舌和合而起大慧復言世尊言語分別為異不異佛言大慧非異非不異何以故分別為因起言語故若異者分別不應為因若不異者語言不能顯義是故非異非不異大慧復白佛言世尊為言説即是第一義為所説者是第一義佛告大慧非言説是第一義亦非所説是第一義所以者何謂第一義聖樂言説所入是第一義非言説是第一義第一義者聖智自覺所得非言説妄想覺境界是故言説妄想不顯示第一義言説者生滅動搖展轉因緣起若展轉因緣起者彼不顯示第一義大慧自他相無性故言説相不顯示第一義復次大慧隨入自心現量故種種相外性非性言説妄想不顯示第一義是故大慧當離言説諸妄想相魏譯大慧復白佛言世尊為言語即第一義為言語所説為第一義佛告大慧非言語即第一義何以故大慧為令第一義隨順言語入聖境界故有言語説第一義非言語即第一義大慧第一義者聖智內證非言語法是智境界以言語能了彼境界大慧説第一義言語者是生滅法念念不住因緣和合有言語生大慧因緣和合者彼不能了第一義何以故以無自相他相故是故大慧言語不能了第一義復次大慧隨順自心見外諸法無法分別是故不能了知第一義是故大慧汝當應離種種言語妄分別相唐譯大慧復言世尊為言語是第一義為所説是第一義佛告大慧非言語是亦非所説何以故第一義者是聖樂處因言而入非即是言第一義者是聖智內自證境非言語分別智境言語分別不能顯示大慧言語者起滅動搖展轉因緣生若展轉緣生於第一義不能顯示第一義者無自他相言語有相不能顯示第一義者但唯自心種種外相悉皆無有言語分別不能顯示是故大慧應當遠離言語分別爾時世尊欲重宣此義而説偈言諸性無自性亦復無言説甚深空空義愚夫不能了一切性自性言説法如影自覺聖智子實際我所説魏譯爾時世尊重説偈言諸法本虗妄無有自體實是故諸言語不能説有無空及與不空凡夫不能知諸法無體相説衆生亦爾虗妄分別無有如化夢等觀察一切法不住於涅槃亦不住世間如王長者等為令諸子喜泥作諸禽獸先與虗偽物後乃授實事我説種種法自法鏡像等為諸佛子喜後説明實際唐譯爾時世尊重説頌言諸法無自性亦復無言説不見空空義愚夫故流轉一切法無性離語言分別諸有如夢化非生死涅槃如王及長者為令諸子喜先示相似物後賜真實者我今亦復然先説相似法後乃為其演自證實際法爾時大慧菩薩摩訶薩復白佛言世尊惟願為説離一異俱不俱有無非有非無常無常一切外道所不行自覺聖智所行離妄想自相共相入於第一真實之義諸地相續漸次上上增進清淨之相隨入如來地相無開發本願譬如衆色摩尼境界無邊相行自心現趣部分之相一切諸法我及餘菩薩摩訶薩離如是等妄想自性自共相見疾得阿耨多羅三藐三菩提令一切衆生一切安樂具足充滿魏譯爾時聖者大慧菩薩復白佛言世尊惟願世尊為諸菩薩及我身説離一異俱不俱有無非有非無常無常一切外道所不能行聖智自證覺所行故離於自相同相法故入第一義實法性故諸地次第上上清淨故入如來地相故依本願力如如意寶無量境界修行之相自然行故於一切法自心現見差別相故我及一切諸菩薩等離於如是妄想分別同相異相速得阿耨多羅三藐三菩提得菩提已與一切衆生安隱樂具悉令滿足故唐譯爾時大慧菩薩摩訶薩復白佛言世尊願為我説離一異俱不俱有無非有無常無常等一切外道所不能行自證聖智所行境界遠離妄計自相共相入於真實第一義境漸淨諸地入如來位以無功用本願力故如如意寶普現一切無邊境界一切諸法皆是自心所現差別令我及餘諸菩薩等於如是等法離妄計自性自共相見速證阿耨多羅三藐三菩提普令衆生具足圓滿一切功德佛告大慧善哉善哉汝能問我如是之義多所安樂多所饒益哀愍一切諸天世人佛告大慧諦聽諦聽善思念之吾當為汝分別解説大慧白佛言善哉世尊唯然受教佛告大慧不知心量愚癡凡夫取內外性依於一異俱不俱有無非有非無常無常自性習因計著妄想魏譯佛告大慧善哉善哉善哉大慧汝為哀愍一切天人多所安樂多所饒益乃能問我如是之義善哉善哉大慧諦聽諦聽當為汝分別解説大慧白佛言善哉世尊唯然受教佛告大慧愚癡凡夫不能覺知唯自心見執著外諸種種法相以為實有是故虗妄分別一異俱不俱有無非有非無常無常因自心熏習依虗妄分別心故唐譯佛言大慧善哉善哉汝哀愍世間請我此義多所利益多所安樂大慧凡夫無智不知心量妄習為因執著外物分別一異俱不俱有無非有無常無常等一切自性譬如羣鹿為渴所逼見春時𦦨而作水想迷亂馳趣不知非水如是愚夫無始虗偽妄想所熏習三毒燒心樂色境界見生住滅取內外性墮於一異俱不俱有無非有非無常無常想妄見攝受魏譯大慧譬如羣獸為渴所逼依熱陽𦦨自心迷亂而作水想東西馳走不知非水大慧如是凡夫愚癡心見因無始來虗妄執著戲論熏習貪嗔癡熱迷心逼惱樂求種種諸色境界生住滅法不善分別凡夫墮於一異俱不俱有無非有非無常無常等唐譯大慧譬如羣獸為渴所逼於熱時𦦨而生水想迷惑馳趣不知非水愚癡凡夫亦復如是無始戲論分別所熏三毒燒心樂色境界見生住滅取內外法墮一異等執著之中如犍闥婆城凡愚無智而起城想無始習氣計著相現彼非有城非無城如是外道無始虗偽習氣計著依於一異俱不俱有無非有非無常無常見不能了知自心現量魏譯大慧譬如凡夫見乾闥婆城生實城想因無始來虗妄分別城相種子熏習而見大慧彼城非城非不城大慧一切外道亦復如是因無始來戲論熏習執著一異俱不俱有無非有非無常無常法故大慧以不覺知惟是自心虗妄見故唐譯大慧如乾闥婆城非城非非城無智之人無始時來執著城種妄習熏故而作城想外道亦爾以無始來妄習熏故不能了達自心所現著一異等種種言説譬如有人夢見男女象馬車步城邑園林山河浴池種種莊嚴自身入中覺已憶念大慧於意云何如是士夫於前所夢憶念不捨為黠慧不大慧白佛言不也世尊佛告大慧如是凡夫惡見所噬外道智慧不知如夢自心現性依於一異俱不俱有無非有非無常無常見魏譯大慧譬如有人於睡夢中見諸男女象馬車步城邑聚落牛與水牛園林樹木種種山河池泉浴流宮殿樓閣種種莊嚴廣大嚴博見身在中忽然即覺覺已憶念彼廣大城大慧於意云何彼人名為是聖者不大慧白佛言不也世尊佛告大慧一切愚癡凡夫外道邪見諸見亦復如是不能覺知諸法夢睡自心見故執著一異俱不俱有無非有非無常無常見故唐譯大慧譬如有人夢見男女象馬車步城邑園林種種嚴飾覺已憶念彼不實事大慧汝意云何如是之人是黠慧不答言不也大慧外道亦爾惡見所噬不了唯心執著一異有無等見譬如畫像不高不下而彼凡愚作高下想如是未來外道惡見習氣充滿依於一異俱不俱有無非有非無常無常見自壞壞他餘離有無無生之論亦説言無謗因果見拔善根本壞清淨因勝求者當遠離去作如是説彼墮自他俱見有無妄想已墮建立誹謗以是惡見當墮地獄魏譯大慧譬如畫像不高不下大慧愚癡凡夫妄見諸法有高有下大慧於未來世依諸外道邪見心熏習增長虗妄分別一異俱不俱有無非有非無常無常等大慧而彼外道自壞壞他説如是言諸法不生不滅有無寂靜彼人名為不正見者大慧彼諸外道謗因果法因邪見故拔諸一切善根白法清淨之因大慧欲求勝法者當遠離説如是法人彼人心著自他二見執虗妄法墮於誹謗建立邪心入於惡道唐譯大慧譬如畫像無高無下愚夫妄見作高下想未來外道亦復如是惡見熏習妄心增長執一異等自壞壞他於離有無無生之論亦説為無此謗因果拔善根本應知此人分別有無起自他見當墮地獄欲求勝法宜速遠離譬如翳目見有垂髮謂衆人言汝等觀此而是垂髮畢竟非性非無性見不見故如是外道妄見希望依於一異俱不俱有無非有非無常無常見誹謗正法自陷陷他魏譯大慧譬如目翳見虗空中有於毛輪為他説言如是如是青黃赤白汝何不觀大慧而彼毛輪本自無體何以故有見不見故大慧諸外道等依邪見心虗妄分別亦復如是虗妄執著一異俱不俱有無非有非無常無常生諸法故唐譯大慧譬如翳目見有毛輪互相謂言此事希有而此毛輪非有非無見不見故外道亦爾惡見分別執著一異俱不俱等誹謗正法自陷陷他譬如火輪非輪愚夫輪想非有智者如是外道惡見希望依於一異俱不俱有無非有非無常無常想一切性生唐譯大慧譬如火輪實非是輪愚夫取著非諸智者外道亦爾惡見樂欲執著一異俱不俱等一切法生譬如水泡似摩尼珠愚小無智作摩尼想計著追逐而彼水泡非摩尼非非摩尼取不取故如是外道惡見妄想習氣所熏於無所有説有生緣有者言滅魏譯大慧譬如天雨生於水泡似玻璃珠愚癡凡夫妄見執著生於珠想東西走逐大慧而彼水泡非寶珠非不寶珠何以故有取不取故大慧彼諸外道因虗妄心分別熏習亦復如是説非有法依因緣生復有説言實有法滅唐譯大慧譬如水泡似玻璃珠愚夫執實奔馳而取然彼水泡非珠非非珠取不取故外道亦爾惡見分別習氣所熏説非有為生壞於緣有復次大慧有三種量五分論各建立已得聖智自覺離二自性事而作有性妄想計著魏譯復次大慧彼諸外道建立三種量五分論而作是言實有聖者內證之法離二自體虗妄分別故唐譯復次大慧立三種量已於聖智內證離二自性法起有性分別大慧心意意識身心轉變自心現攝所攝諸妄想斷如來地自覺聖智修行者不於彼作性非性想若復修行者如是境界性非性攝取相生者彼即取長養及取我人魏譯大慧離心意意識轉身便得聖種類身修行諸行無如是心離自心見能取可取虗妄境界故入如來地自身進趣證聖智故如實修行者不生有無心故大慧如實修行者必得如是境界故大慧若取有無法者即為我相人相衆生相壽者相故唐譯大慧諸修行者轉心意識離能所取住如來地自證聖法於有及無不起於想大慧諸修行者若於境界起有無執則著我人衆生壽者大慧若説彼性自性自共相一切皆是化佛所説非法佛説又諸言説悉由愚夫希望見生不為別建立趣自性法得聖智自覺三昧樂住者分別顯示魏譯大慧説有無法自相同相是名應化佛説非法佛説復次大慧應化如來説如是法隨順愚癡凡夫見心令其修行非為建立如實修行示現自身內證聖智三昧樂行故唐譯大慧一切諸法自相共相是化佛説非法佛説大慧化佛説法但順愚夫所起之見不為顯示自證聖智三昧樂境譬如水中有樹影現彼非影非非影非樹形非非樹形如是外道見習所熏妄想計著依於一異俱不俱有無非有非無常無常想而不能知自心現量譬如明鏡隨緣顯現一切色像而無妄想彼非像非非像而見像非像妄想愚夫而作像想如是外道惡見自心像現妄想計著依於一異俱不俱有無非有非無常無常見譬如風水和合出聲彼非性非非性如是外道惡見妄想依於一異俱不俱有無非有非無常無常見譬如大地無草木處熱𦦨川流洪浪雲湧彼非性非非性貪無貪故如是愚夫無始虗偽習氣所熏妄想計著依生住滅一異俱不俱有無非有非無常無常緣自住事門亦復如彼熱𦦨波浪譬如有人呪術機發以非衆生數毗舍闍鬼方便合成動搖云為凡愚妄想計著往來如是外道惡見希望依於一異俱不俱有無非有非無常無常見戲論計著不實建立大慧是故欲得自覺聖智事當離生住滅一異俱不俱有無非有非無常無常等惡見妄想魏譯大慧譬如人見水中樹影大慧彼非影非不影何以故有樹則有無樹則無故大慧彼諸外道依邪見心妄想熏習亦復如是分別一異俱不俱有無非有非無常無常妄想分別故何以故以不覺知唯自心見故大慧譬如明鏡隨緣得見一切色像無分別心大慧彼非像非不像何以故有緣得見無緣不見故大慧愚癡凡夫自心分別見像有無大慧一切外道自心妄想分別鏡像亦復如是見一異俱不俱故大慧譬如諸響因入山河水風空屋和合而聞彼所聞響非有非無何以故因聲聞聲故大慧一切外道自心虗妄分別熏習見一異俱不俱有無非有非無常無常故大慧譬如大地無諸草木園林之處因於日光塵土和合見水波動而彼水波非有非無何以故令衆生歡喜不歡喜故大慧一切外道愚癡凡夫亦復如是因無始來煩惱心熏習戲論分別生住滅一異俱不俱有無非有非無常無常聖人內身證智門中示現陽𦦨渴愛事故大慧譬如有人依呪術力起於死尸機關木人無衆生體依毗舍闍力依巧師力作去來事而諸愚癡凡夫執著以為實有以去來故大慧愚癡凡夫諸外道等墮邪見心亦復如是執著虗妄一異俱不俱有無非有非無常無常故是故凡夫外道虗妄建立如是法故是故大慧汝當遠離生住滅見一異俱不俱有無非有非無常無常故自身內證聖智分別故唐譯大慧譬如水中有樹影現彼非影非非影非樹形非非樹形外道亦爾諸見所熏不了自心於一異等而生分別譬如明鏡無有分別隨順衆緣現諸色像彼非像非非像而見像非像愚夫分別而作像想外道亦爾於自心所現種種形像而執一異俱不俱相大慧譬如谷響依於風水人等音聲和合而起彼非有非無以聞聲非聲故外道亦爾自心分別熏習力故起於一異俱不俱見大慧譬如大地無草木處日光照觸焰水波動彼非有非無以倒想非想故愚癡凡夫亦復如是無始戲論惡習所熏於聖智自證法性門中見生住滅一異有無俱不俱性大慧譬如木人及以起尸以毗舍闍機關力故動搖運轉云為不絶無智之人取以為實愚癡凡夫亦復如是隨逐外道起諸惡見著一異等虗妄言説是故大慧當於聖智所證法中離生住滅一異有無俱不俱等一切分別爾時世尊欲重宣此義而説偈言幻夢水樹影垂髮熱時𦦨如是觀三有究竟得解脫譬如鹿渴想動轉迷亂心鹿想謂為水而實無水事如是識種子動轉見境界愚夫妄想生如為翳所翳於無始生死計著攝受性如逆楔出楔捨離貪攝受如幻呪機發浮雲夢電光觀是得解脫永斷三相續於彼無有作猶如𦦨虗空如是知諸法則為無所知言教唯假名彼亦無有相於彼起妄想陰行如垂髮如畫垂髮幻夢犍闥婆城火輪熱時𦦨無而現衆生常無常一異俱不俱亦然無始過相續愚夫癡妄想明鏡水淨眼摩尼妙寶珠於中現衆色而實無所有一切性顯現如晝熱時𦦨種種衆色現如夢無所有魏譯爾時世尊重説偈言五陰及與識如水中樹影如幻夢所見莫依意識取諸法如毛輪如𦦨水迷惑觀察於三界一切如幻夢若能如是觀修行得解脫如夏獸愛水搖動迷惑心彼處無水事妄想見為水如意識種子境界動生見愚癡取為實彼法生如翳無始世愚癡取物如懷抱如因楔出楔誑凡夫入法幻起尸機關夢電雲恆爾觀世間如是斷有得解脫陽焰虗空中無有諸識知觀諸法如是不著一切法諸識唯有名以諸相空無見陰如毛輪何法中分別畫及諸毛輪幻夢乾闥婆火輪禽取水實無而見有常無常及一二俱及不俱依無始因縛凡夫迷惑心鏡寶水眼中現諸種種像妄見種種色如夢石女兒一切法無實如獸愛空水唐譯爾時世尊重説頌言諸識蘊有五猶如水樹影所見如幻夢不應妄分別三有如陽𦦨幻夢及毛輪若能如是觀究竟得解脫譬如熱時𦦨動轉迷亂心渴獸取為水而實無水事如是識種子動轉見境界如翳者所見愚夫生執著無始生死中執著所纏覆退捨令出離如因榍出榍幻呪機所作浮雲夢電光觀世恆如是永斷三相續此中無所有如空中陽𦦨如是知諸法則為無所知諸蘊如毛輪於中妄分別唯假施設名求相不可得如畫垂髮幻夢乾闥婆城火輪熱時𦦨實無而見有如是常無常一異俱不俱無始繫縛故愚夫妄分別明鏡水淨眼摩尼妙寶珠於中現色像而實無所有心識亦如是普現衆色相如夢空中焰亦如石女兒復次大慧菩薩如來説法離如是四句謂一異俱不俱有無非有非無常無常離於有無建立誹謗分別結集真諦緣起道滅解脫如來説法以是為首非性非自在非無因非微塵非時非自性相續而為説法復次大慧為淨煩惱爾𦦨障故譬如商主次第建立百八句無所有善分別諸乘及諸地相魏譯復次大慧諸佛如來説法離四種見謂離一異俱不俱故遠離建立有無故大慧一切諸佛如來説法依實際因緣寂滅解脫故大慧一切諸佛如來説法依究竟境界非因自性自在天無因微塵時不依如是説法復次大慧諸佛説法離二種障煩惱障智障如大商主將諸人衆次第置於至未曾見究竟安隱寂靜之處次第安置令善解知乘地差別相故唐譯復次大慧諸佛説法離於四句謂離一異俱不俱及有無等建立誹謗大慧諸佛説法以諦緣起滅道解脫而為其首非與勝性自在宿作自然時微塵等而共相應大慧諸佛説法為淨惑智二種障故次第令住一百八句無相法中而善分別諸乘地相猶如商主善導衆人復次大慧有四種禪云何為四謂愚夫所行禪觀察義禪攀緣如禪如來禪云何愚夫所行禪謂聲聞緣覺外道修行者觀人無我性自相共相骨璅無常苦不淨相計著為首如是相不異觀前後轉進相不除滅是名愚夫所行禪魏譯復次大慧有四種禪何等為四一者愚癡凡夫所行禪二者觀察義禪三者念真如禪四者諸佛如來禪何者愚癡凡夫所行禪謂聲聞緣覺外道修行觀人無我自相同相骨璅故無常苦無我不淨執著諸相如是如是決定畢竟不異故如是次第因前觀次第上上乃至非想滅盡定解脫是名愚癡凡夫外道聲聞等禪唐譯復次大慧有四種禪何等為四謂凡夫所行禪觀察義禪攀緣真如禪諸如來禪云何愚夫所行禪謂聲聞緣覺諸修行者知人無我見自他身骨璅相連皆是無常苦不淨相如是觀察堅著不捨漸次增勝至無想滅定是名愚夫所行禪云何觀察義禪謂人無我自相共相外道自他俱無性已觀法無我彼地相義漸次增進是名觀察義禪魏譯大慧何者觀察義禪謂觀人無我自相同相故見愚癡凡夫外道自相同相自他相無實故觀法無我諸地行相義次第故大慧是名觀察義禪唐譯云何觀察義禪謂知自共相人無我已亦離外道自他俱作於法無我諸地相義隨順觀察是名觀察義禪云何攀緣如禪謂妄想二無我妄想如實處不生妄想是名攀緣如禪魏譯大慧何者觀真如禪謂觀察虗妄分別因緣如實知二種無我如實分別一切諸法無實體相爾時不住分別心中得寂靜境界大慧是名觀真如禪唐譯云何緣真如禪謂若分別無我有二是虗妄念若如實知彼念不起是名緣真如禪云何如來禪謂入如來地得自覺聖智相三種樂住成辦衆生不思議事是名如來禪魏譯何者觀察如來禪謂如實入如來地故入內身聖智相三空三種樂行故能成辦衆生所作不可思議大慧是名觀察如來禪唐譯云何諸如來禪謂入佛地住自地證智三種樂為諸衆生作不思議事是名諸如來禪爾時世尊欲重宣此義而説偈言愚夫所行禪觀察相義禪攀緣如實禪如來清淨禪譬如日月形鉢頭摩深險如虗空火盡修行者觀察如是種種相外道道通禪亦復墮聲聞及緣覺境界捨離彼一切是則無所有一切剎諸佛以不思議手一時摩其頂隨順入如相魏譯爾時世尊重説偈言凡夫等行禪觀察義相禪正念真如禪究竟佛淨禪譬如日月形鉢頭摩海相虗空火盡相行者如是觀如是種種相墮於外道法亦墮於聲聞辟支佛等行捨離於一切則是無所有時十方剎土諸佛真如手摩彼行者頂入真如無相唐譯爾時世尊重説頌言愚夫所行禪觀察義相禪攀緣真如禪如來清淨禪修行者在定觀見日月形波頭摩深險虗空火及畫如是種種相墮於外道法亦墮於聲聞辟支佛境界捨離此一切住於無所緣十方諸國土所有無量佛悉引光明手而摩是人頂是則能隨入如如真實相爾時大慧菩薩摩訶薩復白佛言世尊般涅槃者説何等法謂為涅槃魏譯爾時聖者大慧菩薩摩訶薩白佛言世尊言涅槃涅槃者説何等法名為涅槃唐譯爾時大慧菩薩復白佛言世尊諸佛如來所説涅槃説何等法名為涅槃佛告大慧一切自性習氣藏意意識見習轉變名為涅槃諸佛及我涅槃自性空事境界魏譯佛告聖者大慧菩薩言涅槃者轉滅諸識法體相故轉諸見熏習故轉心意阿梨耶識法相熏習名為涅槃大慧我及諸佛説如是涅槃法體境界空事故唐譯佛告大慧一切識自性習氣及藏識意識見習轉已我及諸佛説名涅槃即是諸法性空境界復次大慧涅槃者聖智自覺境界離斷常妄想性非性云何非常謂自相共相妄想斷故非常云何非斷謂一切聖去來現在得自覺故非斷魏譯復次大慧言涅槃者謂內身聖智修行境界故離虗妄分別有無法故大慧云何非常謂離自相同相分別法故是故非常大慧云何非斷謂過去未來現在一切聖人內身證得故是故非斷唐譯復次大慧涅槃者自證聖智所行境界遠離斷常及有無云何非常謂離自相共相諸分別故云何非斷謂去來現在一切聖者自證智所行故大慧涅槃不壞不死若涅槃死者復應受生相續若壞者應墮有為相是故涅槃離壞離死是故修行者之所歸依魏譯大慧般涅槃者非死非滅大慧若般涅槃是死法者應有生縛故大慧若般涅槃是滅法者應墮有為法故是故大慧般涅槃者非死非滅如實修行者之所皈依故唐譯復次大慧大般涅槃不壞不死若死者應更受生若壞者應是有為是故涅槃不壞不死諸修行者之所歸趣復次大慧涅槃非捨非得非斷非常非一義非種種義是名涅槃魏譯復次大慧言涅槃者非可取非可捨非此處非彼處非斷非常非一義非種種義是故名為涅槃唐譯復次大慧無捨無得故非斷非常故不一不異故説名涅槃復次大慧聲聞緣覺涅槃者覺自相共相不習近境界不顛倒見妄想不生彼等於彼作涅槃覺魏譯復次大慧聲聞涅槃者觀察自相同相覺諸法故名聲聞涅槃大慧辟支佛涅槃者不樂憒閙見諸境界無常無樂無我無淨不生顛倒相是故聲聞辟支佛非究竟處生涅槃想故唐譯復次大慧聲聞緣覺知自共相捨離憒閙不生顛倒不起分別彼於其中生涅槃想復次大慧二種自性相云何為二謂言説自性相計著事自性相計著言説自性相計著者從無始言説虗偽習氣計著生事自性相計著者從不覺自心現分齊故魏譯復次大慧我為汝説二法體相何等為二一者執著言説體相二者執著世事體相大慧何者執著言説相謂無始來執著言説戲論熏習生故大慧何者執著世事相謂不如實知唯是自心見外境界故唐譯復次大慧有二種自性相何者為二謂執著言説自性相執著諸法自性相執著言説自性相者以無始戲論執著言説習氣故起執著諸法自性相以不覺自心所現故起復次大慧如來以二種神力建立菩薩摩訶薩頂禮諸佛聽受問義云何二種神力建立謂三昧正受為現一切身面言説神力及手灌頂神力魏譯復次大慧諸菩薩摩訶薩依二種願力住持故頂禮諸佛如來應正遍知問所疑事大慧何等二種願力住持一者依三昧三摩跋提住持力二者遍身得樂謂佛如來手摩其頂授位住持力唐譯復次大慧諸佛有二種加持持諸菩薩令頂禮佛足請問衆義云何為二謂令入三昧及身現其前手灌其頂大慧菩薩摩訶薩初菩薩地住佛神力所謂入菩薩大乘照明三昧入是三昧已十方世界一切諸佛以神通力為現一切身面言説如金剛藏菩薩摩訶薩及餘如是相功德成就菩薩摩訶薩魏譯大慧諸菩薩摩訶薩住初地中承諸如來住持力故名入菩薩大乘光明三昧大慧諸菩薩摩訶薩入大乘光明三昧已爾時十方諸佛如來應正遍知與諸菩薩住持力故現身口意大慧如金剛藏菩薩摩訶薩及餘成就如是功德相菩薩摩訶薩唐譯大慧初地菩薩摩訶薩蒙諸佛持力故入菩薩大乘光明定入已十方諸佛普現其前身語加持如金剛藏及餘成就如是功德相菩薩摩訶薩者是大慧是名初菩薩地菩薩摩訶薩得菩薩三昧正受神力於百千劫積習善根之所成就次第諸地對治所治相通達究竟至法雲地住大蓮華微妙宮殿坐大蓮華寶師子座同類菩薩摩訶薩眷屬圍繞衆寶瓔珞莊嚴其身如黃金薝蔔日月光明諸最勝子從十方來就大蓮華宮殿座上而灌其頂譬如自在轉輪聖王及天帝釋太子灌頂是名菩薩手灌頂神力大慧是名菩薩摩訶薩二種神力若菩薩摩訶薩住二種神力面見諸佛如來若不如是則不能見魏譯大慧如是諸菩薩摩訶薩住初地中三昧三摩跋提力住持故以百千萬億劫修習善根力故次第如實知地對治法相成就菩薩摩訶薩至法雲地住大寶蓮華王宮殿師子座上坐同類菩薩摩訶薩眷屬圍繞寶冠瓔珞莊嚴其身如閻浮檀金瞻蔔日月光明勝蓮華色爾時十方一切如來各申其手遙摩蓮花王座上菩薩摩訶薩頂如得自在王帝釋王轉輪王灌太子頂授位故大慧彼授位菩薩及眷屬菩薩摩訶薩依如來手摩頂故得遍身樂是故言手摩菩薩頂住持力大慧是名諸菩薩摩訶薩二種住持力大慧諸菩薩摩訶薩依此二種住持力故能觀察一切諸如來身大慧若無二種住持力者則不得見諸佛如來唐譯大慧此菩薩摩訶薩蒙佛持力入三昧已於百千劫集諸善根漸入諸地善能通達治所治相至法雲地處大蓮華微妙宮殿坐於寶座同類菩薩所共圍繞首戴寶冠身如黃金薝蔔花色如盛滿月放大光明十方諸佛舒蓮華手於其座上而灌其頂如轉輪王太子受灌頂已而得自在此諸菩薩亦復如是是名為二諸菩薩摩訶薩為二種持之所持故即能親見一切諸佛異則不能復次大慧菩薩摩訶薩凡所分別三昧神足諸法之行是等一切悉住如來二種神力大慧若菩薩摩訶薩離佛神力能辨説者一切凡夫亦應能説所以者何謂不住神力故大慧山石樹木及諸樂器城郭宮殿以如來入城威神力故皆自然出音樂之聲何況有心者聾盲喑啞無量衆苦皆得解脫如來有如是等無量神力利安衆生魏譯大慧若諸菩薩摩訶薩離二種住持力能説法者愚癡凡夫亦應説法何以故謂不以得諸佛住持力故大慧依諸如來住持力故山河石壁草木園林及種種妓樂城邑聚落宮殿屋宅皆能出於説法之聲自然皆出妓樂之音大慧何況有心者聾盲瘖啞無量衆生離諸苦惱大慧如佛如來住持之力無量利益安樂衆生唐譯復次大慧諸菩薩摩訶薩入於三昧現通説法如是一切皆由諸佛二種持力大慧若諸菩薩離佛加持能説法者則諸凡夫亦應能説大慧山林草樹城郭宮殿及諸樂器如來至處以佛持力尚演法音況有心者聾盲瘖啞離苦解脫大慧如來持力有如是等廣大作用大慧菩薩復白佛言世尊以何因緣如來應供等正覺菩薩摩訶薩住三昧正受時及勝進地灌頂時加其神力佛告大慧為離魔業煩惱故及不墮聲聞地禪故為得如來自覺地故及增進所得法故是故如來應供等正覺咸以神力建立諸菩薩摩訶薩若不以神力建立者則墮外道惡見妄想及諸聲聞衆魔希望不得阿耨多羅三藐三菩提以是故諸佛如來咸以神力攝受諸菩薩摩訶薩爾時世尊欲重宣此義而説偈言神力人中尊大願悉清淨三摩提灌頂初地及十地魏譯大慧菩薩復白佛言世尊世尊何故諸菩薩摩訶薩入三昧三摩跋提及入諸地時諸佛如來應正遍知作住持力佛告大慧為護魔業煩惱散亂心故為不墮聲聞禪定地故為內身證如來地故為增長內身證法故大慧是故諸佛如來應正遍知為諸菩薩作住持力大慧若諸如來不為菩薩作住持力者墮諸外道聲聞辟支佛魔事故不得阿耨多羅三藐三菩提是故諸佛如來應正遍知大慈攝取諸菩薩故爾時世尊重説偈言菩薩依自身本願力清淨入三昧受位初地至十地諸佛人中尊神力作住持唐譯大慧菩薩復白佛言何故如來以其持力令諸菩薩入於三昧及殊勝地中手灌其頂佛言大慧為欲令其遠離魔業諸煩惱故為令不墮聲聞地故為令遠入如來地故令所得法倍增長故諸佛以加持力持諸菩薩大慧若不如是彼諸菩薩便墮外道及以聲聞魔境之中則不得無上菩提是故如來以加持力攝諸菩薩爾時世尊重説頌言世尊清淨願有大加持力初地十地中三昧及灌頂爾時大慧菩薩摩訶薩復白佛言世尊佛説緣起即是説因緣不自説道世尊外道亦説因緣謂勝自在時微塵生如是諸性生然世尊所謂因緣生諸性言説有間悉檀無間悉檀魏譯爾時聖者大慧菩薩摩訶薩復白佛言世尊如世尊説十二因緣從因生果不説自心妄想分別見力而生世尊若爾外道亦説從因生果世尊外道説言從於自性自在天時微塵等因生一切法如來亦説依於因緣而生諸法而不説有自建立法唐譯爾時大慧菩薩摩訶薩復白佛言世尊佛説緣起是由作起非自體起外道亦説勝性自在時我微塵生於諸法今佛世尊但以異名説作緣起非義有別世尊外道亦説有無有生世尊亦説無有生生已滅如世尊所説無明緣行乃至老死此是世尊無因説非有因説世尊建立作如是説此有故彼有非建立漸生觀外道説勝非如來也所以者何世尊外道説因不從緣生而有所生世尊説觀因有事觀事有因如是因緣雜亂如是展轉無窮魏譯世尊外道亦説從於有無而生諸法世尊説言諸法本無依四緣生生已還滅世尊説從無明緣行乃至於有依眼識等生一切法如世尊説亦有諸法無因而生何以故不從因生一時無前後以因此法生此法世尊自説因虗妄因法生此法非次第生故世尊若爾外道説法勝而如來不如何以故世尊外道説因無因緣能生果如來説法因亦依果果亦依因若爾因緣無因無果世尊若爾彼此因果展轉無窮世尊説言從此法生彼法若爾無因生法唐譯世尊外道亦説以作者故從無生有世尊亦説以因緣故一切諸法本無而生生已歸滅如佛所説無明緣行乃至老死此説無因非説有因世尊説言此有故彼有若一時建立非次第相待者其義不成是故外道説勝非如來也何以故外道説因不從緣生而有所生世尊所説果待於因因復待因如是展轉成無窮過又此有故彼有者則無有因佛告大慧我非無因説及因緣雜亂説此有故彼有者攝所攝非性覺自心現量大慧若攝所攝計著不覺自心現量外境界性非性彼有如是過非我説緣起我常説言因緣和合而生諸法非無因生魏譯佛告大慧我今當説因此法生彼法不同外道所立因果無因之法亦從因生我不如是我説諸法從因緣生非無因緣亦不雜亂亦無展轉無窮之過何以故以無能取可取法故大慧外道不知自心見故執著能取可取之法不知不覺唯自心見內外法故大慧彼諸外道不知自心內境界故見有無物是故外道有如是過非我過也我常説言因緣和合而生諸法非無因生唐譯佛言大慧我了諸法唯心所現無能取所取説此有故彼有非是無因及因緣過失大慧若不了諸法唯心所現計有能取及以所取執著外境若有若無彼有是過非我所説大慧復白佛言世尊非言説有性有一切性耶世尊若無性者言説不生是故言説有性有一切性魏譯大慧復言世尊有言語説應有諸法世尊若無諸法者應不説言語世尊是故依言説應有諸法唐譯大慧復白佛言世尊有言説故必有諸法若無諸法言依何起佛告大慧無性而作言説謂兔角龜毛等世間現言説大慧非性非非性但言説耳如汝所説言説有性有一切性者汝論則壞魏譯佛告大慧亦有無法而説言語謂兔角龜毛石女兒等於世間中而有言説大慧彼兔角非有非無而説言語大慧汝言已有言説應有諸法者此義已破唐譯佛告大慧雖無諸法亦有言説豈不現見龜毛兔角石女兒等世人於中皆起言説大慧彼非有非非有而有言説耳大慧如汝所説有言説故有諸法者此論則壞大慧非一切剎土有言説言説者是作耳或有佛剎瞻視顯法或有作相或有揚眉或有動睛或笑或欠或謦咳或念剎土或動搖大慧如瞻視及香積世界普賢如來國土但以瞻視令諸菩薩得無生法忍及諸勝三昧是故非言説有性有一切性大慧見此世界蚊蚋蟲蟻是等衆生無有言説而各辦事魏譯大慧非一切佛國土言語説法何以故以諸言語唯是人心分別説故是故大慧有佛國土直視不瞬口無言語名為説法有佛國土直爾示相名為説法有佛國土但動眉相名為説法有佛國土唯動眼相名為説法有佛國土笑名説法有佛國土欠呿名説法有佛國土咳名説法有佛國土念名説法有佛國土身名説法大慧如無瞬世界及衆香世界於普賢如來應正遍知彼菩薩摩訶薩觀察如來目不暫瞬得無生法忍亦得無量勝三昧法是故大慧汝不得言有言語説應有諸法大慧如來亦見諸世界中一切微蟲蚊虻蠅等衆生之類不説言語共作自事而得成辦唐譯大慧非一切佛土皆有言説言説者假安立耳大慧或有佛土瞪視顯法或現異相或復揚眉或動目睛或示微笑頻申謦咳憶念動搖以如是等而顯於法大慧如不瞬世界妙香世界及普賢如來佛土之中但瞪視不瞬令諸菩薩獲無生法忍及諸勝三昧大慧非由言説而有諸法此世界中蠅蟻等蟲雖無言説成自事故爾時世尊欲重宣此義而説偈言如虗空兔角及與槃大子無而有言説如是性妄想因緣和合法凡愚起妄想不能如實知輪回三有宅魏譯爾時世尊重説偈言如虗空兔角及與石女兒無而有言語如是妄分別因緣和合法愚癡分別生不知如實法輪回三界中唐譯爾時世尊重説頌言如虗空兔角及與石女兒無而有言説妄計法如是因緣和合中愚夫妄謂生不能如實解流轉於三有
